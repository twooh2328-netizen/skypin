<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>SkyPin Drone Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html, body {height:100%;margin:0;}
    #map {width:100%;height:100%;}

    /* 메뉴 버튼 (왼쪽 위) */
    #toggleMenu {
      position:absolute;top:20px;left:20px;z-index:1200;
      padding:10px 15px;font-size:16px;border:none;border-radius:6px;
      background:#f2f2f2;cursor:pointer;
    }

    /* 왼쪽 패널 */
    #slideMenu {
      position:absolute;
      top:0;
      left:-250px;   /* 처음엔 화면 왼쪽 밖 */
      width:250px;   /* 패널 너비 */
      height:100%;   /* 세로 전체 */
      background:white;
      transition:left 0.3s ease;
      z-index:1100;
      padding:10px;
      overflow-y:auto; /* 목록이 길면 스크롤 */
    }
    #slideMenu.open {left:0;} /* 열릴 때 왼쪽에서 나타남 */

    /* 닫기 버튼 (패널 안 맨 위) */
    #closeMenu {
      display:block;
      margin-bottom:10px;
      padding:8px;
      font-size:14px;
      border:none;
      border-radius:6px;
      background:#ddd;
      cursor:pointer;
    }

    /* 버튼 영역 */
    #buttons {display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
    #buttons button {
      padding:10px;font-size:14px;border:none;border-radius:6px;
      background:#f2f2f2;cursor:pointer;
    }

    /* 검색창 */
    #searchBox {
      position:absolute;top:20px;left:50%;transform:translateX(-50%);
      z-index:1200;width:60%;padding:8px;font-size:14px;
      border-radius:6px;border:1px solid #ccc;
    }

    /* 명소 목록 */
    #spotList {margin-top:10px;}
    #spotList li {padding:8px;border-bottom:1px solid #ddd;cursor:pointer;}
  </style>
</head>
<body>
  <!-- 메뉴 버튼 -->
  <button id="toggleMenu">☰ 메뉴</button>

  <!-- 검색창 -->
  <input id="searchBox" placeholder="촬영지 검색 (Enter)">

  <!-- 왼쪽 패널 메뉴 -->
  <div id="slideMenu">
    <button id="closeMenu">닫기 ✖</button>
    <div id="buttons">
      <button id="locBtn">📍 현재위치</button>
      <button id="listBtn">📑 명소 목록</button>
      <button id="clearListBtn">🗑 목록 지우기</button>
    </div>
    <ul id="spotList"></ul>
  </div>

  <!-- 지도 -->
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 지도 초기화
    var map = L.map('map').setView([37.5446,127.0376],12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 메뉴 버튼 → 열기
    document.getElementById('toggleMenu').addEventListener('click', function(){
      document.getElementById('slideMenu').classList.add('open');
    });

    // 닫기 버튼 → 닫기
    document.getElementById('closeMenu').addEventListener('click', function(){
      document.getElementById('slideMenu').classList.remove('open');
    });

    // 명소 데이터
    var spots = [
      {name:"제부도",lat:37.1710,lon:126.5720},
      {name:"양양 낙산사",lat:38.1240,lon:128.6270},
      {name:"서울숲",lat:37.5446,lon:127.0376},
      {name:"부산 광안대교",lat:35.1531,lon:129.1185},
      {name:"제주 성산일출봉",lat:33.4589,lon:126.9425},
      {name:"속초 영금정",lat:38.2070,lon:128.5910},
      {name:"경주 불국사",lat:35.7902,lon:129.3325},
      {name:"안동 하회마을",lat:36.5400,lon:128.5180},
      {name:"인천 송도 센트럴파크",lat:37.3925,lon:126.6345},
      {name:"남해 독일마을",lat:34.8370,lon:127.8920},
      {name:"담양 죽녹원",lat:35.3210,lon:126.9870},
      {name:"순천만 습지",lat:34.9330,lon:127.5000},
      {name:"보성 녹차밭",lat:34.7510,lon:127.0850},
      {name:"강릉 경포대",lat:37.7950,lon:128.8960},
      {name:"춘천 소양강 스카이워크",lat:37.8940,lon:127.7340},
      {name:"포항 호미곶",lat:36.0670,lon:129.5690},
      {name:"울산 대왕암",lat:35.4980,lon:129.4360},
      {name:"여수 돌산대교",lat:34.7390,lon:127.7510},
      {name:"군산 새만금 방조제",lat:35.9000,lon:126.7000},
      {name:"태안 꽃지해변",lat:36.4930,lon:126.3310}
    ];

    // 특정 명소로 이동
    function moveToSpot(spot){
      map.setView([spot.lat, spot.lon], 14);
      L.marker([spot.lat, spot.lon]).addTo(map).bindPopup(spot.name).openPopup();
    }

    // 명소 목록 버튼
    document.getElementById('listBtn').addEventListener('click', function(){
      var spotList=document.getElementById('spotList');
      spotList.innerHTML="";
      spots.forEach(function(spot){
        var li=document.createElement('li');
        li.textContent=spot.name;
        li.onclick=function(){moveToSpot(spot);};
        spotList.appendChild(li);
      });
    });

    // 목록 지우기 버튼
    document.getElementById('clearListBtn').addEventListener('click', function(){
      document.getElementById('spotList').innerHTML="";
    });

    // 검색 기능
    document.getElementById('searchBox').addEventListener('keyup', function(e){
      if(e.key==="Enter"){
        var keyword=e.target.value.trim();
        var found=spots.find(s=>s.name.includes(keyword));
        if(found){moveToSpot(found);}else{alert("검색 결과가 없습니다.");}
      }
    });

    // 현재 위치 버튼
    document.getElementById('locBtn').addEventListener('click', function(){
      if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(pos){
          var lat=pos.coords.latitude, lon=pos.coords.longitude;
          map.setView([lat, lon], 15);
          L.marker([lat, lon]).addTo(map).bindPopup("현재 위치").openPopup();
        }, function(){alert("현재 위치를 가져올 수 없습니다.");});
      } else {
        alert("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
      }
    });
  </script>
</body>
</html>
