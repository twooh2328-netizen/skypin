<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin v3 PRO FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:sans-serif;}
#map{height:100vh;}

#menuBtn{
 position:fixed;bottom:80px;right:15px;
 width:55px;height:55px;border-radius:50%;
 background:#ff3b30;color:#fff;border:none;z-index:9999;
}

#menu{
 position:fixed;bottom:150px;right:15px;
 display:flex;flex-direction:column;gap:6px;
 transform:scale(0);transition:.2s;
}
#menu.open{transform:scale(1);}
#menu button{padding:8px;background:#333;color:#fff;border:none;}

#panel{
 position:fixed;top:0;right:0;width:320px;height:100%;
 background:#fff;transform:translateX(100%);
 transition:.3s;overflow:auto;
}
#panel.show{transform:translateX(0);}

.card{background:#f5f5f5;margin:8px;padding:10px;border-radius:10px;}
.card img{width:100%;margin-top:5px;}

input,textarea{width:100%;margin:5px 0;padding:8px;}
</style>
</head>

<body>

<div id="map"></div>

<button id="menuBtn">☰</button>

<div id="menu">
  <button id="btnPOI">추천명소</button>
  <button id="btnShots">내 촬영지</button>
  <button id="btnGPS">내 위치</button>
  <button id="btnSun">🌅 일출</button>
</div>

<div id="panel">
  <button id="closeBtn">닫기</button>
  <input id="search" placeholder="검색...">

  <!-- 추천명소 추가 -->
  <div id="poiForm" style="display:none;">
    <input id="poiName" placeholder="명소 이름">
    <input id="poiRegion" placeholder="지역">
    <button id="addPOI">📍 현재 위치로 명소 추가</button>
  </div>

  <!-- 촬영지 -->
  <div id="shotForm" style="display:none;">
    <input id="name" placeholder="이름">
    <textarea id="memo" placeholder="메모"></textarea>
    <input type="file" id="photo">
    <button id="saveShot">저장</button>
  </div>

  <div id="list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
window.onload=function(){

/* DOM */
const panel=document.getElementById("panel");
const listEl=document.getElementById("list");

const poiForm=document.getElementById("poiForm");
const shotForm=document.getElementById("shotForm");

const poiName=document.getElementById("poiName");
const poiRegion=document.getElementById("poiRegion");

const name=document.getElementById("name");
const memo=document.getElementById("memo");
const photo=document.getElementById("photo");

const addPOIBtn=document.getElementById("addPOI");

/* DB */
const DB={
 defaultPOI:[
  {name:"남산타워",lat:37.5512,lng:126.9882,region:"서울"},
  {name:"한강공원",lat:37.52,lng:126.98,region:"서울"},
  {name:"해운대",lat:35.1587,lng:129.1604,region:"부산"},
  {name:"설악산",lat:38.1194,lng:128.4655,region:"강원"},
  {name:"성산일출봉",lat:33.4588,lng:126.941,region:"제주"}
 ],
 userPOI:JSON.parse(localStorage.getItem("userPOI")||"[]"),
 shots:JSON.parse(localStorage.getItem("shots")||"[]")
};

function saveDB(){
 localStorage.setItem("userPOI",JSON.stringify(DB.userPOI));
 localStorage.setItem("shots",JSON.stringify(DB.shots));
}

/* MAP */
const map=L.map("map").setView([37.5665,126.978],10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let selected=null;
let markers=L.layerGroup().addTo(map);

/* 메뉴 */
menuBtn.onclick=()=>menu.classList.toggle("open");

btnPOI.onclick=()=>{
 openPanel();
 poiForm.style.display="block";
 shotForm.style.display="none";
 renderPOI();
};

btnShots.onclick=()=>{
 openPanel();
 poiForm.style.display="none";
 shotForm.style.display="block";
 renderShots();
};

/* GPS */
btnGPS.onclick=()=>{
 navigator.geolocation.getCurrentPosition(pos=>{
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;
  map.setView([lat,lng],15);
  markers.clearLayers();
  L.marker([lat,lng]).addTo(markers).bindPopup("내 위치").openPopup();
  window.myPos={lat,lng};
 });
};

/* 🌅 일출 */
btnSun.onclick=()=>{
 if(!window.myPos) return alert("먼저 내 위치 클릭");
 markers.clearLayers();
 const {lat,lng}=window.myPos;
 L.polyline([[lat,lng],[lat,lng+0.2]],{color:"orange"}).addTo(markers);
};

/* 지도 클릭 → 좌표 선택 */
map.on("click",e=>{
 selected=e.latlng;
});

/* 🔥 추천명소 추가 (핵심 수정) */
addPOIBtn.onclick=()=>{
 if(!selected) return alert("지도 클릭 후 위치 선택");

 if(!poiName.value) return alert("이름 입력");

 DB.userPOI.push({
  name:poiName.value,
  region:poiRegion.value || "",
  lat:selected.lat,
  lng:selected.lng
 });

 saveDB();

 poiName.value="";
 poiRegion.value="";

 renderPOI();
};

/* 추천명소 렌더 */
function renderPOI(){
 const list=[...DB.defaultPOI,...DB.userPOI];
 listEl.innerHTML="";

 list.forEach((p,i)=>{

  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<b>${p.name}</b><br>${p.region}`;

  div.onclick=()=>{
   map.setView([p.lat,p.lng],15);
   markers.clearLayers();
   L.marker([p.lat,p.lng]).addTo(markers);
  };

  // 🔥 사용자 데이터만 삭제 가능
  if(i>=DB.defaultPOI.length){
   const del=document.createElement("button");
   del.textContent="삭제";
   del.onclick=(e)=>{
    e.stopPropagation();
    DB.userPOI.splice(i-DB.defaultPOI.length,1);
    saveDB();
    renderPOI();
   };
   div.appendChild(del);
  }

  listEl.appendChild(div);
 });
}

/* 촬영지 */
function renderShots(){
 listEl.innerHTML="";

 DB.shots.forEach((s,i)=>{

  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<b>${s.name}</b><br>${s.memo||""}`;

  if(s.photo){
   const img=document.createElement("img");
   img.src=s.photo;
   div.appendChild(img);
  }

  div.onclick=()=>{
   map.setView([s.lat,s.lng],15);
   markers.clearLayers();
   L.marker([s.lat,s.lng]).addTo(markers);
  };

  const del=document.createElement("button");
  del.textContent="삭제";
  del.onclick=(e)=>{
   e.stopPropagation();
   DB.shots.splice(i,1);
   saveDB();
   renderShots();
  };
  div.appendChild(del);

  listEl.appendChild(div);
 });
}

/* 촬영지 저장 */
saveShot.onclick=async()=>{
 if(!selected) return alert("지도 클릭");

 let img="";
 if(photo.files[0]){
  const reader=new FileReader();
  img=await new Promise(res=>{
   reader.onload=()=>res(reader.result);
   reader.readAsDataURL(photo.files[0]);
  });
 }

 DB.shots.push({
  name:name.value,
  memo:memo.value,
  lat:selected.lat,
  lng:selected.lng,
  photo:img
 });

 saveDB();
 renderShots();
};

/* 공통 */
function openPanel(){ panel.classList.add("show"); }

};
</script>
</body>
</html>
