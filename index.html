<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>SkyPin Drone Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html,body{height:100%;margin:0;font-family:Arial;}
    #map{width:100%;height:100%;}
    #topBar{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      z-index:1000;
      background:white;
      padding:14px;
      border-radius:14px;
      box-shadow:0 0 10px rgba(0,0,0,0.25);
      width:500px;
      text-align:center;
    }
    #searchBox{
      width:95%;
      padding:14px;
      font-size:18px;
      border-radius:8px;
      border:1px solid #ccc;
      margin-bottom:10px;
    }
    #buttons{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
    }
    #buttons button{
      padding:14px;
      border:none;
      border-radius:10px;
      background:#f2f2f2;
      font-size:16px;
      cursor:pointer;
    }
    #buttons button:hover{background:#e5e5e5;}
    #panel{
      position:absolute;
      left:0;
      top:0;
      width:260px;
      height:100%;
      background:white;
      z-index:1100;
      overflow:auto;
      box-shadow:2px 0 8px rgba(0,0,0,0.3);
      display:none;
    }
    #panel h3{margin:12px;}
    #spotList{list-style:none;padding:0;margin:0;}
    #spotList li{padding:14px;border-bottom:1px solid #ddd;cursor:pointer;}
  </style>
</head>
<body>

<div id="panel">
  <h3>촬영지 목록</h3>
  <ul id="spotList">
