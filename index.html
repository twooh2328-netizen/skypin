```html
<!DOCTYPE html>
<html lang="ko">
<link rel="stylesheet"
href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/><head>
<meta charset="utf-8">
<title>SkyPin 9.1 Drone Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

#controls{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#searchBox{
width:180px;
padding:6px;
margin-bottom:6px;
}

button{
padding:6px 8px;
margin:2px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="controls">

<input id="searchBox" placeholder="촬영지 검색">

<br>

<button id="locBtn">📍 내 위치</button>
<button id="nfBtn">🚫 비행금지</button>
<button id="flyBtn">🚁 비행가능</button>
<button id="sunBtn">🌅 일출</button>
<button id="satBtn">🛰 위성</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* 지도 생성 */

var map=L.map("map").setView([37.5665,126.9780],8);

/* 일반 지도 */

var normal=L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:19}
).addTo(map);

/* 위성 스타일 */

var satellite=L.tileLayer(
"https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
{maxZoom:17}
);

var sat=false;

/* 드론 아이콘 */

var droneIcon=L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/854/854878.png",
iconSize:[32,32]
});

/* 촬영지 저장 */

var saved=localStorage.getItem("skypin_spots");

var spots=saved?JSON.parse(saved):[

{name:"서울숲",lat:37.5444,lng:127.0374,desc:"드론 촬영 명소"},
{name:"남산",lat:37.5512,lng:126.9882,desc:"서울 야경 촬영"},
{name:"양양 서피비치",lat:38.0703,lng:128.6319,desc:"서핑 촬영"},
{name:"제부도",lat:37.1690,lng:126.6290,desc:"바닷길 촬영"}

];

var markers=[];

/* 저장 */

function saveSpots(){
localStorage.setItem("skypin_spots",JSON.stringify(spots));
}

/* 마커 생성 */

function addMarker(spot){

var marker=L.marker([spot.lat,spot.lng],{icon:droneIcon})
.addTo(map)
.bindPopup("<b>"+spot.name+"</b><br>"+spot.desc);

marker.spotName=spot.name.toLowerCase();

markers.push(marker);

}

/* 초기 마커 */

spots.forEach(addMarker);

/* 지도 클릭 촬영지 추가 */

map.on("click",function(e){

var name=prompt("촬영지 이름");

if(!name) return;

var desc=prompt("촬영 설명");

var spot={
name:name,
lat:e.latlng.lat,
lng:e.latlng.lng,
desc:desc
};

spots.push(spot);
saveSpots();

addMarker(spot);

});

/* 촬영지 검색 */

document.getElementById("searchBox")

.addEventListener("keyup",function(){

var keyword=this.value.toLowerCase();

markers.forEach(function(marker){

if(marker.spotName.includes(keyword)){

map.setView(marker.getLatLng(),13);
marker.openPopup();

}

});

});

/* 내 위치 */

var myMarker;

document.getElementById("locBtn").onclick=function(){

map.locate({setView:true,maxZoom:13});

};

map.on("locationfound",function(e){

if(myMarker) map.removeLayer(myMarker);

myMarker=L.marker(e.latlng)
.addTo(map)
.bindPopup("📍 현재 위치")
.openPopup();

});

/* 비행금지 구역 */

document.getElementById("nfBtn").onclick=function(){

var zones=[

[37.5665,126.9780],
[37.4602,126.4407],
[37.5583,126.7906],
[35.1796,129.0756],
[33.5113,126.4928]

];

zones.forEach(function(z){

L.circle(z,{
radius:5000,
color:"red",
fillOpacity:0.3
})
.addTo(map)
.bindPopup("🚫 드론 비행 제한 구역");

});

};

/* 비행 가능 구역 */

document.getElementById("flyBtn").onclick=function(){

var zones=[

[38.0703,128.6319],
[37.1690,126.6290],
[36.5,127.5]

];

zones.forEach(function(z){

L.circle(z,{
radius:4000,
color:"green",
fillOpacity:0.2
})
.addTo(map)
.bindPopup("🚁 드론 비행 가능 지역");

});

};

/* 일출 방향 */

document.getElementById("sunBtn").onclick=function(){

var c=map.getCenter();

var sunrise=[c.lat+0.05,c.lng+0.05];

L.polyline(
[[c.lat,c.lng],sunrise],
{color:"orange"}
)
.addTo(map)
.bindPopup("🌅 일출 방향");

};

/* 위성 지도 */

document.getElementById("satBtn").onclick=function(){

if(!sat){

map.removeLayer(normal);
satellite.addTo(map);
sat=true;

}else{

map.removeLayer(satellite);
normal.addTo(map);
sat=false;

}

};

</script>

</body>
</html>
