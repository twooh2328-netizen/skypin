<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin Clean Final</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:sans-serif;
}

#map{
  height:100vh;
  width:100%;
}

/* MENU */
#menuBtn{
  position:fixed;
  bottom:80px;
  right:15px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#ff3b30;
  color:#fff;
  border:none;
  z-index:99999;
  font-size:22px;
}

#submenu{
  position:fixed;
  bottom:150px;
  right:15px;
  display:none;
  flex-direction:column;
  gap:6px;
  z-index:99999;
}

#submenu button{
  padding:8px;
  border:none;
  border-radius:6px;
  background:#333;
  color:#fff;
}

/* PANEL */
#panel{
  position:fixed;
  top:0;
  right:0;
  width:320px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  transform:translateX(100%);
  transition:0.3s;
  z-index:99998;
  overflow:auto;
}

#panel.show{
  transform:translateX(0);
}

#close{
  width:100%;
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
}

.box{padding:10px;}

input,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

button{
  width:100%;
  margin:5px 0;
  padding:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<button id="menuBtn">☰</button>

<div id="submenu">
  <button onclick="openMenu('rec')">추천명소</button>
  <button onclick="openMenu('region')">지역</button>
  <button onclick="openMenu('cat')">카테고리</button>
  <button onclick="openPanel()">내 촬영지</button>
  <button onclick="gps()">내 위치</button>
</div>

<div id="panel">

  <button id="close">닫기</button>

  <div class="box">

    <h3>📍 촬영지 등록</h3>

    <div id="info">지도 클릭</div>

    <input id="name" placeholder="이름">
    <textarea id="memo" placeholder="메모"></textarea>

    <button onclick="save()">저장</button>

    <hr>

    <div id="list"></div>

  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* ================= MAP ================= */
const map = L.map("map").setView([37.5665,126.9780],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© OSM"
}).addTo(map);

/* ================= STATE ================= */
let selected = null;
let shots = JSON.parse(localStorage.getItem("shots")||"[]");
let markers = [];

/* ================= MAP CLICK ================= */
map.on("click", e=>{

  selected = {
    lat:e.latlng.lat,
    lng:e.latlng.lng
  };

  document.getElementById("info").innerText =
    `📍 ${selected.lat.toFixed(4)}, ${selected.lng.toFixed(4)}`;

  panel.classList.add("show");
});

/* ================= DB ================= */
const DB = [
  {n:"남산",lat:37.5512,lng:126.9882,m:"rec",t:"서울"},
  {n:"한강",lat:37.5086,lng:126.9968,m:"rec",t:"서울"},
  {n:"해운대",lat:35.1587,lng:129.1604,m:"rec",t:"부산"},
  {n:"광안리",lat:35.1532,lng:129.1187,m:"rec",t:"부산"},
  {n:"송도",lat:37.3940,lng:126.6406,m:"region",t:"인천"},
  {n:"속초",lat:38.2070,lng:128.5918,m:"region",t:"강원"},
  {n:"설악산",lat:38.1194,lng:128.4655,m:"cat",t:"산"},
  {n:"해운대",lat:35.1587,lng:129.1604,m:"cat",t:"바다"}
];

/* ================= MENU CONTROL ================= */
const menuBtn = document.getElementById("menuBtn");
const submenu = document.getElementById("submenu");
const panel = document.getElementById("panel");

menuBtn.onclick = ()=>{
  submenu.style.display =
    submenu.style.display==="flex"?"none":"flex";
};

function openMenu(type){

  panel.classList.add("show");
  submenu.style.display="none";

  render(type);
}

function openPanel(){
  panel.classList.add("show");
  submenu.style.display="none";
}

/* ================= RENDER ================= */
function render(type){

  const el = document.getElementById("list");

  const list = DB.filter(d=>d.m===type);

  el.innerHTML = list.map(d=>
    `<button onclick="go(${d.lat},${d.lng},'${d.n}')">
      📍 ${d.n} (${d.t})
    </button>`
  ).join("");
}

/* ================= MOVE ================= */
function go(lat,lng,name){

  map.setView([lat,lng],13);

  L.marker([lat,lng])
    .addTo(map)
    .bindPopup(name)
    .openPopup();
}

/* ================= SAVE ================= */
function save(){

  if(!selected){
    alert("지도 클릭하세요");
    return;
  }

  const name = document.getElementById("name").value;
  const memo = document.getElementById("memo").value;

  shots.push({
    name,
    memo,
    lat:selected.lat,
    lng:selected.lng
  });

  localStorage.setItem("shots",JSON.stringify(shots));

  draw();
  alert("저장 완료");

  document.getElementById("name").value="";
  document.getElementById("memo").value="";
}

/* ================= DRAW ================= */
function draw(){

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  shots.forEach(s=>{

    const m = L.marker([s.lat,s.lng])
      .addTo(map)
      .bindPopup(s.name);

    markers.push(m);
  });
}

/* ================= GPS ================= */
function gps(){

  navigator.geolocation.getCurrentPosition(pos=>{

    map.setView([pos.coords.latitude,pos.coords.longitude],15);

    L.marker([pos.coords.latitude,pos.coords.longitude])
      .addTo(map)
      .bindPopup("📍 내 위치")
      .openPopup();
  });

  submenu.style.display="none";
}

/* CLOSE */
document.getElementById("close").onclick=()=>{
  panel.classList.remove("show");
};

/* INIT */
draw();

</script>

</body>
</html>
