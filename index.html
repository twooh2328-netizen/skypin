<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>SkyPin Drone Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{height:100%;margin:0;}
#map{width:100%;height:100vh;}

#toggleMenu{
position:fixed;
bottom:20px;
right:20px;
z-index:1200;
padding:10px 15px;
border:none;
border-radius:6px;
background:#f2f2f2;
cursor:pointer;
}

#searchBox{
position:fixed;
top:20px;
right:20px;
z-index:1200;
width:280px;
height:50px;
padding:10px;
font-size:18px;
border-radius:8px;
border:2px solid #333;
}

#slideMenu{
position:absolute;
top:0;
left:-260px;
width:260px;
height:100%;
background:white;
transition:0.3s;
z-index:1100;
padding:10px;
display:flex;
flex-direction:column;
}

#slideMenu.open{left:0;}

#closeMenu{
margin-top:auto;
padding:8px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:6px;
}

#buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

#buttons button{
padding:10px;
border:none;
background:#f2f2f2;
border-radius:6px;
cursor:pointer;
}

#spotList{
margin-top:10px;
max-height:300px;
overflow-y:auto;
}

#spotList li{
padding:8px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

</style>
</head>

<body>

<button id="toggleMenu">☰ 메뉴</button>
<input id="searchBox" placeholder="촬영지 검색">

<div id="slideMenu">

<div id="buttons">
<button id="locBtn">📍 현재위치</button>
<button id="listBtn">📑 명소</button>
<button id="mySpotsBtn">⭐ 내 촬영지</button>
<button id="sunriseBtn">🌅 일출선</button>
</div>

<ul id="spotList"></ul>
<button id="closeMenu">닫기 ✖</button>

</div>

<div id="map"></div>
<input type="file" id="photoInput" accept="image/*" style="display:none">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

// =====================
// MENU
// =====================
const menu=document.getElementById("slideMenu");

document.getElementById("toggleMenu").onclick=()=>menu.classList.add("open");
document.getElementById("closeMenu").onclick=()=>menu.classList.remove("open");

// =====================
// MAP
// =====================
var map=L.map("map").setView([37.5,127],11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19
}).addTo(map);

// marker layer
var markerLayer=L.layerGroup().addTo(map);

// =====================
// ⭐ 핵심 수정 1: 중복 제거
// =====================
let mySpots = JSON.parse(localStorage.getItem("mySpots") || "[]");

// =====================
// ⭐ 핵심 수정 2: 반드시 선언
// =====================
let selectedLat = null;
let selectedLng = null;

// =====================
// DATA
// =====================
var spots=[ ...원본 그대로 유지... ];

// =====================
// MAP CLICK
// =====================
map.on("click",function(e){

selectedLat=e.latlng.lat;
selectedLng=e.latlng.lng;

document.getElementById("photoInput").click();

});

// =====================
// PHOTO
// =====================
document.getElementById("photoInput")
.addEventListener("change",function(){

const file=this.files[0];
if(!file || selectedLat===null) return;

const reader=new FileReader();

reader.onload=function(ev){

const img=ev.target.result;

mySpots.push({
lat:selectedLat,
lng:selectedLng,
img:img,
name:"촬영지"
});

localStorage.setItem("mySpots",JSON.stringify(mySpots));

render();

};

reader.readAsDataURL(file);

});

// =====================
// RENDER (안정화 핵심)
// =====================
function render(){

markerLayer.clearLayers();

const list=document.getElementById("spotList");
list.innerHTML="";

// 기본 명소
spots.forEach(s=>{
L.marker([s.lat,s.lng]).addTo(markerLayer)
.bindPopup(s.name);
});

// 내 촬영지
mySpots.forEach((s,i)=>{

const m=L.marker([s.lat,s.lng]).addTo(markerLayer);

m.bindPopup("<img src='"+s.img+"' width='200'>");

m.on("dblclick",()=>{

if(confirm("삭제할까요?")){

mySpots.splice(i,1);
localStorage.setItem("mySpots",JSON.stringify(mySpots));
render();

}

});

const li=document.createElement("li");
li.textContent=s.name;
li.onclick=()=>map.setView([s.lat,s.lng],15);

list.appendChild(li);

});

}

// =====================
// 현재 위치 + 일출
// =====================
let sunriseLine=null;

document.getElementById("locBtn").onclick=function(){

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

map.setView([lat,lng],15);

L.marker([lat,lng]).addTo(map)
.bindPopup("현재 위치").openPopup();

if(sunriseLine) map.removeLayer(sunriseLine);

sunriseLine=L.polyline(
[[lat,lng],[lat,lng+0.05]],
{color:"orange",weight:3}
).addTo(map);

});

};

// INIT
render();

});

</script>

</body>
</html>
