<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin v4 FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:-apple-system,sans-serif;}
#map{height:100vh;}

#ui{
 position:fixed;top:0;left:0;width:100%;height:100%;
 pointer-events:none;z-index:10000;
}

#menuBtn,#menu,#panel{ pointer-events:auto; }

/* 메뉴 버튼 */
#menuBtn{
 position:absolute;bottom:80px;right:15px;
 width:60px;height:60px;border-radius:50%;
 background:#ff3b30;color:#fff;border:none;
 font-size:22px;
 box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* 메뉴 */
#menu{
 position:absolute;bottom:160px;right:15px;
 display:none;flex-direction:column;gap:8px;
}
#menu button{
 padding:10px;
 background:#222;color:#fff;border:none;
 border-radius:8px;
}

/* 패널 */
#panel{
 position:absolute;top:0;right:0;width:320px;height:100%;
 background:#fff;transform:translateX(100%);
 transition:.3s;
 overflow:auto;
 box-shadow:-3px 0 15px rgba(0,0,0,0.2);
}
#panel.show{transform:translateX(0);}

#panelHeader{
 padding:12px;background:#111;color:#fff;
 display:flex;justify-content:space-between;
}

#panelContent{padding:12px;}

.card{
 background:#fff;
 padding:12px;
 margin-bottom:10px;
 border-radius:12px;
 box-shadow:0 2px 8px rgba(0,0,0,0.1);
 cursor:pointer;
}

.card img{width:100%;margin-top:6px;border-radius:8px;}

input,select{
 width:100%;padding:10px;margin-bottom:8px;
 border-radius:8px;border:1px solid #ddd;
}

button.add{
 width:100%;padding:10px;
 background:#007aff;color:#fff;border:none;
 border-radius:8px;font-weight:bold;
}

.card button{
 margin-top:5px;
 background:#ff3b30;color:#fff;
 border:none;padding:6px;border-radius:6px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">

<button id="menuBtn">☰</button>

<div id="menu">
  <button id="btnPOI">추천명소</button>
  <button id="btnShots">내 촬영지</button>
  <button id="btnGPS">내 위치</button>
  <button id="btnSun">🌅 일출</button>
</div>

<div id="panel">
  <div id="panelHeader">
    <span id="title">SkyPin</span>
    <button id="closeBtn">닫기</button>
  </div>

  <div id="panelContent">

    <input id="search" placeholder="검색...">
    <select id="filter">
      <option value="all">전체</option>
      <option value="서울">서울</option>
      <option value="부산">부산</option>
    </select>

    <div id="formPOI">
      <input id="poiName" placeholder="이름">
      <input id="poiRegion" placeholder="지역">
      <button class="add" id="addPOI">명소 추가</button>
    </div>

    <div id="formShot" style="display:none;">
      <input id="shotName" placeholder="촬영지 이름">
      <textarea id="shotMemo" placeholder="메모"></textarea>
      <input type="file" id="photo">
      <button class="add" id="saveShot">촬영지 저장</button>
    </div>

    <div id="list"></div>

  </div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
window.onload=function(){

/* DOM */
const menuBtn=menuBtn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");
const panel=document.getElementById("panel");

const btnPOI=document.getElementById("btnPOI");
const btnShots=document.getElementById("btnShots");
const btnGPS=document.getElementById("btnGPS");
const btnSun=document.getElementById("btnSun");

const closeBtn=document.getElementById("closeBtn");
const listEl=document.getElementById("list");

const search=document.getElementById("search");
const filter=document.getElementById("filter");

const formPOI=document.getElementById("formPOI");
const formShot=document.getElementById("formShot");

const poiName=document.getElementById("poiName");
const poiRegion=document.getElementById("poiRegion");

const shotName=document.getElementById("shotName");
const shotMemo=document.getElementById("shotMemo");
const photo=document.getElementById("photo");

/* 지도 */
const map=L.map("map").setView([37.56,126.97],10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let markers=L.layerGroup().addTo(map);
let selected=null;
let myPos=null;

/* 데이터 */
let defaultPOI=[
 {name:"남산타워",lat:37.5512,lng:126.9882,region:"서울"},
 {name:"해운대",lat:35.1587,lng:129.1604,region:"부산"}
];

let userPOI=JSON.parse(localStorage.getItem("userPOI")||"[]");
let shots=JSON.parse(localStorage.getItem("shots")||"[]");

function save(){
 localStorage.setItem("userPOI",JSON.stringify(userPOI));
 localStorage.setItem("shots",JSON.stringify(shots));
}

/* 메뉴 */
menuBtn.onclick=(e)=>{
 e.stopPropagation();
 menu.style.display=(menu.style.display==="flex")?"none":"flex";
};

closeBtn.onclick=()=>panel.classList.remove("show");

/* 지도 클릭 */
map.on("click",e=>{
 selected=e.latlng;
});

/* 렌더 */
function render(list){
 listEl.innerHTML="";
 markers.clearLayers();

 list.forEach((p,i)=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<b>${p.name}</b><br>${p.region||""}`;

  if(p.photo){
   const img=document.createElement("img");
   img.src=p.photo;
   div.appendChild(img);
  }

  div.onclick=()=>{
   map.setView([p.lat,p.lng],15);
   markers.clearLayers();
   L.marker([p.lat,p.lng]).addTo(markers);
  };

  if(p.type==="user" || p.type==="shot"){
   const del=document.createElement("button");
   del.textContent="삭제";
   del.onclick=(e)=>{
    e.stopPropagation();
    if(p.type==="user"){
      userPOI.splice(i,1);
    }else{
      shots.splice(i,1);
    }
    save();
    refresh();
   };
   div.appendChild(del);
  }

  listEl.appendChild(div);
 });
}

/* 검색 + 필터 */
function refresh(){
 let list=[];

 if(current==="poi"){
  list=[...defaultPOI,...userPOI.map(p=>({...p,type:"user"}))];
 }
 if(current==="shots"){
  list=shots.map(s=>({...s,type:"shot"}));
 }

 const q=search.value.toLowerCase();
 const f=filter.value;

 list=list.filter(p=>{
  return p.name.toLowerCase().includes(q) &&
   (f==="all" || p.region===f || !p.region);
 });

 render(list);
}

let current="poi";

/* 버튼 */
btnPOI.onclick=()=>{
 current="poi";
 panel.classList.add("show");
 formPOI.style.display="block";
 formShot.style.display="none";
 refresh();
};

btnShots.onclick=()=>{
 current="shots";
 panel.classList.add("show");
 formPOI.style.display="none";
 formShot.style.display="block";
 refresh();
};

btnGPS.onclick=()=>{
 navigator.geolocation.getCurrentPosition(pos=>{
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;
  map.setView([lat,lng],15);
  markers.clearLayers();
  L.marker([lat,lng]).addTo(markers).bindPopup("내 위치").openPopup();
  myPos={lat,lng};
 });
};

btnSun.onclick=()=>{
 if(!myPos) return alert("내 위치 먼저 실행");
 markers.clearLayers();
 L.polyline([[myPos.lat,myPos.lng],[myPos.lat,myPos.lng+0.2]],{color:"orange"}).addTo(markers);
};

/* 추가 */
addPOI.onclick=()=>{
 if(!selected) return alert("지도 클릭");
 userPOI.push({
  name:poiName.value,
  region:poiRegion.value,
  lat:selected.lat,
  lng:selected.lng
 });
 save();
 refresh();
};

/* 촬영지 저장 */
saveShot.onclick=async()=>{
 if(!selected) return alert("지도 클릭");

 let img="";
 if(photo.files[0]){
  const r=new FileReader();
  img=await new Promise(res=>{
   r.onload=()=>res(r.result);
   r.readAsDataURL(photo.files[0]);
  });
 }

 shots.push({
  name:shotName.value,
  memo:shotMemo.value,
  lat:selected.lat,
  lng:selected.lng,
  photo:img
 });

 save();
 refresh();
};

/* 이벤트 */
search.oninput=refresh;
filter.onchange=refresh;

};
</script>

</body>
</html>
