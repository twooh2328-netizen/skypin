<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SkyPin TEST</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;}

#menuBtn{
 position:fixed;
 bottom:80px;
 right:15px;
 width:60px;
 height:60px;
 border-radius:50%;
 background:#ff3b30;
 color:#fff;
 border:none;
 z-index:99999;
}
</style>
</head>

<body>

<h2 style="position:fixed;top:0;left:0;z-index:99999;background:#fff;">
🔥 SkyPin 실행됨
</h2>

<div id="map"></div>
<button id="menuBtn">☰</button>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

console.log("JS 실행됨");

const map = L.map("map").setView([37.56,126.97],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(map);

document.getElementById("menuBtn").onclick = function(){
 alert("버튼 정상 작동");
};

</script>

</body>
</html>
