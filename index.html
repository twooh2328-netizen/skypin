<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>SkyPin SAFE CORE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;width:100%;}
#toggleMenu{position:fixed;bottom:20px;right:20px;z-index:9999;}
#slideMenu{position:absolute;left:-260px;top:0;width:260px;height:100%;background:#fff;transition:.3s;z-index:1000;}
#slideMenu.open{left:0;}
</style>
</head>

<body>

<button id="toggleMenu">MENU</button>

<div id="slideMenu">
<button id="locBtn">현재위치</button>
<button id="listBtn">명소</button>
<button id="mySpotsBtn">내 촬영지</button>
<button id="closeMenu">닫기</button>
<ul id="spotList"></ul>
</div>

<div id="map"></div>
<input type="file" id="photoInput" style="display:none">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =========================
1. STATE 먼저
========================= */
let map;
let layer;
let mySpots = [];
let selectedLat = null;
let selectedLng = null;

/* =========================
2. 명소 데이터
========================= */
const spots = [
{name:"제부도",lat:37.17,lng:126.57},
{name:"서울숲",lat:37.54,lng:127.03},
{name:"광안대교",lat:35.15,lng:129.11},
{name:"성산일출봉",lat:33.45,lng:126.94}
];

/* =========================
3. INIT (무조건 1번만 실행)
========================= */
window.onload = function(){

map = L.map("map").setView([37.5,127],11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19
}).addTo(map);

layer = L.layerGroup().addTo(map);

mySpots = JSON.parse(localStorage.getItem("mySpots") || "[]");

bindUI();
render();

};

/* =========================
4. UI 연결
========================= */
function bindUI(){

document.getElementById("toggleMenu").onclick=()=>{
document.getElementById("slideMenu").classList.add("open");
};

document.getElementById("closeMenu").onclick=()=>{
document.getElementById("slideMenu").classList.remove("open");
};

/* 현재 위치 */
document.getElementById("locBtn").onclick=()=>{
navigator.geolocation.getCurrentPosition(p=>{
map.setView([p.coords.latitude,p.coords.longitude],15);
L.marker([p.coords.latitude,p.coords.longitude]).addTo(map);
});
};

/* 명소 */
document.getElementById("listBtn").onclick=()=>{
const list=document.getElementById("spotList");
list.innerHTML="";
spots.forEach(s=>{
let li=document.createElement("li");
li.textContent=s.name;
li.onclick=()=>map.setView([s.lat,s.lng],15);
list.appendChild(li);
});
};

}

/* =========================
5. render (절대 안전)
========================= */
function render(){

if(!map || !layer) return;

layer.clearLayers();

const list=document.getElementById("spotList");
if(list) list.innerHTML="";

/* 기본 */
spots.forEach(s=>{
L.marker([s.lat,s.lng]).addTo(map);
});

/* 내 데이터 */
mySpots.forEach((s,i)=>{
L.marker([s.lat,s.lng]).addTo(map);

if(list){
let li=document.createElement("li");
li.textContent="내 촬영지";
list.appendChild(li);
}
});

}

</script>
</body>
</html>
