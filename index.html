<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin v2 Stable FIX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:sans-serif;}
#map{height:100vh;width:100%;}

#menuBtn{
  position:fixed;
  bottom:80px;
  right:15px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#ff3b30;
  color:#fff;
  border:none;
  z-index:99999;
  font-size:22px;
}

#menu{
  position:fixed;
  bottom:150px;
  right:15px;
  display:flex;
  flex-direction:column;
  gap:6px;
  z-index:99999;
  transform:scale(0);
  transform-origin:bottom right;
  transition:0.2s;
}
#menu.open{transform:scale(1);}

#menu button{
  padding:8px;
  border:none;
  border-radius:6px;
  background:#333;
  color:#fff;
}

#panel{
  position:fixed;
  top:0;
  right:0;
  width:320px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 15px rgba(0,0,0,0.2);
  transform:translateX(100%);
  transition:0.3s;
  z-index:99998;
  overflow:auto;
}
#panel.show{transform:translateX(0);}

#close{width:100%;padding:12px;background:#111;color:#fff;border:none;}
.header{padding:12px;border-bottom:1px solid #eee;}
#info{font-size:12px;color:#666;margin-top:5px;}
.content{padding:10px;}
.card{background:#f5f5f5;padding:10px;border-radius:10px;margin:8px 0;}
.card button{width:100%;margin-top:5px;padding:6px;border:none;border-radius:6px;background:#007aff;color:#fff;}
input,textarea{width:100%;margin:5px 0;padding:8px;}
</style>
</head>

<body>
<div id="map"></div>
<button id="menuBtn">☰</button>

<div id="menu">
  <button onclick="openView('rec')">추천명소</button>
  <button onclick="openView('region')">지역</button>
  <button onclick="openView('cat')">카테고리</button>
  <button onclick="openView('shot')">내 촬영지</button>
  <button onclick="gps()">내 위치</button>
</div>

<div id="panel">
<button id="close">닫기</button>
<div class="header">
<div id="panelTitle">SkyPin v2 FIX</div>
<div id="info">지도 클릭</div>
</div>
<div class="content">
<div id="shotForm">
<input id="name" placeholder="이름">
<textarea id="memo" placeholder="메모"></textarea>
<button onclick="save()">저장</button>
<hr>
</div>
<div id="list"></div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

let selected=null;
let shots=JSON.parse(localStorage.getItem("shots")||"[]");

let gpsMarker=null;
let activeMarker=null;
let shotMarker=null;

const map=L.map("map").setView([37.5665,126.9780],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

const layerGroup=L.layerGroup().addTo(map);

const POI=[
{name:"남산",lat:37.5512,lng:126.9882,type:"rec"},
{name:"한강",lat:37.5086,lng:126.9968,type:"rec"},
{name:"해운대",lat:35.1587,lng:129.1604,type:"rec"},
{name:"부산",lat:35.1532,lng:129.1187,type:"region"},
{name:"인천",lat:37.3940,lng:126.6406,type:"region"},
{name:"설악산",lat:38.1194,lng:128.4655,type:"cat"},
{name:"바다",lat:35.1587,lng:129.1604,type:"cat"}
];

window.onload=function(){

document.getElementById("menuBtn").onclick=()=>{
  document.getElementById("menu").classList.toggle("open");
};

document.getElementById("close").onclick=closePanel;

map.on("click",e=>{
  selected={lat:e.latlng.lat,lng:e.latlng.lng};
  document.getElementById("info").innerText=
  `📍 ${selected.lat.toFixed(4)}, ${selected.lng.toFixed(4)}`;
  openPanel();
});

};

function openPanel(){
  document.getElementById("panel").classList.add("show");
}

function closePanel(){
  document.getElementById("panel").classList.remove("show");
}

function openView(type){
openPanel();

const title={rec:"추천명소",region:"지역",cat:"카테고리",shot:"내 촬영지"};
document.getElementById("panelTitle").innerText=title[type];

document.getElementById("shotForm").style.display=(type==="shot")?"block":"none";

render(type);
}

function render(type){
const el=document.getElementById("list");
layerGroup.clearLayers();

if(type==="shot") return renderShots();

const list=POI.filter(p=>p.type===type);
el.innerHTML="";

list.forEach(p=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`<b>${escapeHtml(p.name)}</b>`;

const btn=document.createElement("button");
btn.textContent="이동";
btn.onclick=()=>go(p);

div.appendChild(btn);
el.appendChild(div);
});
}

function go(p){
map.setView([p.lat,p.lng],15);

if(activeMarker) layerGroup.removeLayer(activeMarker);

activeMarker=L.circleMarker([p.lat,p.lng],{
radius:10,color:"#ff3b30",fillOpacity:0.7
}).addTo(layerGroup).bindPopup(p.name).openPopup();
}

function save(){
if(!selected) return alert("지도 클릭 필요");

const shot={
name:document.getElementById("name").value,
memo:document.getElementById("memo").value,
lat:selected.lat,
lng:selected.lng
};

shots.push(shot);
localStorage.setItem("shots",JSON.stringify(shots));
renderShots();
showShotMarker(shot);
}

function renderShots(){
const el=document.getElementById("list");
el.innerHTML="";

shots.forEach((s,i)=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`<b>${escapeHtml(s.name)}</b><br><small>${escapeHtml(s.memo||"")}</small>`;

div.onclick=()=>{
map.setView([s.lat,s.lng],15);
showShotMarker(s);
};

const btn=document.createElement("button");
btn.textContent="삭제";
btn.onclick=(e)=>{e.stopPropagation();del(i);};

div.appendChild(btn);
el.appendChild(div);
});
}

function showShotMarker(s){
if(shotMarker) layerGroup.removeLayer(shotMarker);

shotMarker=L.circleMarker([s.lat,s.lng],{
radius:9,color:"#00c853",fillOpacity:0.8
}).addTo(layerGroup).bindPopup(s.name).openPopup();
}

function del(i){
shots.splice(i,1);
localStorage.setItem("shots",JSON.stringify(shots));
renderShots();
}

function gps(){
navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude;
const lng=pos.coords.longitude;
map.setView([lat,lng],15);

if(gpsMarker) layerGroup.removeLayer(gpsMarker);

gpsMarker=L.circleMarker([lat,lng],{
radius:10,color:"#007aff",fillOpacity:0.8
}).addTo(layerGroup).bindPopup("내 위치").openPopup();
});
}

function escapeHtml(text){
return String(text)
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll("\"","&quot;")
.replaceAll("'","&#039;");
}

</script>
</body>
</html>
