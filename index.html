<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>SkyPin Drone Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{height:100%;margin:0;}
#map{width:100%;height:100vh;}

#toggleMenu{
position:fixed;
bottom:20px;
right:20px;
z-index:9999;
padding:10px 15px;
border:none;
border-radius:6px;
background:#f2f2f2;
cursor:pointer;
}

#searchBox{
position:fixed;
top:20px;
right:20px;
z-index:9999;
width:280px;
height:50px;
padding:10px;
font-size:18px;
border-radius:8px;
border:2px solid #333;
}

#slideMenu{
position:absolute;
top:0;
left:-260px;
width:260px;
height:100%;
background:white;
transition:0.3s;
z-index:1100;
padding:10px;
display:flex;
flex-direction:column;
}

#slideMenu.open{left:0;}

#closeMenu{
margin-top:auto;
padding:8px;
border:none;
background:#ddd;
cursor:pointer;
border-radius:6px;
}

#buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

#buttons button{
padding:10px;
border:none;
background:#f2f2f2;
border-radius:6px;
cursor:pointer;
}

#spotList{
margin-top:10px;
max-height:300px;
overflow-y:auto;
}

#spotList li{
padding:8px;
border-bottom:1px solid #ddd;
cursor:pointer;
}
</style>
</head>

<body>

<button id="toggleMenu">☰ 메뉴</button>
<input id="searchBox" placeholder="촬영지 검색">

<div id="slideMenu">
<div id="buttons">
<button id="locBtn">📍 현재위치</button>
<button id="listBtn">📑 명소 목록</button>
<button id="mySpotsBtn">⭐ 내 촬영지</button>
<button id="sunriseBtn">🌅 일출선</button>
</div>

<ul id="spotList"></ul>
<button id="closeMenu">닫기 ✖</button>
</div>

<div id="map"></div>
<input type="file" id="photoInput" accept="image/*" style="display:none">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded",function(){

// ================= MENU =================
const menu=document.getElementById("slideMenu");
document.getElementById("toggleMenu").onclick=()=>menu.classList.add("open");
document.getElementById("closeMenu").onclick=()=>menu.classList.remove("open");

// ================= MAP =================
const map=L.map("map").setView([37.5,127],11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19
}).addTo(map);

// ================= DATA =================
const spots=[
{name:"제부도",lat:37.1710,lng:126.5720},
{name:"양양 낙산사",lat:38.1240,lng:128.6270},
{name:"서울숲",lat:37.5446,lng:127.0376},
{name:"부산 광안대교",lat:35.1531,lng:129.1185},
{name:"제주 성산일출봉",lat:33.4589,lng:126.9425},
{name:"속초 영금정",lat:38.2070,lng:128.5910},
{name:"경주 불국사",lat:35.7902,lng:129.3325},
{name:"안동 하회마을",lat:36.5400,lng:128.5180},
{name:"인천 송도",lat:37.3925,lng:126.6345},
{name:"남해 독일마을",lat:34.8370,lng:127.8920},
{name:"담양 죽녹원",lat:35.3210,lng:126.9870},
{name:"순천만",lat:34.9330,lng:127.5000},
{name:"보성 녹차밭",lat:34.7510,lng:127.0850},
{name:"강릉 경포대",lat:37.7950,lng:128.8960},
{name:"춘천 소양강",lat:37.8940,lng:127.7340},
{name:"포항 호미곶",lat:36.0670,lng:129.5690},
{name:"울산 대왕암",lat:35.4980,lng:129.4360},
{name:"여수 돌산대교",lat:34.7390,lng:127.7510},
{name:"군산 새만금",lat:35.9000,lng:126.7000},
{name:"태안 꽃지",lat:36.4930,lng:126.3310}
];

// ================= STATE =================
let mySpots=JSON.parse(localStorage.getItem("mySpots")||"[]");

let selectedLat=0;
let selectedLng=0;

let sunriseLine=null;

// ================= MAP CLICK (안정화 핵심) =================
map.on("click",function(e){
selectedLat=e.latlng.lat;
selectedLng=e.latlng.lng;

// 안정화 핵심: 딜레이 + 강제 리셋
setTimeout(()=>{
document.getElementById("photoInput").value="";
document.getElementById("photoInput").click();
},80);
});

// ================= PHOTO =================
document.getElementById("photoInput")
.addEventListener("change",function(e){

const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(ev){

mySpots.push({
lat:selectedLat,
lng:selectedLng,
img:ev.target.result,
name:"촬영지"
});

localStorage.setItem("mySpots",JSON.stringify(mySpots));

render();
};

reader.readAsDataURL(file);
});

// ================= RENDER =================
function render(){

const list=document.getElementById("spotList");
list.innerHTML="";

// 기본 명소
spots.forEach(s=>{
L.marker([s.lat,s.lng]).addTo(map)
.bindPopup(s.name);
});

// 내 촬영지
mySpots.forEach((s,i)=>{

const m=L.marker([s.lat,s.lng]).addTo(map);

m.bindPopup("<img src='"+s.img+"' width='200'>");

m.on("dblclick",()=>{
if(confirm("삭제할까요?")){
mySpots.splice(i,1);
localStorage.setItem("mySpots",JSON.stringify(mySpots));
render();
}
});

const li=document.createElement("li");
li.textContent=s.name;
li.onclick=()=>map.setView([s.lat,s.lng],15);
list.appendChild(li);

});
}

// ================= 현재 위치 + 일출 =================
document.getElementById("locBtn").onclick=function(){

if(!navigator.geolocation) return;

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

map.setView([lat,lng],15);

L.marker([lat,lng]).addTo(map)
.bindPopup("현재 위치").openPopup();

if(sunriseLine) map.removeLayer(sunriseLine);

sunriseLine=L.polyline(
[[lat,lng],[lat,lng+0.05]],
{color:"orange",weight:3}
).addTo(map);

});
};

// INIT
render();

});
</script>

</body>
</html>
