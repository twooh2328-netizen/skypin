<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="utf-8">

<title>SkyPin 8.0 Drone Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:sans-serif;
}

#map{
height:100vh;
}

/* 컨트롤 */

#controls{

position:absolute;

top:10px;

left:10px;

z-index:1000;

background:white;

padding:10px;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,0.2);

}

#searchBox{

width:180px;

padding:5px;

margin-bottom:5px;

}

button{

padding:5px 8px;

margin:2px;

cursor:pointer;

}

#weatherBox{

margin-top:5px;

font-size:12px;

background:#f3f3f3;

padding:6px;

border-radius:6px;

}

</style>

</head>

<body>

<div id="controls">

<input id="searchBox" placeholder="촬영지 검색">

<br>

<button id="locBtn">📍 내 위치</button>

<button id="nfBtn">🚫 비행금지</button>

<button id="sunBtn">🌅 일출</button>

<div id="weatherBox">
날씨 확인중
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* 지도 */

var map=L.map("map").setView([37.5665,126.9780],10);

/* 지도 타일 */

L.tileLayer(

"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",

{maxZoom:19}

).addTo(map);

/* 드론 아이콘 */

var droneIcon=L.icon({

iconUrl:"https://cdn-icons-png.flaticon.com/512/854/854878.png",

iconSize:[32,32]

});

/* 마커 배열 */

var markers=[];

/* 저장된 촬영지 불러오기 */

var saved=localStorage.getItem("skypin_spots");

var spots=saved?JSON.parse(saved):[

{

name:"서울숲",

lat:37.5444,

lng:127.0374,

description:"드론 촬영 인기 장소"

},

{

name:"남산",

lat:37.5512,

lng:126.9882,

description:"서울 야경 촬영"

},

{

name:"양양 서피비치",

lat:38.0703,

lng:128.6319,

description:"서핑 촬영"

},

{

name:"제부도",

lat:37.1690,

lng:126.6290,

description:"바닷길 촬영"

}

];

/* 저장 */

function saveSpots(){

localStorage.setItem(

"skypin_spots",

JSON.stringify(spots)

);

}

/* 촬영지 추가 */

function addSpot(spot){

var marker=L.marker(

[spot.lat,spot.lng],

{icon:droneIcon}

)

.addTo(map)

.bindPopup(

"<b>"+spot.name+"</b><br>"+spot.description

);

markers.push(marker);

}

/* 초기 마커 */

spots.forEach(addSpot);

/* 지도 클릭 */

map.on("click",function(e){

var name=prompt("촬영지 이름");

if(!name) return;

var desc=prompt("촬영 설명");

var spot={

name:name,

lat:e.latlng.lat,

lng:e.latlng.lng,

description:desc

};

spots.push(spot);

saveSpots();

addSpot(spot);

});

/* 내 위치 */

var myLocation;

document.getElementById("locBtn")

.onclick=function(){

map.locate({setView:true,maxZoom:13});

};

map.on("locationfound",function(e){

if(myLocation){

map.removeLayer(myLocation);

}

myLocation=L.marker(e.latlng)

.addTo(map)

.bindPopup("📍 현재 위치")

.openPopup();

});

/* 검색 */

document.getElementById("searchBox")

.addEventListener("keyup",function(){

var keyword=this.value.toLowerCase();

markers.forEach(function(m){

var text=m.getPopup()

.getContent()

.toLowerCase();

if(text.includes(keyword)){

m.setOpacity(1);

}else{

m.setOpacity(0.2);

}

});

});

/* 비행금지 */

document.getElementById("nfBtn")

.onclick=function(){

L.circle(

[37.5665,126.9780],

{

radius:5000,

color:"red",

fillOpacity:0.2

}

)

.addTo(map)

.bindPopup("🚫 비행 제한 가능 지역");

};

/* 일출 방향 */

document.getElementById("sunBtn")

.onclick=function(){

var center=map.getCenter();

var lat=center.lat;

var lng=center.lng;

var sunrise=[lat+0.05,lng+0.05];

L.polyline(

[

[lat,lng],

sunrise

],

{color:"orange"}

)

.addTo(map)

.bindPopup("🌅 일출 방향");

};

/* 날씨 */

document.getElementById("weatherBox")

.innerHTML=

"🌤 풍속 약함<br>🚁 드론 비행 가능";

</script>

</body>

</html>
