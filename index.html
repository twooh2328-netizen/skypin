<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>SkyPin Drone Map FIX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;}

#toggleMenu{
position:fixed;bottom:20px;right:20px;
z-index:9999;
padding:10px 14px;
border:none;
border-radius:8px;
background:#eee;
cursor:pointer;
}

#searchBox{
position:fixed;top:20px;right:20px;
z-index:9999;
width:240px;
padding:10px;
border:2px solid #333;
border-radius:8px;
}

#slideMenu{
position:fixed;
top:0;left:-280px;
width:280px;height:100%;
background:#fff;
z-index:9998;
transition:0.3s;
padding:10px;
display:flex;
flex-direction:column;
}

#slideMenu.open{left:0;}

#buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

#buttons button{
padding:10px;
border:none;
background:#eee;
border-radius:6px;
cursor:pointer;
}

#spotList{
flex:1;
overflow:auto;
margin-top:10px;
}

#spotList li{
padding:8px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

#closeMenu{
padding:10px;
border:none;
background:#ddd;
border-radius:6px;
}
</style>
</head>

<body>

<button id="toggleMenu">☰ 메뉴</button>
<input id="searchBox" placeholder="검색">

<div id="slideMenu">

<div id="buttons">
<button id="locBtn">📍 현재위치</button>
<button id="listBtn">📑 명소</button>
<button id="myBtn">⭐ 내 촬영지</button>
<button id="sunBtn">🌅 일출</button>
</div>

<ul id="spotList"></ul>
<button id="closeMenu">닫기</button>
</div>

<div id="map"></div>
<input type="file" id="photoInput" style="display:none">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* ======================
   MAP
====================== */
const map = L.map("map").setView([37.5,127],11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19
}).addTo(map);

const layer = L.layerGroup().addTo(map);

/* ======================
   FIXED SPOTS (정확 좌표)
====================== */
const spots = [
{name:"제부도",lat:37.2856,lng:126.6226},  // 🔥 수정
{name:"낙산사",lat:38.1240,lng:128.6270},
{name:"서울숲",lat:37.5446,lng:127.0376},
{name:"광안대교",lat:35.1531,lng:129.1185},
{name:"성산일출봉",lat:33.4589,lng:126.9425},
{name:"영금정",lat:38.2070,lng:128.5910},
{name:"불국사",lat:35.7902,lng:129.3325},
{name:"하회마을",lat:36.5400,lng:128.5180},
{name:"송도",lat:37.3925,lng:126.6345},
{name:"남해",lat:34.8370,lng:127.8920}
];

let mySpots = JSON.parse(localStorage.getItem("mySpots")||"[]");

let selected=null;
let sunriseLine=null;

/* ======================
   MENU
====================== */
document.getElementById("toggleMenu").onclick=()=>{
document.getElementById("slideMenu").classList.add("open");
};

document.getElementById("closeMenu").onclick=()=>{
document.getElementById("slideMenu").classList.remove("open");
};

/* ======================
   RENDER
====================== */
function render(){

layer.clearLayers();
const list=document.getElementById("spotList");
list.innerHTML="";

/* 기본 명소 */
spots.forEach(s=>{
L.marker([s.lat,s.lng]).addTo(layer).bindPopup(s.name);
});

/* 내 촬영지 */
mySpots.forEach((s,i)=>{

const m=L.marker([s.lat,s.lng]).addTo(layer);

m.bindPopup(`<img src="${s.img}" width="200">`);

m.on("dblclick",()=>{
mySpots.splice(i,1);
localStorage.setItem("mySpots",JSON.stringify(mySpots));
render();
});

const li=document.createElement("li");
li.textContent=s.name;
li.onclick=()=>map.setView([s.lat,s.lng],15);
list.appendChild(li);

});

}

render();

/* ======================
   지도 클릭
====================== */
map.on("click",e=>{
selected=e.latlng;
document.getElementById("photoInput").click();
});

document.getElementById("photoInput").onchange=function(e){

const file=e.target.files[0];
if(!file||!selected)return;

const r=new FileReader();

r.onload=function(ev){

mySpots.push({
lat:selected.lat,
lng:selected.lng,
img:ev.target.result,
name:"촬영지"
});

localStorage.setItem("mySpots",JSON.stringify(mySpots));
render();

};

r.readAsDataURL(file);
};

/* ======================
   명소 버튼
====================== */
document.getElementById("listBtn").onclick=()=>{
const list=document.getElementById("spotList");
list.innerHTML="";
spots.forEach(s=>{
const li=document.createElement("li");
li.textContent=s.name;
li.onclick=()=>map.setView([s.lat,s.lng],15);
list.appendChild(li);
});
};

/* ======================
   현재 위치 + 일출 (수정됨)
====================== */
document.getElementById("locBtn").onclick=()=>{
navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

map.setView([lat,lng],15);

L.marker([lat,lng]).addTo(map).bindPopup("현재 위치");

if(sunriseLine) map.removeLayer(sunriseLine);

sunriseLine=L.polyline([[lat,lng],[lat,lng+0.05]],{
color:"orange"
}).addTo(map);

});
};

</script>
</body>
</html>
