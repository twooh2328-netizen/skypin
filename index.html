<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스카이핀 드론 지도앱</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Leaflet CSS -->
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/> 
 <style>
   #map {
    height: 100vh;
    width: 100%;
    z-index: 1;
  }
.fab {
  position: fixed; bottom: 20px; right: 20px;
  background: #333; color: #fff;
  border-radius: 8px; width: 80px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  z-index: 1000;
}

.submenu {
  position: fixed; bottom: 70px; right: 20px;
  display: none; flex-direction: column; gap: 10px;
  z-index: 1000;
}
.submenu button {
  width: 60px; height: 60px; border-radius: 50%;
  border: none; cursor: pointer; color: #fff;
  font-size: 14px; font-weight: bold;
}
.submenu button:hover { filter: brightness(85%); }

.recommend { background: #28a745; }
.category { background: #6f42c1; }
.region { background: #17a2b8; }
.shots { background: #ffc107; color:#000; }
.sun { background: #fd7e14; }
.location { background: #007bff; }

.side-panel {
  position: fixed;
  top: 0;
  right: -100%;
  width: 280px;
  height: 100%;
  background: #f8f9fa;
  box-shadow: -2px 0 6px rgba(0,0,0,0.3);
  transition: right 0.3s ease;
  overflow-y: auto;
  z-index: 999;
  padding: 20px;
}
.side-panel.show { right: 0; }
.tab-content { display: none; }
@media (max-width: 768px) {
  .side-panel { right: -100%; width: 100%; max-width: none; }
  .side-panel.show { right: 0; }
  .fab { width: 70px; height: 35px; font-size: 14px; }
  .submenu button { width: 50px; height: 50px; font-size: 12px; }
}

.tab-content { display: none; }
 </style>
</head>
<body>
  <div id="map"></div>
  <div id="menuBtn" class="fab">메뉴</div>
  <div id="submenu" class="submenu">
    <button class="recommend" data-target="recommend">추천</button>
    <button class="category" data-target="category">카테고리</button>
    <button class="region" data-target="region">지역별</button>
    <button class="shots" data-target="myshots">내 촬영지</button>
    <button class="sun" data-target="sun">일출</button>
    <button class="location" data-target="location">위치</button>
  </div>

  <div id="sidePanel" class="side-panel">
    <button id="closePanelBtn">닫기 ✖</button>
    <div class="tab-content" id="recommend"></div>
    <div class="tab-content" id="category"></div>
    <div class="tab-content" id="region"></div>
    <div class="tab-content" id="myshots">
      <h3>내 촬영지</h3>
      <input type="text" id="shotName" placeholder="촬영지 이름"><br>
      <input type="text" id="shotMemo" placeholder="메모"><br>
      <button id="addShotBtn">등록</button>
      <div id="myshots-list"></div>
      </div>
      <div class="tab-content" id="sun">
      <h3>일출 방향</h3>
      <div id="sun-direction"></div>
    </div>
    <div class="tab-content" id="location">
      <h3>현재 위치</h3>
      <button id="locateBtn">내 위치 보기</button>
      <div id="location-info"></div>
   </div>
  </div>
 <div id="map"></div>
  <!-- Leaflet JS -->
 <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
 <script>
   // 지도 초기화
const map = L.map('map').setView([37.5665, 126.9780], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

window.addEventListener('resize', () => { map.invalidateSize(); });

const menuBtn = document.getElementById('menuBtn');
const submenu = document.getElementById('submenu');
const sidePanel = document.getElementById('sidePanel');
const closePanelBtn = document.getElementById('closePanelBtn');

// 메뉴 버튼
menuBtn.addEventListener('click', () => {
  submenu.style.display = submenu.style.display === 'flex' ? 'none' : 'flex';
});

// 닫기 버튼
closePanelBtn.addEventListener('click', () => {
  sidePanel.classList.remove('show');
  hideAllTabs();
});

// 데이터 구조
const recommendList = [
  "남산타워","한강공원","경복궁","수원화성","설악산","지리산","해운대","광안리",
  "정동진","간절곶","월미도","차이나타운","북한산","청계천","동대문","명동",
  "속초해수욕장","춘천호수","울산대왕암","제주성산일출봉"
];

const categories = {
  역사: ["경복궁","수원화성","창덕궁","불국사","해인사"],
  산: ["설악산","지리산","북한산","치악산","오대산"],
  바다: ["해운대","광안리","속초해수욕장","정동진","월미도"],
  일출: ["정동진","간절곶","성산일출봉","울산대왕암","호미곶"]
};

const regions = {
  서울: ["광화문","남산타워","청계천","명동","북한산"],
  부산: ["해운대","광안리","태종대","부산타워","자갈치시장"],
  인천: ["월미도","차이나타운","송도센트럴파크","인천대교","강화도"],
  강원: ["설악산","정동진","속초해수욕장","춘천호수","오대산"]
};
// 좌표 데이터
const locationCoords = {
  "남산타워": [37.5512, 126.9882],
  "경복궁": [37.5796, 126.9770],
  "해운대": [35.1587, 129.1603],
  "광안리": [35.1531, 129.1185],
  "정동진": [37.6896, 129.0340],
  "성산일출봉": [33.4589, 126.9425]
  // 필요한 위치들을 계속 추가
};

// 마커 추가 함수
function addMarker(name) {
  if(locationCoords[name]) {
    const [lat, lng] = locationCoords[name];
    L.marker([lat, lng]).addTo(map).bindPopup(name).openPopup();
    map.setView([lat, lng], 12);
  } else {
    alert(`${name} 좌표가 아직 등록되지 않았습니다.`);
  }
}
// 탭 업데이트 함수 (수정)
function updateTabContent(tabId, items) {
  const container = document.getElementById(tabId);
  container.innerHTML = `<h3>${tabId}</h3><ul>` + 
    items.map(item => `<li onclick="addMarker('${item}')">${item}</li>`).join("") + "</ul>";
}

// 버튼 이벤트
document.querySelector(".recommend").addEventListener("click", () => {
  updateTabContent("recommend", recommendList);
  showTab("recommend");
});
document.querySelector(".category").addEventListener("click", () => {
  let html = "<h3>카테고리</h3>";
  for (let cat in categories) {
    html += `<h4>${cat}</h4><ul>` + categories[cat].map(m => `<li>${m}</li>`).join("") + "</ul>";
  }
  document.getElementById("category").innerHTML = html;
  showTab("category");
});
document.querySelector(".region").addEventListener("click", () => {
  let html = "<h3>지역별</h3>";
  for (let reg in regions) {
    html += `<h4>${reg}</h4><ul>` + regions[reg].map(m => `<li>${m}</li>`).join("") + "</ul>";
  }
  document.getElementById("region").innerHTML = html;
  showTab("region");
});

// 내 촬영지 등록/삭제
let myShots = [];
let shotMarkers = [];

function renderMyShots() {
  const list = document.getElementById("myshots-list");
  list.innerHTML = myShots.map((s,i) => 
    `<div>${s.name} - ${s.memo} 
      <button onclick="deleteShot(${i})">삭제</button></div>`).join("");
}

function addShot(name, memo, lat, lng) {
  const marker = L.marker([lat,lng]).addTo(map).bindPopup(name);
  myShots.push({name, memo, lat, lng});
  shotMarkers.push(marker);
  renderMyShots();
}

function deleteShot(index) {
  myShots.splice(index,1);
  map.removeLayer(shotMarkers[index]);
  shotMarkers.splice(index,1);
  renderMyShots();
}

document.getElementById("addShotBtn").addEventListener("click", () => {
  const name = document.getElementById("shotName").value.trim();
  const memo = document.getElementById("shotMemo").value.trim();
  if(name) {
    const center = map.getCenter();
    addShot(name, memo, center.lat, center.lng);
    document.getElementById("shotName").value = "";
    document.getElementById("shotMemo").value = "";
  }
});

// 일출 방향 화살표 표시
function showSunArrow(direction) {
  const sunDiv = document.getElementById("sun-direction");
  let arrow = "";
  if(direction==="동") arrow="→";
  else if(direction==="서") arrow="←";
  else if(direction==="남") arrow="↓";
  else if(direction==="북") arrow="↑";
  sunDiv.textContent = arrow;
}

document.querySelector(".sun").addEventListener("click", () => {
  showSunArrow("동");
  showTab("sun");
});

// 현재 위치 표시
document.getElementById("locateBtn").addEventListener("click", () => {
  if(navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      document.getElementById("location-info").textContent = `위도: ${lat}, 경도: ${lng}`;
      L.marker([lat, lng]).addTo(map).bindPopup("내 위치").openPopup();
      map.setView([lat, lng], 13);
    });
  } else {
    document.getElementById("location-info").textContent = "브라우저에서 위치 정보를 지원하지 않습니다.";
  }
});

// 탭 제어
function hideAllTabs() {
  document.querySelectorAll('.tab-content').forEach(tab => {
    tab.style.display = 'none';
  });
}

function showTab(tabId) {
  hideAllTabs();
  document.getElementById(tabId).style.display = 'block';
  sidePanel.classList.add('show');
} 
  // 여기에 script.js 내용 전체 붙여넣기

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
    }).addTo(map);

    const locationCoords = {
      "남산타워": [37.5512, 126.9882],
      "경복궁": [37.5796, 126.9770],
      "해운대": [35.1587, 129.1603],
      "광안리": [35.1531, 129.1185],
      "정동진": [37.6896, 129.0340],
      "성산일출봉": [33.4589, 126.9425]
    };

      if(locationCoords[name]) {
        const [lat, lng] = locationCoords[name];
        L.marker([lat, lng]).addTo(map).bindPopup(name).openPopup();
        map.setView([lat, lng], 12);
      } else {
        alert(`${name} 좌표가 아직 등록되지 않았습니다.`);
      }
    }
 </script>
</body>
</html>
