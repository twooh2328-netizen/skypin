<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>드론 지도 앱 - 패널 최종 버전</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; width: 100%; }

    /* FAB 버튼 */
    .fab {
      position: fixed; bottom: 20px; right: 20px;
      background: #333; color: #fff; border-radius: 50%;
      width: 60px; height: 60px; display: flex;
      align-items: center; justify-content: center;
      cursor: pointer; font-size: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      z-index: 1000;
    }
    .submenu {
      position: fixed; bottom: 90px; right: 20px;
      display: none; flex-direction: column; gap: 10px;
      z-index: 1000;
    }
    .submenu button {
      width: 50px; height: 50px; border-radius: 50%;
      border: none; cursor: pointer; color: #fff; font-size: 18px;
    }
    .location { background: #007bff; }
    .attractions { background: #dc3545; }
    .shots { background: #ffc107; }
    .sun { background: #fd7e14; }

    /* 사이드 패널 */
    .side-panel {
      position: fixed; top: 0; right: -320px;
      width: 320px; height: calc(100% - 100px);
      background: #f8f9fa; box-shadow: -2px 0 6px rgba(0,0,0,0.3);
      transition: right 0.3s ease; overflow-y: auto; z-index: 999;
    }
    .side-panel.show { right: 0; }

    /* 탭 버튼 */
    .tabs { display: flex; justify-content: space-around; background: #ddd; border-bottom: 1px solid #aaa; }
    .tabs button { flex: 1; padding: 10px; border: none; cursor: pointer; background: #ccc; font-size: 14px; }
    .tabs button.active { background: #bbb; font-weight: bold; }

    .tab-content { display: none; padding: 10px; }
    .tab-content.active { display: block; }

    /* 아코디언 */
    .accordion-item { border-bottom: 1px solid #ddd; }
    .accordion-header {
      width: 100%; text-align: left; padding: 10px;
      background: #eee; border: none; cursor: pointer; font-weight: bold;
    }
    .accordion-body { display: none; padding: 10px; background: #f9f9f9; }
    .accordion-body.show { display: block; }

    .attraction-item {
      padding: 8px; border-bottom: 1px solid #ddd; cursor: pointer;
    }
    .attraction-item:hover { background: #eee; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="fab" id="menuBtn">☰</div>
  <div class="submenu" id="submenu">
    <button class="location" title="현재 위치">📍</button>
    <button class="attractions" title="명소 목록">⭐</button>
    <button class="shots" title="내 촬영 목록">📷</button>
    <button class="sun" title="일출 방향">🌅</button>
  </div>

  <!-- 사이드 패널 -->
  <div class="side-panel" id="sidePanel">
    <div class="tabs">
      <button data-tab="recommended" class="active">추천</button>
      <button data-tab="category">카테고리</button>
      <button data-tab="region">지역별</button>
    </div>

    <!-- 추천 탭 -->
    <div class="tab-content active" id="recommended">
      <h3>추천 명소</h3>
      <div class="attraction-item" data-lat="37.579617" data-lng="126.977041">경복궁 (역사)</div>
      <div class="attraction-item" data-lat="33.4996" data-lng="126.5312">성산일출봉 (자연)</div>
      <div class="attraction-item" data-lat="35.1796" data-lng="129.0756">해운대 (전망)</div>
    </div>

    <!-- 카테고리 탭 -->
    <div class="tab-content" id="category">
      <h3>카테고리별 명소</h3>
      <div class="accordion-item">
        <button class="accordion-header">역사</button>
        <div class="accordion-body">
          <div class="attraction-item" data-lat="37.579617" data-lng="126.977041">경복궁</div>
          <div class="attraction-item" data-lat="37.5658" data-lng="126.9752">덕수궁</div>
        </div>
      </div>
      <div class="accordion-item">
        <button class="accordion-header">자연</button>
        <div class="accordion-body">
          <div class="attraction-item" data-lat="33.4996" data-lng="126.5312">성산일출봉</div>
          <div class="attraction-item" data-lat="33.3617" data-lng="126.5292">한라산</div>
        </div>
      </div>
      <div class="accordion-item">
        <button class="accordion-header">전망</button>
        <div class="accordion-body">
          <div class="attraction-item" data-lat="37.551169" data-lng="126.988227">남산타워</div>
          <div class="attraction-item" data-lat="35.1796" data-lng="129.0756">부산 해운대</div>
        </div>
      </div>
    </div>

    <!-- 지역별 탭 -->
 <div class="tab-content" id="region">
  <div class="accordion-item">
    <button class="accordion-header">서울</button>
    <div class="accordion-body">
      <div class="attraction-item">경복궁</div>
      <div class="attraction-item">남산타워</div>
    </div>
  </div>

  <div class="accordion-item">
    <button class="accordion-header">부산</button>
    <div class="accordion-body">
      <div class="attraction-item">해운대</div>
      <div class="attraction-item">광안리 해수욕장</div>
    </div>
  </div>

  <div class="accordion-item">
    <button class="accordion-header">제주</button>
    <div class="accordion-body">
      <div class="attraction-item">성산일출봉</div>
      <div class="attraction-item">한라산</div>
    </div>
  </div>
</div>

        <div class="accordion-body">
          <div class="attraction-item" data-lat="37.579617" data-lng="126.977041">경복궁</div>
          <div class="attraction-item" data-lat="37.551169" data-lng="126.988227">남산타워</div>
        </div>
      </div>

        <button class="accordion-header">부산</button>
        <div class="accordion-body">
          <div class="attraction-item" data-lat="35.1796" data-lng="129.0756">해운대</div>
          <div class="attraction-item" data-lat="35.1550" data-lng="129.0595">광안리 해수욕장</div>
        </div>
      </div>
      <div class="accordion-item">
        <button class="accordion-header">제주</button>
        <div class="accordion-body">
          <div class="attraction-item" data-lat="33.4996" data-lng="126.5312">성산일출봉</div>
          <div class="attraction-item" data-lat="33.3617" data-lng="126.5292">한라산</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // 지도 초기화
    const map = L.map('map').setView([37.5665, 126.9780], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 메뉴 버튼 토글
    const menuBtn = document.getElementById('menuBtn');
    const submenu = document.getElementById('submenu');
    menuBtn.addEventListener('click', () => {
      submenu.style.display = submenu.style.display === 'flex' ? 'none' : 'flex';
    });

    // 사이드 패널 토글
    const attractionBtn = document.querySelector('.attractions');

    const sidePanel = document.getElementById('sidePanel');
    attractionBtn.addEventListener('click', () => {
      sidePanel.classList.toggle('show');
    });

    // 탭 전환
    const tabButtons = document.querySelectorAll('.tabs button');
    const tabContents = document.querySelectorAll('.tab-content');
    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.getAttribute('data-tab');
        tabButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tabContents.forEach(c => {
          c.classList.remove('active');
          if (c.id === tab) c.classList.add('active');
        });
      });
    });

    // 명소 클릭 이벤트
    document.querySelectorAll('.attraction-item').forEach(item => {
      item.addEventListener('click', () => {
        const lat = item.getAttribute('data-lat');
        const lng = item.getAttribute('data-lng');
        map.setView([lat, lng], 16);
        L.popup()
          .setLatLng([lat, lng])
          .setContent(`<b>${item.textContent}</b>`)
          .openOn(map);
      });
    });

    // 현재 위치 버튼 이벤트
    const locationBtn = document.querySelector('.location');
    locationBtn.addEventListener('click', () => {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          map.setView([lat, lng], 16);
          L.marker([lat, lng]).addTo(map)
            .bindPopup("현재 위치")
            .openPopup();
        }, err => {
          alert("현재 위치를 가져올 수 없습니다.");
        });
      } else {
        alert("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
      }
    });

// 아코디언 동작
const accordionHeaders = document.querySelectorAll('.accordion-header');
accordionHeaders.forEach(header => {
  header.addEventListener('click', () => {
    const body = header.nextElementSibling;
    // 다른 아코디언 닫기
    document.querySelectorAll('.accordion-body').forEach(b => {
      if (b !== body) b.classList.remove('show');
    });
    // 현재 아코디언 토글
    body.classList.toggle('show');
  });
});

</script>
</body>
</html>
