<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>SkyPin Drone Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html, body {height:100%;margin:0;}
    #map {width:100%;height:100%;}
    #toggleMenu {
      position:absolute;bottom:20px;right:20px;z-index:1200;
      padding:12px 18px;font-size:18px;border:none;border-radius:8px;
      background:#f2f2f2;cursor:pointer;
    }
    #slideMenu {
      position:absolute;bottom:-200px;left:0;width:100%;background:white;
      transition:bottom 0.3s ease;z-index:1100;padding:10px;
    }
    #slideMenu.open {bottom:0;}
  </style>
</head>
<body>
  <button id="toggleMenu">☰ 메뉴</button>
  <div id="slideMenu">
    <p>여기에 버튼들을 추가할 수 있습니다.</p>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 지도 초기화
    var map = L.map('map').setView([37.5446,127.0376],12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 메뉴 토글
    document.getElementById('toggleMenu').addEventListener('click', function(){
      document.getElementById('slideMenu').classList.toggle('open');
    });
  </script>
</body>
</html>
