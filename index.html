<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>SkyPin Drone Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html,body{height:100%;margin:0;font-family:Arial;}
    #map{width:100%;height:100%;}
    /* 지도 크기 조절 버튼 */
    #resizeMap {
      position:absolute;
      top:20px;
      left:20px;
      z-index:1200;
      padding:14px 18px;
      font-size:18px;
      border:none;
      border-radius:8px;
      background:#f2f2f2;
      cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    }
    @media (aspect-ratio: 9/16) {
      #resizeMap { padding:12px 16px; font-size:16px; }
    }
    @media (aspect-ratio: 16/9) {
      #resizeMap { padding:18px 22px; font-size:20px; }
    }
    /* 메뉴 버튼 */
    #toggleMenu {
      position:absolute;
      bottom:20px;
      right:20px;
      z-index:1200;
      padding:18px 24px;
      font-size:22px;
      border:none;
      border-radius:10px;
      background:#f2f2f2;
      cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    }
    /* 슬라이드 메뉴 */
    #slideMenu {
      position:absolute;
      bottom:-250px;
      left:0;
      width:100%;
      background:white;
      box-shadow:0 -2px 8px rgba(0,0,0,0.3);
      transition:bottom 0.3s ease;
      z-index:1100;
    }
    #slideMenu.open { bottom:0; }
    #buttons {
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
      padding:12px;
    }
    #buttons button {
      padding:12px;
      font-size:16px;
      border:none;
      border-radius:8px;
      background:#f2f2f2;
      cursor:pointer;
    }
    #panel{position:absolute;left:0;top:0;width:300px;height:100%;background:white;z-index:1100;overflow:auto;box-shadow:2px 0 8px rgba(0,0,0,0.3);display:none;}
    #panel h3{margin:12px;}
    #spotList{list-style:none;padding:0;margin:0;}
    #spotList li{padding:14px;border-bottom:1px solid #ddd;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
    .deleteBtn{color:red;cursor:pointer;margin-left:10px;}
  </style>
</head>
<body>

<button id="resizeMap">🔍 확대</button>
<button id="toggleMenu">☰ 메뉴</button>

<div id="slideMenu">
  <div id="buttons">
    <button id="locBtn">📍 현재위치</button>
    <button id="addSpotBtn">➕ 내 촬영지 등록</button>
    <button id="sunBtn">🌅 일출방향</button>
    <button id="satBtn">🛰 지도전환</button>
    <button id="listBtn">📑 드론 촬영 명소</button>
    <button id="myListBtn">📑 내 촬영지 목록</button>
  </div>
</div>

<div id="panel">
  <h3 id="panelTitle">목록</h3>
  <ul id="spotList"></ul>
  <button onclick="document.getElementById('panel').style.display='none'">닫기</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/suncalc/suncalc.js"></script>

<script>
  var defaultCenter = [37.5446, 127.0376];
  var map = L.map('map').setView(defaultCenter, 12);

  var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  var satLayer = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png');

    var spots = [
    {name: "제부도", lat: 37.1710, lon: 126.5720},
    {name: "양양 낙산사", lat: 38.1240, lon: 128.6270},
    {name: "서울숲", lat: 37.5446, lon: 127.0376},
    {name: "부산 광안대교", lat: 35.1531, lon: 129.1185},
    {name: "제주 성산일출봉", lat: 33.4589, lon: 126.9425},
    {name: "속초 영금정", lat: 38.2070, lon: 128.5910},
    {name: "경주 불국사", lat: 35.7902, lon: 129.3325},
    {name: "안동 하회마을", lat: 36.5400, lon: 128.5180},
    {name: "인천 송도 센트럴파크", lat: 37.3925, lon: 126.6345},
    {name: "남해 독일마을", lat: 34.8370, lon: 127.8920},
    {name: "담양 죽녹원", lat: 35.3210, lon: 126.9870},
    {name: "순천만 습지", lat: 34.9330, lon: 127.5000},
    {name: "보성 녹차밭", lat: 34.7510, lon: 127.0850},
    {name: "강릉 경포대", lat: 37.7950, lon: 128.8960},
    {name: "춘천 소양강 스카이워크", lat: 37.8940, lon: 127.7340},
    {name: "포항 호미곶", lat: 36.0670, lon: 129.5690},
    {name: "울산 대왕암", lat: 35.4980, lon: 129.4360},
    {name: "여수 돌산대교", lat: 34.7390, lon: 127.7510},
    {name: "군산 새만금 방조제", lat: 35.9000, lon: 126.7000},
    {name: "태안 꽃지해변", lat: 36.4930, lon: 126.3310}
  ];

  var mySpots = [];

  function refreshSpotList(showMyList=false) {
    var spotList = document.getElementById('spotList');
    var panelTitle = document.getElementById('panelTitle');
    spotList.innerHTML = "";

    if(showMyList){
      panelTitle.textContent = "내 촬영지 목록";
      if(mySpots.length === 0){
        var li = document.createElement('li');
        li.textContent = "등록된 촬영지가 없습니다.";
        spotList.appendChild(li);
      } else {
        mySpots.forEach(function(spot, index){
          var li = document.createElement('li');
          li.textContent = spot.name;
          var delBtn = document.createElement('span');
          delBtn.textContent = "❌";
          delBtn.className = "deleteBtn";
          delBtn.addEventListener('click', function(e){
            e.stopPropagation();
            mySpots.splice(index,1);
            refreshSpotList(true);
          });
          li.appendChild(delBtn);
          li.addEventListener('click', function(){
            moveToSpot(spot);
          });
          spotList.appendChild(li);
        });
      }
    } else {
      panelTitle.textContent = "드론 촬영 명소";
      spots.forEach(function(spot){
        var li = document.createElement('li');
        li.textContent =

           // 검색 기능
  document.getElementById('searchBox').addEventListener('keyup', function(e){
    if(e.key === "Enter"){
      var keyword = e.target.value.trim();
      var found = spots.find(s => s.name.includes(keyword)) || mySpots.find(s => s.name.includes(keyword));
      if(found){
        moveToSpot(found);
      } else {
        alert("검색 결과가 없습니다.");
      }
    }
  });

  // 현재 위치 버튼
  document.getElementById('locBtn').addEventListener('click', function() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        map.setView([lat, lon], 15);
        L.marker([lat, lon]).addTo(map).bindPopup("현재 위치").openPopup();
      });
    }
  });

    // 내 촬영지 등록
  document.getElementById('addSpotBtn').addEventListener('click', function() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        var name = prompt("촬영지 이름을 입력하세요:");
        if(name) {
          var newSpot = {name: name, lat: lat, lon: lon};
          mySpots.push(newSpot);
          refreshSpotList(true);
          moveToSpot(newSpot);
        }
      });
    }
  });

  // 명소 목록 열기
  document.getElementById('listBtn').addEventListener('click', function(){
    document.getElementById('panel').style.display = "block";
    refreshSpotList(false);
  });

  // 내 촬영지 목록 열기
  document.getElementById('myListBtn').addEventListener('click', function(){
    document.getElementById('panel').style.display = "block";
    refreshSpotList(true);
  });

  // 지도 전환 버튼
  document.getElementById('satBtn').addEventListener('click', function(){
    if(map.hasLayer(osmLayer)){
      map.removeLayer(osmLayer);
      satLayer.addTo(map);
    } else {
      map.removeLayer(satLayer);
      osmLayer.addTo(map);
    }
  });

  // 🌅 일출 방향 붉은 사선 표시
  var sunriseLine;
  document.getElementById('sunBtn').addEventListener('click', function(){
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        var times = SunCalc.getTimes(new Date(), lat, lon);
        var azimuth = SunCalc.getPosition(times.sunrise, lat, lon).azimuth; 
        var length = 5000; // 5km 길이
        var dx = length * Math.sin(azimuth);
        var dy = length * Math.cos(azimuth);
        var endLat = lat + (dy/111320);
        var endLon = lon + (dx/(111320*Math.cos(lat*Math.PI/180)));

        if(sunriseLine){
          map.removeLayer(sunriseLine);
        }
        sunriseLine = L.polyline([[lat, lon],[endLat, endLon]], {color:'red'}).addTo(map);
        map.setView([lat, lon], 13);
      });
    }
  });

  // 메뉴 버튼 토글 (하단 슬라이드)
  document.getElementById('toggleMenu').addEventListener('click', function(){
    var menu = document.getElementById('slideMenu');
    menu.classList.toggle('open');
  });

  // 지도 크기 조절 버튼 (간단히 확대)
  document.getElementById('resizeMap').addEventListener('click', function(){
    map.setZoom(map.getZoom() + 1);
  });
</script>
</body>
</html>
