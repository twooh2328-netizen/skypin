<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin v3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:sans-serif;}
#map{height:100vh;}

#menuBtn{
  position:fixed;bottom:80px;right:15px;
  width:55px;height:55px;border-radius:50%;
  background:#ff3b30;color:#fff;border:none;z-index:9999;
}

#menu{
  position:fixed;bottom:150px;right:15px;
  display:flex;flex-direction:column;gap:6px;
  transform:scale(0);transition:.2s;z-index:9999;
}
#menu.open{transform:scale(1);}
#menu button{padding:8px;border:none;background:#333;color:#fff;}

#panel{
  position:fixed;top:0;right:0;width:320px;height:100%;
  background:#fff;transform:translateX(100%);
  transition:.3s;z-index:9998;overflow:auto;
}
#panel.show{transform:translateX(0);}

.card{background:#f5f5f5;margin:8px;padding:10px;border-radius:10px;}
.card img{width:100%;border-radius:8px;margin-top:5px;}

input,textarea{width:100%;margin:5px 0;padding:8px;}
</style>
</head>

<body>

<div id="map"></div>

<button id="menuBtn">☰</button>

<div id="menu">
  <button onclick="ACTION.showPOI()">추천명소</button>
  <button onclick="ACTION.showShots()">내 촬영지</button>
  <button onclick="ACTION.gps()">내 위치</button>
  <button onclick="ACTION.sun()">🌅 일출</button>
</div>

<div id="panel">
  <button onclick="closePanel()">닫기</button>
  <input id="search" placeholder="검색..." oninput="ACTION.search(this.value)">
  
  <div id="form" style="display:none;">
    <input id="name" placeholder="이름">
    <textarea id="memo" placeholder="메모"></textarea>
    <input type="file" id="photo" accept="image/*">
    <button onclick="ACTION.saveShot()">저장</button>
  </div>

  <div id="list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* ================= DB ================= */
const DB = {
  defaultPOI: [
    {name:"남산타워",lat:37.5512,lng:126.9882,region:"서울",category:"야경"},
    {name:"한강공원",lat:37.52,lng:126.98,region:"서울",category:"강"},
    {name:"해운대",lat:35.1587,lng:129.1604,region:"부산",category:"바다"},
    {name:"광안리",lat:35.1532,lng:129.1187,region:"부산",category:"야경"},
    {name:"설악산",lat:38.1194,lng:128.4655,region:"강원",category:"산"},
    {name:"속초해변",lat:38.207,lng:128.5918,region:"강원",category:"바다"},
    {name:"경복궁",lat:37.5796,lng:126.977,region:"서울",category:"문화"},
    {name:"불국사",lat:35.79,lng:129.332,region:"경주",category:"문화"},
    {name:"성산일출봉",lat:33.4588,lng:126.941,region:"제주",category:"일출"},
    {name:"협재해변",lat:33.3945,lng:126.2393,region:"제주",category:"바다"}
  ],
  userPOI: JSON.parse(localStorage.getItem("userPOI")||"[]"),
  shots: JSON.parse(localStorage.getItem("shots")||"[]")
};

function saveDB(){
  localStorage.setItem("userPOI",JSON.stringify(DB.userPOI));
  localStorage.setItem("shots",JSON.stringify(DB.shots));
}

function getPOI(){
  return [...DB.defaultPOI,...DB.userPOI];
}

/* ================= MAP ================= */
const map=L.map("map").setView([37.5665,126.978],10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let selected=null;
let layer=L.layerGroup().addTo(map);

/* ================= UI ================= */
document.getElementById("menuBtn").onclick=()=>{
  document.getElementById("menu").classList.toggle("open");
};

map.on("click",e=>{
  selected=e.latlng;
  openPanel();
  document.getElementById("form").style.display="block";
});

/* ================= ACTION ================= */
const ACTION={

showPOI(){
  openPanel();
  render(getPOI(),false);
},

showShots(){
  openPanel();
  render(DB.shots,true);
},

search(q){
  const list=[...getPOI(),...DB.shots];
  const r=list.filter(p=>
    p.name.includes(q) ||
    p.region?.includes(q) ||
    p.category?.includes(q)
  );
  render(r, !!p?.photo);
},

gps(){
  navigator.geolocation.getCurrentPosition(pos=>{
    map.setView([pos.coords.latitude,pos.coords.longitude],15);
  });
},

sun(){
  const c=map.getCenter();
  layer.clearLayers();
  L.polyline([
    [c.lat,c.lng],
    [c.lat+0.1,c.lng+0.1]
  ],{color:"orange"}).addTo(layer);
},

async saveShot(){
  if(!selected) return alert("지도 클릭");

  const file=document.getElementById("photo").files[0];
  let photo="";

  if(file){
    photo=await toBase64(file);
  }

  DB.shots.push({
    name:name.value,
    memo:memo.value,
    lat:selected.lat,
    lng:selected.lng,
    photo
  });

  saveDB();
  this.showShots();
}

};

/* ================= RENDER ================= */
function render(list,isShot){

  const el=document.getElementById("list");
  el.innerHTML="";

  list.forEach((p,i)=>{

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`<b>${p.name}</b><br>${p.memo||""}`;

    if(p.photo){
      const img=document.createElement("img");
      img.src=p.photo;
      div.appendChild(img);
    }

    div.onclick=()=>{
      map.setView([p.lat,p.lng],15);
      layer.clearLayers();

      let html=`<b>${p.name}</b><br>${p.memo||""}`;
      if(p.photo) html+=`<br><img src="${p.photo}" width="120">`;

      L.marker([p.lat,p.lng]).addTo(layer).bindPopup(html).openPopup();
    };

    if(isShot){
      const del=document.createElement("button");
      del.textContent="삭제";
      del.onclick=(e)=>{
        e.stopPropagation();
        DB.shots.splice(i,1);
        saveDB();
        ACTION.showShots();
      };
      div.appendChild(del);
    }

    el.appendChild(div);
  });
}

/* ================= UTIL ================= */
function openPanel(){
  document.getElementById("panel").classList.add("show");
}
function closePanel(){
  document.getElementById("panel").classList.remove("show");
}

function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

</script>
</body>
</html>
