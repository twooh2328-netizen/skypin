<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin Final UI Restore</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:sans-serif;
}

#map{
  height:100vh;
  width:100%;
  z-index:1;
}

/* =====================
   MENU (복구 핵심)
===================== */
#menuBtn{
  position:fixed;
  bottom:80px;
  right:15px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#ff3b30;
  color:#fff;
  border:none;
  z-index:99999;
  font-size:20px;
}

#submenu{
  position:fixed;
  bottom:150px;
  right:15px;
  display:none;
  flex-direction:column;
  gap:6px;
  z-index:99999;
}

#submenu button{
  padding:8px;
  border:none;
  border-radius:6px;
  background:#333;
  color:#fff;
}

/* =====================
   PANEL
===================== */
#panel{
  position:fixed;
  top:0;
  right:0;
  width:300px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  transform:translateX(100%);
  transition:0.3s;
  z-index:99998;
  overflow:auto;
}

#panel.show{
  transform:translateX(0);
}

#close{
  position:sticky;
  top:0;
  width:100%;
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
}

.box{
  padding:10px;
}

input,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

button{
  width:100%;
  margin:5px 0;
  padding:8px;
}

.item{
  padding:8px;
  border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div id="map"></div>

<button id="menuBtn">☰</button>

<div id="submenu">
  <button onclick="openPanel()">📍 촬영지</button>
  <button onclick="gps()">📌 내 위치</button>
</div>

<div id="panel">
  <button id="close">닫기</button>

  <div class="box">

    <h3>📍 촬영지 등록</h3>

    <div id="info">지도에서 클릭하세요</div>

    <input id="name" placeholder="이름">
    <textarea id="memo" placeholder="메모"></textarea>
    <input type="file" id="img">

    <button onclick="save()">저장</button>

    <hr>

    <div id="list"></div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =====================
   MAP
===================== */
const map = L.map("map").setView([37.5665,126.9780],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© OSM"
}).addTo(map);

/* =====================
   STATE
===================== */
let selected = {
  lat:37.5665,
  lng:126.9780
};

let shots = JSON.parse(localStorage.getItem("shots")||"[]");
let markers = [];

/* =====================
   CLICK FIX
===================== */
map.on("click", e=>{

  selected = {
    lat: Number(e.latlng.lat),
    lng: Number(e.latlng.lng)
  };

  document.getElementById("info").innerText =
    `📍 선택됨: ${selected.lat.toFixed(5)}, ${selected.lng.toFixed(5)}`;

  document.getElementById("panel").classList.add("show");
});

/* =====================
   SAVE
===================== */
function save(){

  const name = document.getElementById("name").value;
  const memo = document.getElementById("memo").value;
  const file = document.getElementById("img").files[0];

  if(!name){
    alert("이름 입력");
    return;
  }

  const store = (img="")=>{

    shots.push({
      name,
      memo,
      lat:selected.lat,
      lng:selected.lng,
      img
    });

    localStorage.setItem("shots",JSON.stringify(shots));

    render();
    drawMarkers();

    alert("저장 완료");
  };

  if(file){
    const r = new FileReader();
    r.onload = ()=>store(r.result);
    r.readAsDataURL(file);
  }else{
    store();
  }

  document.getElementById("name").value="";
  document.getElementById("memo").value="";
  document.getElementById("img").value="";
}

/* =====================
   MARKERS
===================== */
function drawMarkers(){

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  shots.forEach(s=>{

    const m=L.marker([s.lat,s.lng])
      .addTo(map)
      .bindPopup(s.name);

    markers.push(m);
  });
}

/* =====================
   LIST
===================== */
function render(){

  const el=document.getElementById("list");

  el.innerHTML="<h4>📌 목록</h4>";

  shots.forEach((s,i)=>{

    el.innerHTML+=`
      <div class="item">
        <b>${s.name}</b><br>
        <small>${s.memo||""}</small><br>

        ${s.img ? `<img src="${s.img}" style="width:100%;border-radius:6px">`:""}

        <button onclick="go(${s.lat},${s.lng})">이동</button>
        <button onclick="del(${i})">삭제</button>
      </div>
    `;
  });
}

/* =====================
   MOVE
===================== */
function go(lat,lng){
  map.setView([lat,lng],14);
}

/* =====================
   DELETE
===================== */
function del(i){
  shots.splice(i,1);
  localStorage.setItem("shots",JSON.stringify(shots));
  render();
  drawMarkers();
}

/* =====================
   MENU FIX
===================== */
const menuBtn = document.getElementById("menuBtn");
const submenu = document.getElementById("submenu");
const panel = document.getElementById("panel");

menuBtn.onclick=()=>{
  submenu.style.display =
    submenu.style.display==="flex"?"none":"flex";
};

function openPanel(){
  panel.classList.add("show");
  submenu.style.display="none";
}

function gps(){
  navigator.geolocation.getCurrentPosition(pos=>{

    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;

    map.setView([lat,lng],15);

    L.marker([lat,lng])
      .addTo(map)
      .bindPopup("📍 내 위치")
      .openPopup();
  });

  submenu.style.display="none";
}

/* CLOSE */
document.getElementById("close").onclick=()=>{
  panel.classList.remove("show");
};

/* INIT */
render();
drawMarkers();

</script>

</body>
</html>
