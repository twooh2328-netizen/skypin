<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin v4 FINAL FIX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;}

/* 🔥 UI 레이어 분리 */
#uiLayer{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 pointer-events:none;
 z-index:10000;
}

/* 버튼은 클릭 가능 */
#menuBtn, #menu, #panel{
 pointer-events:auto;
}

#menuBtn{
 position:absolute;
 bottom:80px;
 right:15px;
 width:55px;
 height:55px;
 border-radius:50%;
 background:#ff3b30;
 color:#fff;
 border:none;
}

#menu{
 position:absolute;
 bottom:150px;
 right:15px;
 display:none;
 flex-direction:column;
 gap:6px;
}

#menu button{
 padding:8px;
 background:#333;
 color:#fff;
 border:none;
}

#panel{
 position:absolute;
 top:0;
 right:0;
 width:320px;
 height:100%;
 background:#fff;
 transform:translateX(100%);
 transition:.3s;
 overflow:auto;
}
#panel.show{transform:translateX(0);}

.card{background:#eee;margin:8px;padding:10px;}
</style>
</head>

<body>

<div id="map"></div>

<!-- 🔥 UI 레이어 -->
<div id="uiLayer">

<button id="menuBtn">☰</button>

<div id="menu">
  <button data-mode="poi">추천명소</button>
  <button data-mode="shots">내 촬영지</button>
  <button data-mode="gps">내 위치</button>
  <button data-mode="sun">🌅 일출</button>
</div>

<div id="panel">
  <button id="closeBtn">닫기</button>
  <input id="search" placeholder="검색...">
  <div id="list"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
window.onload=function(){

/* DOM */
const menuBtn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");
const panel=document.getElementById("panel");
const list=document.getElementById("list");
const closeBtn=document.getElementById("closeBtn");
const search=document.getElementById("search");

/* MAP */
const map=L.map("map").setView([37.56,126.97],10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let markers=L.layerGroup().addTo(map);
let myPos=null;

/* 🔥 메뉴 (완전 안정) */
menuBtn.onclick=(e)=>{
 e.stopPropagation();
 menu.style.display = (menu.style.display==="flex") ? "none" : "flex";
};

/* 패널 */
closeBtn.onclick=()=>panel.classList.remove("show");

/* 메뉴 기능 */
document.querySelectorAll("#menu button").forEach(btn=>{
 btn.onclick=(e)=>{
  e.stopPropagation();
  panel.classList.add("show");

  const mode=btn.dataset.mode;

  if(mode==="poi"){
   list.innerHTML="<div class='card'>남산타워</div>";
  }

  if(mode==="gps"){
   navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;
    map.setView([lat,lng],15);

    markers.clearLayers();
    L.marker([lat,lng]).addTo(markers);

    myPos={lat,lng};
   });
  }

  if(mode==="sun"){
   if(!myPos) return alert("GPS 먼저");
   markers.clearLayers();
   L.polyline([[myPos.lat,myPos.lng],[myPos.lat,myPos.lng+0.2]],{color:"orange"}).addTo(markers);
  }

 };
});

/* 검색 */
search.oninput=e=>{
 const q=e.target.value;
 list.innerHTML=`<div class="card">${q} 검색결과</div>`;
};

};
</script>

</body>
</html>
