<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin Full Restore</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:sans-serif;}
#map{height:100vh;width:100%;}

/* MENU */
#menuBtn{
  position:fixed;
  bottom:80px;
  right:15px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#ff3b30;
  color:#fff;
  border:none;
  z-index:99999;
}

#submenu{
  position:fixed;
  bottom:150px;
  right:15px;
  display:none;
  flex-direction:column;
  gap:6px;
  z-index:99999;
}

#submenu button{
  padding:8px;
  border:none;
  border-radius:6px;
  background:#333;
  color:#fff;
}

/* PANEL */
#panel{
  position:fixed;
  top:0;
  right:0;
  width:320px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  transform:translateX(100%);
  transition:0.3s;
  z-index:99998;
  overflow:auto;
}

#panel.show{transform:translateX(0);}

#close{
  position:sticky;
  top:0;
  width:100%;
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
}

.box{padding:10px;}

input,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

button{
  width:100%;
  margin:5px 0;
  padding:8px;
}

.item{
  padding:8px;
  border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div id="map"></div>

<button id="menuBtn">☰</button>

<div id="submenu">
  <button onclick="render('rec')">추천</button>
  <button onclick="render('region')">지역</button>
  <button onclick="render('cat')">카테고리</button>
  <button onclick="openPanel()">내 촬영지</button>
  <button onclick="gps()">내 위치</button>
</div>

<div id="panel">
  <button id="close">닫기</button>

  <div class="box">

    <h3>📍 촬영지 등록</h3>

    <div id="info">지도 클릭</div>

    <input id="name" placeholder="이름">
    <textarea id="memo" placeholder="메모"></textarea>
    <input type="file" id="img">

    <button onclick="save()">저장</button>

    <hr>

    <div id="list"></div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =====================
   MAP
===================== */
const map=L.map("map").setView([37.5665,126.9780],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© OSM"
}).addTo(map);

/* =====================
   STATE
===================== */
let selected={lat:37.5665,lng:126.9780};
let shots=JSON.parse(localStorage.getItem("shots")||"[]");
let markers=[];

/* =====================
   CLICK FIX
===================== */
map.on("click",e=>{
  selected={
    lat:Number(e.latlng.lat),
    lng:Number(e.latlng.lng)
  };

  document.getElementById("info").innerText=
    `📍 선택: ${selected.lat.toFixed(4)}, ${selected.lng.toFixed(4)}`;

  document.getElementById("panel").classList.add("show");
});

/* =====================
   🔥 추천 20개 복구
===================== */
const DB=[
  {n:"남산",lat:37.5512,lng:126.9882,m:"rec",t:"서울"},
  {n:"한강",lat:37.5086,lng:126.9968,m:"rec",t:"서울"},
  {n:"광안리",lat:35.1532,lng:129.1187,m:"rec",t:"부산"},
  {n:"해운대",lat:35.1587,lng:129.1604,m:"rec",t:"부산"},
  {n:"송도",lat:37.3940,lng:126.6406,m:"rec",t:"인천"},
  {n:"월미도",lat:37.4701,lng:126.6008,m:"rec",t:"인천"},
  {n:"정동진",lat:37.6910,lng:129.0330,m:"rec",t:"강원도"},
  {n:"속초",lat:38.2070,lng:128.5918,m:"rec",t:"강원도"},
  {n:"설악산",lat:38.1194,lng:128.4655,m:"rec",t:"강원도"},
  {n:"제부도",lat:37.1696,lng:126.6219,m:"rec",t:"경기도"},
  {n:"여수",lat:34.7604,lng:127.6622,m:"rec",t:"전남"},
  {n:"순천만",lat:34.9143,lng:127.5126,m:"rec",t:"전남"},
  {n:"전주",lat:35.8151,lng:127.1530,m:"rec",t:"전북"},
  {n:"경주",lat:35.7901,lng:129.3325,m:"rec",t:"경북"},
  {n:"보문호",lat:35.8453,lng:129.2175,m:"rec",t:"경북"},
  {n:"태안",lat:36.5851,lng:126.3242,m:"rec",t:"충남"},
  {n:"한라산",lat:33.3617,lng:126.5292,m:"rec",t:"제주"},
  {n:"성산일출봉",lat:33.4581,lng:126.9425,m:"rec",t:"제주"},
  {n:"임진각",lat:37.8872,lng:126.7409,m:"rec",t:"경기"},
  {n:"대왕암",lat:35.4922,lng:129.4310,m:"rec",t:"울산"},

  {n:"부산바다",lat:35.1532,lng:129.1187,m:"region",t:"부산"},
  {n:"송도",lat:37.3940,lng:126.6406,m:"region",t:"인천"},
  {n:"속초",lat:38.2070,lng:128.5918,m:"region",t:"강원도"},

  {n:"설악산",lat:38.1194,lng:128.4655,m:"cat",t:"산"},
  {n:"해운대",lat:35.1587,lng:129.1604,m:"cat",t:"바다"},
  {n:"성산일출봉",lat:33.4581,lng:126.9425,m:"cat",t:"일출"},
  {n:"경주",lat:35.7901,lng:129.3325,m:"cat",t:"역사"},
  {n:"전주",lat:35.8151,lng:127.1530,m:"cat",t:"문화"}
];

/* =====================
   RENDER LIST
===================== */
function render(type){

  const el=document.getElementById("list");

  const list=DB.filter(p=>p.m===type);

  el.innerHTML=list.map(p=>
    `<button onclick="go(${p.lat},${p.lng},'${p.n}')">
      📍 ${p.n} (${p.t})
    </button>`
  ).join("");
}

/* =====================
   MOVE
===================== */
function go(lat,lng,name){

  map.setView([lat,lng],13);

  L.marker([lat,lng])
    .addTo(map)
    .bindPopup(name)
    .openPopup();
}

/* =====================
   SAVE SHOT
===================== */
function save(){

  const name=document.getElementById("name").value;
  const memo=document.getElementById("memo").value;
  const file=document.getElementById("img").files[0];

  const store=(img="")=>{

    shots.push({
      name,
      memo,
      lat:selected.lat,
      lng:selected.lng,
      img
    });

    localStorage.setItem("shots",JSON.stringify(shots));

    draw();
    alert("저장 완료");
  };

  if(file){
    const r=new FileReader();
    r.onload=()=>store(r.result);
    r.readAsDataURL(file);
  }else store();

  document.getElementById("name").value="";
  document.getElementById("memo").value="";
}

/* =====================
   MARKERS
===================== */
function draw(){

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  shots.forEach(s=>{

    const m=L.marker([s.lat,s.lng])
      .addTo(map)
      .bindPopup(s.name);

    markers.push(m);
  });
}

/* =====================
   MENU
===================== */
const menu=document.getElementById("menuBtn");
const sub=document.getElementById("submenu");
const panel=document.getElementById("panel");

menu.onclick=()=>{
  sub.style.display=sub.style.display==="flex"?"none":"flex";
};

function openPanel(){
  panel.classList.add("show");
  sub.style.display="none";
}

function gps(){

  navigator.geolocation.getCurrentPosition(p=>{

    map.setView([p.coords.latitude,p.coords.longitude],15);

    L.marker([p.coords.latitude,p.coords.longitude])
      .addTo(map)
      .bindPopup("📍 내 위치")
      .openPopup();
  });

  sub.style.display="none";
}

/* CLOSE */
document.getElementById("close").onclick=()=>{
  panel.classList.remove("show");
};

/* INIT */
draw();

</script>

</body>
</html>
