<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>SkyPin SAFE</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;width:100%;}
</style>
</head>

<body>

<div id="map"></div>
<input type="file" id="photoInput" style="display:none">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

(() => {

"use strict"; // 에러 즉시 확인

// =====================
// 1. SAFE INIT
// =====================
const map = L.map("map").setView([37.5,127],11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19
}).addTo(map);

// marker layer
const markerLayer = L.layerGroup().addTo(map);

// safe variables (핵심)
let selected = null;
let mySpots = [];

// =====================
// 2. CLICK SAFE
// =====================
map.on("click",(e)=>{

try{

selected = {
lat:e.latlng.lat,
lng:e.latlng.lng
};

document.getElementById("photoInput").click();

}catch(err){
console.log("CLICK ERROR SAFE:",err);
}

});

// =====================
// 3. PHOTO SAFE
// =====================
document.getElementById("photoInput")
.addEventListener("change",(e)=>{

try{

const file=e.target.files[0];
if(!file || !selected) return;

const reader=new FileReader();

reader.onload=(ev)=>{

const img=ev.target.result;

// marker
L.marker([selected.lat,selected.lng])
.addTo(markerLayer)
.bindPopup(`<img src="${img}" width="200">`);

// save
mySpots.push({
lat:selected.lat,
lng:selected.lng,
img:img
});

localStorage.setItem("mySpots",JSON.stringify(mySpots));

};

reader.readAsDataURL(file);

}catch(err){
console.log("UPLOAD ERROR SAFE:",err);
}

});

// =====================
// 4. LOAD SAFE
// =====================
window.addEventListener("load",()=>{

try{

const saved=localStorage.getItem("mySpots");

if(saved){

mySpots=JSON.parse(saved);

mySpots.forEach(s=>{

L.marker([s.lat,s.lng])
.addTo(markerLayer)
.bindPopup("📍 저장된 촬영지");

});

}

}catch(err){
console.log("LOAD ERROR SAFE:",err);
}

});

})();

</script>

</body>
</html>
