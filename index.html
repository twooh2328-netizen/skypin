<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="utf-8">
<title>SkyPin Drone Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* 기본 */

html,body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
width:100%;
height:100%;
}

/* 메뉴 */

#menuBtn{
position:absolute;
top:15px;
left:10px;
z-index:1200;
background:white;
padding:12px 16px;
border-radius:12px;
font-size:24px;
cursor:pointer;
box-shadow:0 0 6px rgba(0,0,0,0.3);
}

/* 상단 UI */

#topBar{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:1000;
background:white;
padding:14px;
border-radius:14px;
box-shadow:0 0 10px rgba(0,0,0,0.25);
width:360px;
text-align:center;
}

#searchBox{
width:95%;
padding:14px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
}

/* 버튼 */

#buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

#buttons button{
padding:14px;
border:none;
border-radius:10px;
background:#f2f2f2;
font-size:16px;
cursor:pointer;
}

#buttons button:hover{
background:#e5e5e5;
}

/* 패널 */

#panel{
position:absolute;
left:0;
top:0;
width:260px;
height:100%;
background:white;
z-index:1100;
overflow:auto;
box-shadow:2px 0 8px rgba(0,0,0,0.3);
display:none;
}

#panel h3{
margin:12px;
}

#spotList{
list-style:none;
padding:0;
margin:0;
}

#spotList li{
padding:14px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

/* 모바일 UI 확대 */

@media (max-width:768px){

#topBar{
width:95%;
padding:16px;
}

#searchBox{
font-size:20px;
padding:16px;
}

#buttons button{
font-size:18px;
padding:16px;
}

#panel{
width:85%;
}

#menuBtn{
font-size:26px;
padding:12px 16px;
}

}

</style>

</head>

<body>

<div id="menuBtn">☰</div>

<div id="panel">
<h3>촬영지 목록</h3>
<ul id="spotList"></ul>
</div>

<div id="topBar">

<input id="searchBox" placeholder="촬영지 검색">

<div id="buttons">

<button id="locBtn">📍 현재위치</button>
<button id="nfBtn">🚫 비행금지</button>

<button id="flyBtn">🚁 비행가능</button>
<button id="sunBtn">🌅 일출방향</button>

<button id="satBtn">🛰 지도전환</button>

</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* 지도 생성 */

var map=L.map("map").setView([37.5665,126.9780],8);

/* 지도 오류 방지 */

setTimeout(function(){
map.invalidateSize();
},500);

/* 지도 타일 */

var normal=L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:19}
).addTo(map);

var satellite=L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
{maxZoom:19}
);

var sat=false;

/* 드론 아이콘 */

var droneIcon=L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/854/854878.png",
iconSize:[32,32]
});

/* 저장 데이터 */

var saved=localStorage.getItem("skypin_spots");

var spots=saved?JSON.parse(saved):[
{name:"서울숲",lat:37.5444,lng:127.0374,desc:"드론 촬영 명소"},
{name:"남산",lat:37.5512,lng:126.9882,desc:"서울 야경"},
{name:"제부도",lat:37.169,lng:126.629,desc:"바다 촬영"}
];

var markers=[];

/* 저장 */

function saveSpots(){
localStorage.setItem("skypin_spots",JSON.stringify(spots));
}

/* 마커 생성 */

function addMarker(spot){

var marker=L.marker([spot.lat,spot.lng],{icon:droneIcon})
.addTo(map)
.bindPopup("<b>"+spot.name+"</b><br>"+spot.desc);

marker.spotName=spot.name.toLowerCase();

markers.push(marker);

}

/* 목록 */

function updateList(){

var list=document.getElementById("spotList");
list.innerHTML="";

spots.forEach(function(s){

var li=document.createElement("li");
li.textContent=s.name;

li.onclick=function(){
map.flyTo([s.lat,s.lng],13);
};

list.appendChild(li);

});

}

spots.forEach(addMarker);
updateList();

/* 지도 클릭 촬영지 추가 */

map.on("click",function(e){

var name=prompt("촬영지 이름");
if(!name) return;

var desc=prompt("촬영 설명");

var spot={
name:name,
lat:e.latlng.lat,
lng:e.latlng.lng,
desc:desc
};

spots.push(spot);

saveSpots();

addMarker(spot);

updateList();

});

/* 검색 */

document.getElementById("searchBox")
.addEventListener("keyup",function(){

var keyword=this.value.toLowerCase();

markers.forEach(function(m){

if(m.spotName.includes(keyword)){
map.flyTo(m.getLatLng(),13);
m.openPopup();
}

});

});

/* 현재 위치 */

var myMarker;

document.getElementById("locBtn").onclick=function(){
map.locate({setView:true,maxZoom:13});
};

map.on("locationfound",function(e){

if(myMarker) map.removeLayer(myMarker);

myMarker=L.marker(e.latlng)
.addTo(map)
.bindPopup("현재 위치")
.openPopup();

});

/* 비행금지 */

document.getElementById("nfBtn").onclick=function(){

var zones=[
[37.5665,126.9780],
[35.1796,129.0756],
[33.5113,126.4928]
];

zones.forEach(function(z){

L.circle(z,{
radius:5000,
color:"red",
fillOpacity:0.3
}).addTo(map);

});

};

/* 비행가능 */

document.getElementById("flyBtn").onclick=function(){

var zones=[
[38.0703,128.6319],
[37.169,126.629],
[36.5,127.5]
];

zones.forEach(function(z){

L.circle(z,{
radius:4000,
color:"green",
fillOpacity:0.2
}).addTo(map);

});

};

/* 일출 방향 */

document.getElementById("sunBtn").onclick=function(){

var c=map.getCenter();

var sunrise=[c.lat+0.05,c.lng+0.05];

L.polyline(
[[c.lat,c.lng],sunrise],
{color:"orange"}
).addTo(map);

};

/* 지도 전환 */

document.getElementById("satBtn").onclick=function(){

if(!sat){
map.removeLayer(normal);
satellite.addTo(map);
sat=true;
}else{
map.removeLayer(satellite);
normal.addTo(map);
sat=false;
}

};

/* 패널 */

var panel=document.getElementById("panel");

document.getElementById("menuBtn").onclick=function(){

panel.style.display=
panel.style.display==="block"?"none":"block";

};

</script>

</body>
</html>
