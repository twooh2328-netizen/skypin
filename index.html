<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스카이핀 - 드론 지도 앱</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; width: 100%; z-index:1;}
    .fab { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff;
      border-radius: 8px; width: 80px; height: 40px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 1000; }
    .submenu { position: fixed; bottom: 70px; right: 20px; display: none; flex-direction: column; gap: 10px; z-index: 1000; }
    .submenu button { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; color: #fff; font-size: 14px; font-weight: bold; }
    .submenu button:hover { filter: brightness(85%); }
    .recommend { background: #28a745; } .category { background: #6f42c1; }
    .region { background: #17a2b8; } .shots { background: #ffc107; color:#000; }
    .sun { background: #fd7e14; } .location { background: #007bff; }
.side-panel {
  position: fixed;
  top: 0;
  right: -280px;       /* 숨김 상태: 데스크톱에서는 픽셀 단위로 밀어내기 */
  width: 280px;        /* 데스크톱에서는 고정 폭 */
  height: 100%;
  background: #f8f9fa;
  box-shadow: -2px 0 6px rgba(0,0,0,0.3);
  transition: right 0.3s ease;
  overflow-y: auto;
  z-index: 999;
  padding-top: 40px;
}
.side-panel.show {
  right: 0;            /* show 클래스가 붙으면 화면 안으로 들어옴 */
}

/* 모바일 화면 (768px 이하)에서는 반응형으로 넓게 */
@media (max-width: 768px) {
  .side-panel {
    right: -70%;       /* 숨김 상태: 모바일에서는 퍼센트 단위로 밀어내기 */
    width: 70%;        /* 모바일에서는 화면의 70% 폭 */
    max-width: none;   /* 최대 폭 제한 해제 */
  }
}

    #closePanelBtn { position: absolute; top: 10px; right: 10px; background: #dc3545; color: #fff; border: none;
      border-radius: 4px; padding: 5px 10px; cursor: pointer; }
    #closePanelBtn:hover { background: #c82333; }
    .tab-content { display: none; padding: 10px; }
    .tab-content.active { display: block; }
    .accordion-item { border-bottom: 1px solid #ddd; }
    .accordion-header { width: 100%; text-align: left; padding: 10px; background: #eee; border: none; cursor: pointer; font-weight: bold; }
    .accordion-body { display: none; padding: 10px; background: #f9f9f9; }
    .accordion-body.show { display: block; }
    .attraction-item { padding: 8px; border-bottom: 1px solid #ddd; cursor: pointer; }
    .attraction-item:hover { background: #eee; }
    .deleteShot { margin-left: 10px; font-size: 12px; color: red; cursor: pointer; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="fab" id="menuBtn">메뉴</div>
  <div class="submenu" id="submenu">
    <button class="recommend" data-target="recommend">추천</button>
    <button class="category" data-target="category">카테고리</button>
    <button class="region" data-target="region">지역별</button>
    <button class="shots" data-target="myshots">촬영지</button>
    <button class="sun" data-target="sun">일출</button>
    <button class="location" data-target="location">위치</button>
  </div>
  <div id="sidePanel" class="side-panel">
    <button id="closePanelBtn">닫기 ✖</button>
    <div class="tab-content" id="recommend">
      <h3>추천 명소</h3>
      <div class="accordion-item">
        <button class="accordion-header">서울 인기</button>
        <div class="accordion-body">
          <div class="attraction-item">남산타워</div>
          <div class="attraction-item">한강공원</div>
        </div>
      </div>
    </div>
    <div class="tab-content" id="category">
      <h3>카테고리</h3>
      <div class="accordion-item">
        <button class="accordion-header">자연</button>
        <div class="accordion-body">
          <div class="attraction-item">설악산</div>
        </div>
      </div>
    </div>
    <div class="tab-content" id="region">
      <h3>지역별</h3>
      <div class="accordion-item">
        <button class="accordion-header">서울</button>
        <div class="accordion-body">
          <div class="attraction-item">경복궁</div>
        </div>
      </div>
    </div>
    <div class="tab-content" id="myshots">
      <h3>내 촬영지</h3>
      <input type="text" id="shotName" placeholder="촬영지 이름"><br>
      <input type="text" id="shotMemo" placeholder="메모"><br>
      <button id="addShotBtn">추가</button>
      <div id="myshots-list"></div>
    </div>
    <div class="tab-content" id="sun"><h3>일출 방향</h3></div>
    <div class="tab-content" id="location"><h3>현재 위치</h3></div>
  </div>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([37.5665, 126.9780], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const menuBtn = document.getElementById('menuBtn');
    const submenu = document.getElementById('submenu');
    menuBtn.addEventListener('click', () => {
      submenu.style.display = submenu.style.display === 'flex' ? 'none' : 'flex';
    });

    const sidePanel = document.getElementById('sidePanel');
    document.querySelectorAll('.submenu button').forEach(btn => {
      btn.addEventListener('click', () => {
         const targetId = btn.getAttribute('data-target');
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        const targetContent = document.getElementById(targetId);
        if (targetContent) targetContent.classList.add('active');
        sidePanel.classList.add('show');
        const firstAccordion = targetContent.querySelector('.accordion-body');
       if (firstAccordion) firstAccordion.classList.add('show');
       }
      });
    });
    document.getElementById('closePanelBtn').addEventListener('click', () => {
      sidePanel.classList.remove('show');
    });
    // 아코디언 동작
    document.querySelectorAll('.accordion-header').forEach(header => {
      header.addEventListener('click', () => {
        const body = header.nextElementSibling;
        body.classList.toggle('show');
      });
    });

    // 명소 좌표 매핑
    const places = {
      "남산타워": [37.5512, 126.9882],
      "한강공원": [37.5286, 126.9326],
      "설악산": [38.1194, 128.4656],
      "경복궁": [37.5796, 126.9770]
    };
sidePanel.addEventListener('click', (e) => {
  if (e.target.classList.contains('attraction-item')) {
    const place = e.target.textContent;
    if (places[place]) {
      L.marker(places[place]).addTo(map).bindPopup(place).openPopup();
      map.setView(places[place], 14);
    }
  }
});

    // 내 촬영지 LocalStorage 관리
    function loadShots() {
      const list = document.getElementById('myshots-list');
      list.innerHTML = '';
      const shots = JSON.parse(localStorage.getItem('shots') || '[]');
      shots.forEach((shot, index) => {
        const item = document.createElement('div');
        item.className = 'attraction-item';
        item.innerHTML = `${shot.name} <button data-index="${index}" class="deleteShot">삭제</button>`;
        item.addEventListener('click', () => {
          L.marker([shot.lat, shot.lng]).addTo(map)
            .bindPopup(`${shot.name}<br>${shot.memo}`).openPopup();
          map.setView([shot.lat, shot.lng], 14);
        });
        list.appendChild(item);
      });
    document.querySelectorAll('.deleteShot').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const idx = btn.getAttribute('data-index');
    // [수정 부분] shots 배열을 다시 불러오기
    const shots = JSON.parse(localStorage.getItem('shots') || '[]');
    shots.splice(idx, 1);
    localStorage.setItem('shots', JSON.stringify(shots));
    loadShots();
  });
});
    // 촬영지 추가 버튼 이벤트
    const addShotBtn = document.getElementById('addShotBtn');
    addShotBtn.addEventListener('click', () => {
      const name = document.getElementById('shotName').value;
      const memo = document.getElementById('shotMemo').value;
      if (name) {
        const center = map.getCenter();
        const shots = JSON.parse(localStorage.getItem('shots') || '[]');
        shots.push({name, memo, lat:center.lat, lng:center.lng});
        localStorage.setItem('shots', JSON.stringify(shots));
        loadShots();
     });
    });

    // 페이지 로드 시 촬영지 불러오기
    loadShots();

    // --- 일출 방향 표시 ---
    function showSunDirection() {
      const center = map.getCenter();
      const eastPoint = [center.lat, center.lng + 0.05];
      L.polyline([center, eastPoint], {color: 'orange'}).addTo(map);
      L.marker(eastPoint, {
        icon: L.divIcon({className: 'sun-icon', html: '🌅'})
      }).addTo(map).bindPopup("일출 방향 (동쪽)").openPopup();
    }
    document.querySelector('.sun').addEventListener('click', showSunDirection);

    // 현재 위치 버튼 이벤트
    const locationBtn = document.querySelector('.location');
    locationBtn.addEventListener('click', () => {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          map.setView([lat, lng], 16);
          L.marker([lat, lng]).addTo(map)
            .bindPopup("현재 위치")
            .openPopup();
        }, () => {
          alert("현재 위치를 가져올 수 없습니다.");
        });
      }
    });

    // --- 모든 초기화 완료 ---
    console.log("스카이핀 앱 초기화 완료!");
  </script>
</body>
</html>
