<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin Full Split</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:sans-serif;}
#map{height:100vh;width:100%;}

/* MENU */
#menuBtn{
  position:fixed;
  bottom:80px;
  right:15px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#ff3b30;
  color:#fff;
  border:none;
  z-index:99999;
}

#menu{
  position:fixed;
  bottom:150px;
  right:15px;
  display:none;
  flex-direction:column;
  gap:6px;
  z-index:99999;
}

#menu button{
  padding:8px;
  border:none;
  border-radius:6px;
  background:#333;
  color:#fff;
}

/* PANEL COMMON */
.panel{
  position:fixed;
  top:0;
  right:0;
  width:320px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  transform:translateX(100%);
  transition:0.3s;
  z-index:99998;
  overflow:auto;
}

.panel.show{transform:translateX(0);}

.close{
  width:100%;
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
}

/* explore */
#exploreBox button,
#recordBox button{
  width:100%;
  margin:5px 0;
  padding:8px;
}

input,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

.item{
  border-bottom:1px solid #ddd;
  padding:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<button id="menuBtn">☰</button>

<div id="menu">
  <button onclick="openExplore('rec')">추천</button>
  <button onclick="openExplore('region')">지역</button>
  <button onclick="openExplore('cat')">카테고리</button>
  <button onclick="openRecord()">내 촬영지</button>
</div>

<!-- ================= 탐색 ================= -->
<div id="explorePanel" class="panel">
  <button class="close" onclick="closeAll()">닫기</button>
  <div id="exploreBox"></div>
</div>

<!-- ================= 촬영지 ================= -->
<div id="recordPanel" class="panel">
  <button class="close" onclick="closeAll()">닫기</button>

  <div id="recordBox">

    <h3>📍 촬영지 등록</h3>

    <div id="info">지도 클릭</div>

    <input id="name" placeholder="이름">
    <textarea id="memo" placeholder="메모"></textarea>

    <button onclick="save()">저장</button>

    <hr>

    <div id="list"></div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */
const map = L.map("map").setView([37.5665,126.9780],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© OSM"
}).addTo(map);

/* STATE */
let selected=null;
let shots=JSON.parse(localStorage.getItem("shots")||"[]");
let markers=[];

/* CLICK */
map.on("click",e=>{
  selected={lat:e.latlng.lat,lng:e.latlng.lng};
  document.getElementById("info").innerText=
    `${selected.lat.toFixed(4)}, ${selected.lng.toFixed(4)}`;
  openRecord();
});

/* DB */
const DB=[
  {n:"남산",lat:37.5512,lng:126.9882,m:"rec",t:"서울"},
  {n:"한강",lat:37.5086,lng:126.9968,m:"rec",t:"서울"},
  {n:"해운대",lat:35.1587,lng:129.1604,m:"rec",t:"부산"},
  {n:"광안리",lat:35.1532,lng:129.1187,m:"rec",t:"부산"},
  {n:"송도",lat:37.3940,lng:126.6406,m:"region",t:"인천"},
  {n:"속초",lat:38.2070,lng:128.5918,m:"region",t:"강원"},
  {n:"설악산",lat:38.1194,lng:128.4655,m:"cat",t:"산"},
  {n:"해운대",lat:35.1587,lng:129.1604,m:"cat",t:"바다"}
];

/* MENU */
document.getElementById("menuBtn").onclick=()=>{
  const m=document.getElementById("menu");
  m.style.display=m.style.display==="flex"?"none":"flex";
};

/* OPEN */
function openExplore(type){
  closeAll();
  document.getElementById("explorePanel").classList.add("show");

  const el=document.getElementById("exploreBox");
  el.innerHTML=DB.filter(d=>d.m===type)
  .map(d=>
    `<button onclick="go(${d.lat},${d.lng},'${d.n}')">${d.n}</button>`
  ).join("");

  document.getElementById("menu").style.display="none";
}

function openRecord(){
  closeAll();
  document.getElementById("recordPanel").classList.add("show");
  renderShots();
  document.getElementById("menu").style.display="none";
}

/* CLOSE */
function closeAll(){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("show"));
}

/* MOVE */
function go(lat,lng,name){
  map.setView([lat,lng],13);
  L.marker([lat,lng]).addTo(map).bindPopup(name).openPopup();
}

/* SAVE */
function save(){
  if(!selected){alert("지도 클릭");return;}

  shots.push({
    name:document.getElementById("name").value,
    memo:document.getElementById("memo").value,
    lat:selected.lat,
    lng:selected.lng
  });

  localStorage.setItem("shots",JSON.stringify(shots));
  renderShots();
}

/* SHOTS */
function renderShots(){

  const el=document.getElementById("list");
  el.innerHTML="";

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  shots.forEach((s,i)=>{

    el.innerHTML+=`
      <div class="item">
        📍 ${s.name}
        <button onclick="del(${i})">삭제</button>
      </div>
    `;

    markers.push(
      L.marker([s.lat,s.lng]).addTo(map)
    );
  });
}

/* DELETE */
function del(i){
  shots.splice(i,1);
  localStorage.setItem("shots",JSON.stringify(shots));
  renderShots();
}

renderShots();

</script>

</body>
</html>
