<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin Fix Stable</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:sans-serif;
}

#map{
  height:100vh;
  width:100%;
}

/* 🔥 패널 더 줄임 (핵심 수정) */
.panel{
  position:fixed;
  top:0;
  right:0;
  width:60%;          /* ✔ 기존 70% → 60% */
  max-width:280px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  transform:translateX(100%);
  transition:0.3s;
  z-index:9999;
  overflow:auto;
}

.panel.show{
  transform:translateX(0);
}

.closeBtn{
  position:sticky;
  top:0;
  width:100%;
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
}

#menuBtn{
  position:fixed;
  bottom:70px;
  right:15px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#ff3b30;
  color:#fff;
  border:none;
  z-index:9999;
}

#submenu{
  position:fixed;
  bottom:140px;
  right:15px;
  display:none;
  flex-direction:column;
  gap:6px;
  z-index:9999;
}

#submenu button{
  padding:8px;
  border:none;
  border-radius:6px;
  background:#333;
  color:#fff;
}

.content{padding:12px;}

.item{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #eee;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.saveBtn{
  width:100%;
  padding:10px;
  background:#007aff;
  color:#fff;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<button id="menuBtn">☰</button>

<!-- MENU -->
<div id="submenu">
  <button data-action="recommend">추천</button>
  <button data-action="region">지역</button>
  <button data-action="category">카테고리</button>
  <button data-action="shots">내 촬영지</button>
  <button data-action="mylocation">내 위치</button>
</div>

<!-- PANEL -->
<div id="panel" class="panel">
  <button class="closeBtn" id="closePanel">✖ 닫기</button>
  <div class="content">
    <div id="tabContent"></div>
  </div>
</div>

<!-- SHOT -->
<div id="shotPanel" class="panel">
  <button class="closeBtn" id="closeShotPanel">✖ 닫기</button>
  <div class="content">

    <h3>📍 촬영지</h3>

    <input id="name" placeholder="이름">
    <input id="memo" placeholder="메모">

    <button class="saveBtn" onclick="addShot()">저장</button>

    <div id="list"></div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =====================
   MAP
===================== */
const App={
  map:null,
  shots:JSON.parse(localStorage.getItem("shots")||"[]"),
  markers:[]
};

App.map=L.map("map").setView([37.5665,126.9780],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© OSM"
}).addTo(App.map);

/* =====================
   DB (정상 유지)
===================== */
const DroneDB=[
  {name:"남산",lat:37.5512,lng:126.9882,mode:"recommend",tag:"서울"},
  {name:"한강",lat:37.5086,lng:126.9968,mode:"recommend",tag:"야경"},
  {name:"광안리",lat:35.1532,lng:129.1187,mode:"recommend",tag:"부산"},

  {name:"정동진",lat:37.6910,lng:129.0330,mode:"region",tag:"강원도"},
  {name:"제부도",lat:37.1696,lng:126.6219,mode:"region",tag:"경기도"},

  {name:"설악산",lat:38.1194,lng:128.4655,mode:"category",tag:"산"},
  {name:"불국사",lat:35.7901,lng:129.3325,mode:"category",tag:"역사"}
];

let mapMarkers=[];

/* =====================
   🔥 FIXED MAP FUNCTION
===================== */
function showPlaces(mode,tag){

  mapMarkers.forEach(m=>App.map.removeLayer(m));
  mapMarkers=[];

  const list=DroneDB.filter(p=>p.mode===mode && p.tag===tag);

  if(list.length===0){
    alert("데이터 없음");
    return;
  }

  list.forEach(p=>{
    const m=L.marker([p.lat,p.lng])
      .addTo(App.map)
      .bindPopup(p.name);

    mapMarkers.push(m);
  });

  App.map.setView([list[0].lat,list[0].lng],11);
}

/* =====================
   SHOT
===================== */
function renderShots(){

  const list=document.getElementById("list");
  list.innerHTML="";

  App.markers.forEach(m=>App.map.removeLayer(m));
  App.markers=[];

  App.shots.forEach((s,i)=>{

    const row=document.createElement("div");
    row.className="item";

    row.innerHTML=`
      <span>📍 ${s.name}</span>
      <button onclick="del(${i})">삭제</button>
    `;

    list.appendChild(row);

    const m=L.marker([s.lat,s.lng]).addTo(App.map);
    App.markers.push(m);
  });

  localStorage.setItem("shots",JSON.stringify(App.shots));
}

function addShot(){

  const name=document.getElementById("name").value;
  const memo=document.getElementById("memo").value;

  if(!name) return alert("이름 입력");

  const c=App.map.getCenter();

  App.shots.push({name,memo,lat:c.lat,lng:c.lng});

  renderShots();
}

function del(i){
  App.shots.splice(i,1);
  renderShots();
}

/* =====================
   MENU FIXED
===================== */
const submenu=document.getElementById("submenu");
const panel=document.getElementById("panel");
const shotPanel=document.getElementById("shotPanel");

document.getElementById("menuBtn").onclick=()=>{
  submenu.style.display=submenu.style.display==="flex"?"none":"flex";
};

document.querySelectorAll("#submenu button").forEach(btn=>{
  btn.onclick=()=>{

    const a=btn.dataset.action;

    if(a==="shots"){
      shotPanel.classList.add("show");
      panel.classList.remove("show");
      renderShots();
    }

    else if(a==="mylocation"){
      navigator.geolocation.getCurrentPosition(pos=>{
        App.map.setView([pos.coords.latitude,pos.coords.longitude],15);
      });
    }

    else{
      panel.classList.add("show");
      shotPanel.classList.remove("show");

      document.getElementById("tabContent").innerHTML=`
        <h4>${a}</h4>
        <button onclick="showPlaces('${a}','서울')">서울</button>
        <button onclick="showPlaces('${a}','부산')">부산</button>
        <button onclick="showPlaces('${a}','야경')">야경</button>
        <button onclick="showPlaces('${a}','산')">산</button>
        <button onclick="showPlaces('${a}','경기도')">경기도</button>
        <button onclick="showPlaces('${a}','강원도')">강원도</button>
      `;
    }

    submenu.style.display="none";
  };
});

/* CLOSE */
document.getElementById("closePanel").onclick=()=>panel.classList.remove("show");
document.getElementById("closeShotPanel").onclick=()=>shotPanel.classList.remove("show");

renderShots();

</script>

</body>
</html>
