<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin v4 FINAL (STABLE)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:sans-serif;}
#map{height:100vh;}

/* 🔥 UI 레이어 */
#ui{
 position:fixed;
 top:0;left:0;width:100%;height:100%;
 pointer-events:none;
 z-index:10000;
}

/* 클릭 가능 */
#menuBtn,#menu,#panel{ pointer-events:auto; }

#menuBtn{
 position:absolute;bottom:80px;right:15px;
 width:55px;height:55px;border-radius:50%;
 background:#ff3b30;color:#fff;border:none;
}

#menu{
 position:absolute;bottom:150px;right:15px;
 display:none;flex-direction:column;gap:6px;
}
#menu button{padding:8px;background:#333;color:#fff;border:none;}

#panel{
 position:absolute;top:0;right:0;width:320px;height:100%;
 background:#fff;transform:translateX(100%);
 transition:.3s;overflow:auto;
}
#panel.show{transform:translateX(0);}

.card{background:#f5f5f5;margin:8px;padding:10px;border-radius:10px;}
.card img{width:100%;margin-top:5px;}

input,textarea{width:100%;margin:5px 0;padding:8px;}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">

<button id="menuBtn">☰</button>

<div id="menu">
  <button id="btnPOI">추천명소</button>
  <button id="btnShots">내 촬영지</button>
  <button id="btnGPS">내 위치</button>
  <button id="btnSun">🌅 일출</button>
</div>

<div id="panel">
  <button id="closeBtn">닫기</button>
  <input id="search" placeholder="검색...">

  <div id="poiForm" style="display:none;">
    <input id="poiName" placeholder="명소 이름">
    <input id="poiRegion" placeholder="지역">
    <button id="addPOI">명소 추가</button>
  </div>

  <div id="shotForm" style="display:none;">
    <input id="name" placeholder="이름">
    <textarea id="memo"></textarea>
    <input type="file" id="photo">
    <button id="saveShot">저장</button>
  </div>

  <div id="list"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
window.onload=function(){

/* DOM */
const menuBtn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");
const panel=document.getElementById("panel");
const listEl=document.getElementById("list");

const btnPOI=document.getElementById("btnPOI");
const btnShots=document.getElementById("btnShots");
const btnGPS=document.getElementById("btnGPS");
const btnSun=document.getElementById("btnSun");

const poiForm=document.getElementById("poiForm");
const shotForm=document.getElementById("shotForm");

const poiName=document.getElementById("poiName");
const poiRegion=document.getElementById("poiRegion");

const name=document.getElementById("name");
const memo=document.getElementById("memo");
const photo=document.getElementById("photo");

const addPOI=document.getElementById("addPOI");
const saveShot=document.getElementById("saveShot");

/* DB */
const DB={
 defaultPOI:[
  {name:"남산타워",lat:37.5512,lng:126.9882,region:"서울"},
  {name:"한강공원",lat:37.52,lng:126.98,region:"서울"}
 ],
 userPOI:JSON.parse(localStorage.getItem("userPOI")||"[]"),
 shots:JSON.parse(localStorage.getItem("shots")||"[]")
};

function saveDB(){
 localStorage.setItem("userPOI",JSON.stringify(DB.userPOI));
 localStorage.setItem("shots",JSON.stringify(DB.shots));
}

/* MAP */
const map=L.map("map").setView([37.5665,126.978],10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let selected=null;
let markers=L.layerGroup().addTo(map);

/* 메뉴 */
menuBtn.onclick=(e)=>{
 e.stopPropagation();
 menu.style.display=(menu.style.display==="flex")?"none":"flex";
};

btnPOI.onclick=()=>{
 openPanel();
 poiForm.style.display="block";
 shotForm.style.display="none";
 renderPOI();
};

btnShots.onclick=()=>{
 openPanel();
 poiForm.style.display="none";
 shotForm.style.display="block";
 renderShots();
};

btnGPS.onclick=()=>{
 navigator.geolocation.getCurrentPosition(pos=>{
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;
  map.setView([lat,lng],15);
  markers.clearLayers();
  L.marker([lat,lng]).addTo(markers);
  window.myPos={lat,lng};
 });
};

btnSun.onclick=()=>{
 if(!window.myPos) return alert("내 위치 먼저");
 markers.clearLayers();
 const {lat,lng}=window.myPos;
 L.polyline([[lat,lng],[lat,lng+0.2]],{color:"orange"}).addTo(markers);
};

/* POI */
function renderPOI(){
 const list=[...DB.defaultPOI,...DB.userPOI];
 listEl.innerHTML="";
 list.forEach((p,i)=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<b>${p.name}</b><br>${p.region}`;

  div.onclick=()=>{
   map.setView([p.lat,p.lng],15);
   markers.clearLayers();
   L.marker([p.lat,p.lng]).addTo(markers);
  };

  if(i>=DB.defaultPOI.length){
   const del=document.createElement("button");
   del.textContent="삭제";
   del.onclick=(e)=>{
    e.stopPropagation();
    DB.userPOI.splice(i-DB.defaultPOI.length,1);
    saveDB();
    renderPOI();
   };
   div.appendChild(del);
  }

  listEl.appendChild(div);
 });
}

addPOI.onclick=()=>{
 if(!selected) return alert("지도 클릭");
 DB.userPOI.push({
  name:poiName.value,
  region:poiRegion.value,
  lat:selected.lat,
  lng:selected.lng
 });
 saveDB();
 renderPOI();
};

/* SHOTS */
function renderShots(){
 listEl.innerHTML="";
 DB.shots.forEach((s,i)=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<b>${s.name}</b><br>${s.memo||""}`;

  if(s.photo){
   const img=document.createElement("img");
   img.src=s.photo;
   div.appendChild(img);
  }

  div.onclick=()=>{
   map.setView([s.lat,s.lng],15);
   markers.clearLayers();
   L.marker([s.lat,s.lng]).addTo(markers);
  };

  const del=document.createElement("button");
  del.textContent="삭제";
  del.onclick=(e)=>{
   e.stopPropagation();
   DB.shots.splice(i,1);
   saveDB();
   renderShots();
  };

  div.appendChild(del);
  listEl.appendChild(div);
 });
}

saveShot.onclick=async()=>{
 if(!selected) return alert("지도 클릭");

 let img="";
 if(photo.files[0]){
  const r=new FileReader();
  img=await new Promise(res=>{
   r.onload=()=>res(r.result);
   r.readAsDataURL(photo.files[0]);
  });
 }

 DB.shots.push({
  name:name.value,
  memo:memo.value,
  lat:selected.lat,
  lng:selected.lng,
  photo:img
 });

 saveDB();
 renderShots();
};

map.on("click",e=>selected=e.latlng);

function openPanel(){ panel.classList.add("show"); }

};
</script>

</body>
</html>
