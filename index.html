<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin STEP 1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;}

/* 🔥 UI 레이어 */
#ui{
 position:fixed;
 top:0;left:0;width:100%;height:100%;
 pointer-events:none;
 z-index:10000;
}

/* 클릭 가능 요소 */
#menuBtn,#menu{ pointer-events:auto; }

/* 메뉴 버튼 */
#menuBtn{
 position:absolute;
 bottom:80px;
 right:15px;
 width:55px;
 height:55px;
 border-radius:50%;
 background:#ff3b30;
 color:#fff;
 border:none;
 font-size:20px;
}

/* 메뉴 */
#menu{
 position:absolute;
 bottom:150px;
 right:15px;
 display:none;
 flex-direction:column;
 gap:6px;
}
#menu button{
 padding:8px;
 background:#333;
 color:#fff;
 border:none;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">

<button id="menuBtn">☰</button>

<div id="menu">
  <button>추천명소</button>
  <button>내 촬영지</button>
  <button>내 위치</button>
  <button>🌅 일출</button>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
window.onload=function(){

const menuBtn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");

/* 지도 */
const map=L.map("map").setView([37.56,126.97],10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

/* 🔥 메뉴 토글 (핵심) */
menuBtn.onclick=(e)=>{
 e.stopPropagation();
 menu.style.display = (menu.style.display==="flex") ? "none" : "flex";
};

};
</script>

</body>
</html>
