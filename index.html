<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin Restore Stable</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:sans-serif;}
#map{height:100vh;width:100%;}

/* MENU */
#menuBtn{
  position:fixed;
  bottom:80px;
  right:15px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#ff3b30;
  color:#fff;
  border:none;
  z-index:99999;
  font-size:22px;
}

#submenu{
  position:fixed;
  bottom:150px;
  right:15px;
  display:none;
  flex-direction:column;
  gap:6px;
  z-index:99999;
}

#submenu button{
  padding:8px;
  border:none;
  border-radius:6px;
  background:#333;
  color:#fff;
}

/* PANEL (단일 유지 + 내부 분리 느낌) */
#panel{
  position:fixed;
  top:0;
  right:0;
  width:320px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  transform:translateX(100%);
  transition:0.3s;
  z-index:99998;
  overflow:auto;
}

#panel.show{transform:translateX(0);}

#close{
  width:100%;
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
}

/* ====== 기존 감성 LIST 복구 ====== */
.section{
  padding:10px;
}

.listItem{
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.listBtn{
  width:100%;
  margin:4px 0;
  padding:8px;
  border:none;
  background:#f2f2f2;
  border-radius:6px;
  text-align:left;
}

/* INPUT AREA */
input,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<button id="menuBtn">☰</button>

<div id="submenu">
  <button onclick="openPanel('rec')">추천명소</button>
  <button onclick="openPanel('region')">지역</button>
  <button onclick="openPanel('cat')">카테고리</button>
  <button onclick="openPanel('shot')">내 촬영지</button>
  <button onclick="gps()">내 위치</button>
</div>

<div id="panel">

  <button id="close">닫기</button>

  <div class="section">

    <h3>SkyPin</h3>

    <div id="info">지도 클릭</div>

    <input id="name" placeholder="이름">
    <textarea id="memo" placeholder="메모"></textarea>

    <button onclick="save()">저장</button>

    <hr>

    <div id="list"></div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */
const map = L.map("map").setView([37.5665,126.9780],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© OSM"
}).addTo(map);

/* STATE */
let selected=null;
let shots=JSON.parse(localStorage.getItem("shots")||"[]");
let markers=[];

/* CLICK */
map.on("click",e=>{
  selected={lat:e.latlng.lat,lng:e.latlng.lng};
  document.getElementById("info").innerText=
    `📍 ${selected.lat.toFixed(4)}, ${selected.lng.toFixed(4)}`;
  document.getElementById("panel").classList.add("show");
});

/* DB (유지) */
const DB=[
  {n:"남산",lat:37.5512,lng:126.9882,m:"rec",t:"서울"},
  {n:"한강",lat:37.5086,lng:126.9968,m:"rec",t:"서울"},
  {n:"해운대",lat:35.1587,lng:129.1604,m:"rec",t:"부산"},
  {n:"송도",lat:37.3940,lng:126.6406,m:"region",t:"인천"},
  {n:"설악산",lat:38.1194,lng:128.4655,m:"cat",t:"산"}
];

/* MENU */
document.getElementById("menuBtn").onclick=()=>{
  submenu.style.display =
    submenu.style.display==="flex"?"none":"flex";
};

/* PANEL OPEN */
function openPanel(type){

  document.getElementById("panel").classList.add("show");
  submenu.style.display="none";

  render(type);
}

/* CLOSE */
document.getElementById("close").onclick=()=>{
  document.getElementById("panel").classList.remove("show");
};

/* ================= LIST RESTORE STYLE ================= */
function render(type){

  const el=document.getElementById("list");

  if(type==="shot"){
    renderShots();
    return;
  }

  const list=DB.filter(d=>d.m===type);

  el.innerHTML=list.map(d=>
    `<div class="listItem">
      📍 ${d.n} (${d.t})
      <button class="listBtn" onclick="go(${d.lat},${d.lng},'${d.n}')">
        이동
      </button>
    </div>`
  ).join("");
}

/* MOVE */
function go(lat,lng,name){
  map.setView([lat,lng],13);
  L.marker([lat,lng]).addTo(map).bindPopup(name).openPopup();
}

/* SAVE */
function save(){

  if(!selected){
    alert("지도 클릭하세요");
    return;
  }

  shots.push({
    name:document.getElementById("name").value,
    memo:document.getElementById("memo").value,
    lat:selected.lat,
    lng:selected.lng
  });

  localStorage.setItem("shots",JSON.stringify(shots));
  renderShots();
}

/* SHOTS */
function renderShots(){

  const el=document.getElementById("list");
  el.innerHTML="";

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  shots.forEach((s,i)=>{

    el.innerHTML+=`
      <div class="listItem">
        📸 ${s.name}
        <button class="listBtn" onclick="del(${i})">삭제</button>
      </div>
    `;

    markers.push(
      L.marker([s.lat,s.lng]).addTo(map)
    );
  });
}

/* DELETE */
function del(i){
  shots.splice(i,1);
  localStorage.setItem("shots",JSON.stringify(shots));
  renderShots();
}

/* GPS (원래 방식 유지) */
function gps(){
  navigator.geolocation.getCurrentPosition(pos=>{
    map.setView([pos.coords.latitude,pos.coords.longitude],15);

    L.marker([pos.coords.latitude,pos.coords.longitude])
      .addTo(map)
      .bindPopup("📍 내 위치")
      .openPopup();
  });
}

renderShots();

</script>

</body>
</html>
