<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>SkyPin Drone Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html,body{height:100%;margin:0;font-family:Arial;}
    #map{width:100%;height:100%;}
    #menuBtn{position:absolute;top:15px;left:10px;z-index:1200;background:white;padding:12px 16px;border-radius:12px;font-size:24px;cursor:pointer;box-shadow:0 0 6px rgba(0,0,0,0.3);}
    #topBar{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;background:white;padding:14px;border-radius:14px;box-shadow:0 0 10px rgba(0,0,0,0.25);width:360px;text-align:center;}
    #searchBox{width:95%;padding:14px;font-size:18px;border-radius:8px;border:1px solid #ccc;margin-bottom:10px;}
    #buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    #buttons button{padding:14px;border:none;border-radius:10px;background:#f2f2f2;font-size:16px;cursor:pointer;}
    #buttons button:hover{background:#e5e5e5;}
    #panel{position:absolute;left:0;top:0;width:260px;height:100%;background:white;z-index:1100;overflow:auto;box-shadow:2px 0 8px rgba(0,0,0,0.3);display:none;}
    #panel h3{margin:12px;}
    #spotList{list-style:none;padding:0;margin:0;}
    #spotList li{padding:14px;border-bottom:1px solid #ddd;cursor:pointer;}
    @media (max-width:768px){
      #topBar{width:95%;padding:16px;}
      #searchBox{font-size:20px;padding:16px;}
      #buttons button{font-size:18px;padding:16px;}
      #panel{width:85%;}
      #menuBtn{font-size:26px;padding:12px 16px;}
    }
  </style>
</head>
<body>

<div id="menuBtn">☰</div>

<div id="panel">
  <h3>촬영지 목록</h3>
  <ul id="spotList"></ul>
</div>

<div id="topBar">
  <input id="searchBox" placeholder="촬영지 검색">
  <div id="buttons">
    <button id="locBtn">📍 현재위치</button>
    <button id="nfBtn">🚫 비행금지</button>
    <button id="flyBtn">🚁 비행가능</button>
    <button id="sunBtn">🌅 일출방향</button>
    <button id="satBtn">🛰 지도전환</button>
  </div>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // 지도 초기화
  var map = L.map('map').setView([37.5665, 126.9780], 13); // 서울 좌표 예시

  // 기본 타일 레이어 추가
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(map);
</script>

</body>
</html>
