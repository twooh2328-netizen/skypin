<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>드론 지도 앱 - 사이드 패널</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
    /* 메인 버튼(FAB) */
    .fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #333;
      color: #fff;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      z-index: 1000;
    }
    /* 서브메뉴 */
    .submenu {
      position: fixed;
      bottom: 90px;
      right: 20px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
    }
    .submenu button {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      color: #fff;
      font-size: 18px;
    }
    .location { background: #007bff; }
    .attractions { background: #dc3545; }
    .shots { background: #ffc107; }
    .sun { background: #fd7e14; }

    /* 오른쪽 사이드 패널 */
    .side-panel {
      position: fixed;
      top: 0;
      right: -300px; /* 처음엔 숨김 */
      width: 300px;
      height: calc(100% - 100px); /* 하단 여백 확보 */
      background: #f8f9fa;
      box-shadow: -2px 0 6px rgba(0,0,0,0.3);
      transition: right 0.3s ease;
      overflow-y: auto;
      z-index: 999;
    }
    .side-panel.show {
      right: 0; /* 열림 */
    }
    .side-panel h3 {
      margin-top: 10px;
      padding-left: 10px;
    }
    .attraction-item {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }
    .attraction-item:hover {
      background: #eee;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="fab" id="menuBtn">☰</div>
  <div class="submenu" id="submenu">
    <button class="location" title="현재 위치">📍</button>
    <button class="attractions" title="명소 목록">⭐</button>
    <button class="shots" title="내 촬영 목록">📷</button>
    <button class="sun" title="일출 방향">🌅</button>
  </div>

  <!-- 오른쪽 사이드 패널 -->
  <div class="side-panel" id="sidePanel">
    <h3>추천 명소</h3>
    <div class="attraction-item" data-lat="37.579617" data-lng="126.977041">경복궁</div>
    <div class="attraction-item" data-lat="37.551169" data-lng="126.988227">남산타워</div>
    <div class="attraction-item" data-lat="37.570705" data-lng="126.976889">광화문</div>

    <h3>전체 명소</h3>
    <div class="attraction-item" data-lat="37.5139" data-lng="127.1025">롯데월드</div>
    <div class="attraction-item" data-lat="33.4996" data-lng="126.5312">제주 성산일출봉</div>
    <div class="attraction-item" data-lat="35.1796" data-lng="129.0756">부산 해운대</div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // 지도 초기화
    const map = L.map('map').setView([37.5665, 126.9780], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 메뉴 버튼 토글
    const menuBtn = document.getElementById('menuBtn');
    const submenu = document.getElementById('submenu');
    menuBtn.addEventListener('click', () => {
      submenu.style.display = submenu.style.display === 'flex' ? 'none' : 'flex';
    });

    // 사이드 패널 토글
    const attractionBtn = document.querySelector('.attractions');
    const sidePanel = document.getElementById('sidePanel');
    attractionBtn.addEventListener('click', () => {
      sidePanel.classList.toggle('show');
    });

    // 명소 클릭 이벤트
    document.querySelectorAll('.attraction-item').forEach(item => {
      item.addEventListener('click', () => {
        const lat = item.getAttribute('data-lat');
        const lng = item.getAttribute('data-lng');
        map.setView([lat, lng], 16);
        L.popup()
          .setLatLng([lat, lng])
          .setContent(`<b>${item.textContent}</b>`)
          .openOn(map);
      });
    });

    // 현재 위치 버튼 이벤트
    const locationBtn = document.querySelector('.location');
    locationBtn.addEventListener('click', () => {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          map.setView([lat, lng], 16);
          L.marker([lat, lng]).addTo(map)
            .bindPopup("현재 위치")
            .openPopup();
        }, err => {
          alert("현재 위치를 가져올 수 없습니다.");
        });
      } else {
        alert("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
      }
    });
  </script>
</body>
</html>
