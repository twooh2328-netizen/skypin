<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin STEP 6</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;}

#ui{
 position:fixed;top:0;left:0;width:100%;height:100%;
 pointer-events:none;z-index:10000;
}

#menuBtn,#menu,#panel{ pointer-events:auto; }

#menuBtn{
 position:absolute;bottom:80px;right:15px;
 width:55px;height:55px;border-radius:50%;
 background:#ff3b30;color:#fff;border:none;
}

#menu{
 position:absolute;bottom:150px;right:15px;
 display:none;flex-direction:column;gap:6px;
}
#menu button{
 padding:8px;background:#333;color:#fff;border:none;
}

#panel{
 position:absolute;top:0;right:0;width:320px;height:100%;
 background:#fff;transform:translateX(100%);
 transition:.3s;overflow:auto;
}
#panel.show{transform:translateX(0);}

#panelHeader{
 padding:10px;background:#111;color:#fff;
}

#panelContent{padding:10px;}

.card{
 background:#f5f5f5;
 padding:10px;
 margin-bottom:8px;
 border-radius:8px;
 cursor:pointer;
}

input,select{
 width:100%;
 padding:8px;
 margin-bottom:5px;
}

button.add{
 width:100%;
 padding:8px;
 background:#007aff;
 color:#fff;
 border:none;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">

<button id="menuBtn">☰</button>

<div id="menu">
  <button id="btnPOI">추천명소</button>
  <button id="btnSun">🌅 일출</button>
</div>

<div id="panel">
  <div id="panelHeader">
    <button id="closeBtn">닫기</button>
  </div>

  <div id="panelContent">

    <!-- 🔍 검색 -->
    <input id="search" placeholder="검색...">

    <!-- 📂 필터 -->
    <select id="filter">
      <option value="all">전체</option>
      <option value="서울">서울</option>
      <option value="부산">부산</option>
    </select>

    <!-- 추가 -->
    <input id="poiName" placeholder="명소 이름">
    <input id="poiRegion" placeholder="지역 (서울/부산)">
    <button class="add" id="addBtn">명소 추가</button>

    <div id="list"></div>

  </div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
window.onload=function(){

const menuBtn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");
const panel=document.getElementById("panel");

const btnPOI=document.getElementById("btnPOI");
const btnSun=document.getElementById("btnSun");
const closeBtn=document.getElementById("closeBtn");

const listEl=document.getElementById("list");
const poiName=document.getElementById("poiName");
const poiRegion=document.getElementById("poiRegion");
const addBtn=document.getElementById("addBtn");

const search=document.getElementById("search");
const filter=document.getElementById("filter");

/* 지도 */
const map=L.map("map").setView([37.56,126.97],10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let markers=L.layerGroup().addTo(map);
let selected=null;
let myPos=null;

/* 데이터 */
let defaultPOI=[
 {name:"남산타워",lat:37.5512,lng:126.9882,region:"서울"},
 {name:"해운대",lat:35.1587,lng:129.1604,region:"부산"}
];

let userPOI=JSON.parse(localStorage.getItem("userPOI")||"[]");

function save(){
 localStorage.setItem("userPOI",JSON.stringify(userPOI));
}

/* 메뉴 */
menuBtn.onclick=(e)=>{
 e.stopPropagation();
 menu.style.display=(menu.style.display==="flex")?"none":"flex";
};

/* 패널 */
btnPOI.onclick=()=>{
 panel.classList.add("show");
 render();
};

closeBtn.onclick=()=>panel.classList.remove("show");

/* 지도 클릭 */
map.on("click",e=>{
 selected=e.latlng;
});

/* 🔍 검색 + 필터 렌더 */
function render(){
 let list=[...defaultPOI,...userPOI];

 const q=search.value.toLowerCase();
 const f=filter.value;

 list=list.filter(p=>{
  const matchName=p.name.toLowerCase().includes(q);
  const matchRegion=(f==="all" || p.region===f);
  return matchName && matchRegion;
 });

 listEl.innerHTML="";
 markers.clearLayers();

 list.forEach((p,i)=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<b>${p.name}</b><br>${p.region||""}`;

  div.onclick=()=>{
   map.setView([p.lat,p.lng],15);
   markers.clearLayers();
   L.marker([p.lat,p.lng]).addTo(markers);
  };

  if(i>=defaultPOI.length){
   const del=document.createElement("button");
   del.textContent="삭제";
   del.onclick=(e)=>{
    e.stopPropagation();
    userPOI.splice(i-defaultPOI.length,1);
    save();
    render();
   };
   div.appendChild(del);
  }

  listEl.appendChild(div);
 });
}

/* 검색 이벤트 */
search.oninput=render;
filter.onchange=render;

/* 추가 */
addBtn.onclick=()=>{
 if(!selected) return alert("지도 클릭 후 추가");

 userPOI.push({
  name:poiName.value,
  region:poiRegion.value,
  lat:selected.lat,
  lng:selected.lng
 });

 poiName.value="";
 poiRegion.value="";
 save();
 render();
};

/* 🌅 일출 */
btnSun.onclick=()=>{
 navigator.geolocation.getCurrentPosition(pos=>{
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;

  myPos={lat,lng};
  map.setView([lat,lng],14);

  markers.clearLayers();

  // 현재 위치
  L.marker([lat,lng]).addTo(markers).bindPopup("내 위치").openPopup();

  // 동쪽 방향 선
  L.polyline([[lat,lng],[lat,lng+0.2]],{color:"orange"}).addTo(markers);
 });
};

};
</script>

</body>
</html>
