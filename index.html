<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스카이핀 - 드론 지도 앱</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; width: 100%; }

    /* 메뉴 버튼(FAB) */
    .fab {
      position: fixed; bottom: 20px; right: 20px;
      background: #333; color: #fff;
      border-radius: 8px; width: 80px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 1000;
    }

    /* 서브메뉴 버튼 */
    .submenu {
      position: fixed; bottom: 70px; right: 20px;
      display: none; flex-direction: column; gap: 10px; z-index: 1000;
    }
    .submenu button {
      width: 60px; height: 60px; border-radius: 50%;
      border: none; cursor: pointer; color: #fff; font-size: 14px; font-weight: bold;
    }
    .submenu button:hover { filter: brightness(85%); }

    /* 버튼 색상 */
    .recommend { background: #28a745; }
    .category { background: #6f42c1; }
    .region { background: #17a2b8; }
    .shots { background: #ffc107; color:#000; }
    .sun { background: #fd7e14; }
    .location { background: #007bff; }

    /* 사이드 패널 */
    .side-panel {
      position: fixed; top: 0; right: -320px;
      width: 320px; height: 100%;
      background: #f8f9fa; box-shadow: -2px 0 6px rgba(0,0,0,0.3);
      transition: right 0.3s ease; overflow-y: auto; z-index: 999; padding-top: 40px;
    }
    .side-panel.show { right: 0; }

    /* 닫기 버튼 */
    #closePanelBtn {
      position: absolute; top: 10px; right: 10px;
      background: #dc3545; color: #fff; border: none;
      border-radius: 4px; padding: 5px 10px; cursor: pointer;
    }
    #closePanelBtn:hover { background: #c82333; }

    /* 탭 콘텐츠 */
    .tab-content { display: none; padding: 10px; }
    .tab-content.active { display: block; }

    /* 아코디언 */
    .accordion-item { border-bottom: 1px solid #ddd; }
    .accordion-header {
      width: 100%; text-align: left; padding: 10px;
      background: #eee; border: none; cursor: pointer; font-weight: bold;
    }
    .accordion-body { display: none; padding: 10px; background: #f9f9f9; }
    .accordion-body.show { display: block; }

    /* 명소 아이템 */
    .attraction-item { padding: 8px; border-bottom: 1px solid #ddd; cursor: pointer; }
    .attraction-item:hover { background: #eee; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="fab" id="menuBtn">메뉴</div>
  <div class="submenu" id="submenu">
    <button class="recommend" data-target="recommend">추천</button>
    <button class="category" data-target="category">카테고리</button>
    <button class="region" data-target="region">지역별</button>
    <button class="shots" data-target="myshots">촬영지</button>
    <button class="sun" data-target="sun">일출</button>
    <button class="location" data-target="location">위치</button>
  </div>

  <!-- 사이드 패널 -->
  <div id="sidePanel" class="side-panel">
    <button id="closePanelBtn">닫기 ✖</button>

    <!-- 추천 명소 -->
    <div class="tab-content" id="recommend">
      <h3>추천 명소</h3>
      <div class="accordion-item">
        <button class="accordion-header">인기 명소</button>
        <div class="accordion-body">
          <div class="attraction-item">남산타워</div>
          <div class="attraction-item">한강공원</div>
        </div>
      </div>
    </div>

    <!-- 카테고리 -->
    <div class="tab-content" id="category">
      <h3>카테고리</h3>
      <div class="accordion-item">
        <button class="accordion-header">자연</button>
        <div class="accordion-body">
          <div class="attraction-item">설악산</div>
        </div>
      </div>
    </div>

    <!-- 지역별 -->
    <div class="tab-content" id="region">
      <h3>지역별</h3>
      <div class="accordion-item">
        <button class="accordion-header">서울</button>
        <div class="accordion-body">
          <div class="attraction-item">경복궁</div>
        </div>
      </div>
    </div>

    <!-- 내 촬영지 -->
    <div class="tab-content" id="myshots">
      <h3>내 촬영지</h3>
      <input type="text" id="shotName" placeholder="촬영지 이름"><br>
      <input type="text" id="shotMemo" placeholder="메모"><br>
      <input type="file" id="shotImage"><br>
      <button id="addShotBtn">추가</button>
      <div id="myshots-list"></div>
    </div>

    <!-- 일출 -->
    <div class="tab-content" id="sun"><h3>일출 방향</h3></div>

    <!-- 현재 위치 -->
    <div class="tab-content" id="location"><h3>현재 위치</h3></div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // 지도 초기화
    const map = L.map('map').setView([37.5665, 126.9780], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 메뉴 버튼 토글
    const menuBtn = document.getElementById('menuBtn');
    const submenu = document.getElementById('submenu');
    menuBtn.addEventListener('click', () => {
      submenu.style.display = submenu.style.display === 'flex' ? 'none' : 'flex';
    });

    // 사이드 패널 열기
    const sidePanel = document.getElementById('sidePanel');
    document.querySelectorAll('.submenu button').forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.getAttribute('data-target');
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        const targetContent = document.getElementById(targetId);
        if (targetContent) targetContent.classList.add('active');
        sidePanel.classList.add('show');
      });
    });

    // 사이드 패널 닫기
    document.getElementById('closePanelBtn').addEventListener('click', () => {
      sidePanel.classList.remove('show');
    });

    // 아코디언 동작
    document.querySelectorAll('.accordion-header').forEach(header => {
      header.addEventListener('click', () => {
        const body = header.nextElementSibling;
        body.classList.toggle('show');
      });
    });

    // 현재 위치 버튼 기능
    const locationBtn = document.querySelector('.location');
    locationBtn.addEventListener('click', () => {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          map.setView([lat, lng], 16);
          L.marker([lat, lng]).addTo(map)
            .bindPopup("현재 위치")
            .openPopup();
        }, () => {
          alert("현재 위치를 가져올 수 없습니다.");
        });
      }
    });
  </script>
</body>
</html>
