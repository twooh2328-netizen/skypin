<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>SkyPin Drone Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html, body {height:100%;margin:0;}
    #map {width:100%;height:100%;}

    #toggleMenu {
      position:fixed; bottom:20px; right:20px;
      z-index:1200; padding:10px 15px;
      font-size:16px; border:none; border-radius:6px;
      background:#f2f2f2; cursor:pointer;
    }

    #searchBox {
      position:fixed; top:20px; right:20px;
      z-index:1200; width:180px; padding:5px;
      font-size:12px; border-radius:6px; border:1px solid #ccc;
    }

    #slideMenu {
      position:absolute; top:0; left:-250px;
      width:250px; height:100%; background:white;
      transition:left 0.3s ease; z-index:1100;
      padding:10px; display:flex; flex-direction:column;
    }
    #slideMenu.open {left:0;}

    #closeMenu {
      margin-top:auto; padding:8px; font-size:14px;
      border:none; border-radius:6px; background:#ddd; cursor:pointer;
    }

    #buttons {display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
    #buttons button {
      padding:10px; font-size:14px; border:none; border-radius:6px;
      background:#f2f2f2; cursor:pointer;
    }

    #spotList {
      margin-top:10px;
      max-height:300px;
      overflow-y:auto;
    }
    #spotList li {padding:8px; border-bottom:1px solid #ddd; cursor:pointer;}

    #buttons button:hover,
    #toggleMenu:hover,
    #closeMenu:hover {
      background:#e0e0e0;
    }
  </style>
</head>
<body>
  <button id="toggleMenu">☰ 메뉴</button>
  <input id="searchBox" placeholder="촬영지 검색 (Enter)">
  <div id="slideMenu">
    <div id="buttons">
      <button id="locBtn">📍 현재위치</button>
      <button id="listBtn">📑 명소 목록</button>
      <button id="mySpotsBtn">⭐ 내 촬영지 목록</button>
      <button id="sunriseBtn">🌅 일출 방향선</button> 
    </div>
    <ul id="spotList"></ul>
    <button id="closeMenu">닫기 ✖</button>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var map = L.map('map').setView([37.5446,127.0376],12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    document.getElementById('toggleMenu').onclick = () =>
      document.getElementById('slideMenu').classList.add('open');
    document.getElementById('closeMenu').onclick = () =>
      document.getElementById('slideMenu').classList.remove('open');

    var spots = [
      {name:"제부도",lat:37.1710,lon:126.5720},
      {name:"양양 낙산사",lat:38.1240,lon:128.6270},
      {name:"서울숲",lat:37.5446,lon:127.0376},
      {name:"부산 광안대교",lat:35.1531,lon:129.1185},
      {name:"제주 성산일출봉",lat:33.4589,lon:126.9425},
      {name:"속초 영금정",lat:38.2070,lon:128.5910},
      {name:"경주 불국사",lat:35.7902,lon:129.3325},
      {name:"안동 하회마을",lat:36.5400,lon:128.5180},
      {name:"인천 송도 센트럴파크",lat:37.3925,lon:126.6345},
      {name:"남해 독일마을",lat:34.8370,lon:127.8920},
      {name:"담양 죽녹원",lat:35.3210,lon:126.9870},
      {name:"순천만 습지",lat:34.9330,lon:127.5000},
      {name:"보성 녹차밭",lat:34.7510,lon:127.0850},
      {name:"강릉 경포대",lat:37.7950,lon:128.8960},
      {name:"춘천 소양강 스카이워크",lat:37.8940,lon:127.7340},
      {name:"포항 호미곶",lat:36.0670,lon:129.5690},
      {name:"울산 대왕암",lat:35.4980,lon:129.4360},
      {name:"여수 돌산대교",lat:34.7390,lon:127.7510},
      {name:"군산 새만금 방조제",lat:35.9000,lon:126.7000},
      {name:"태안 꽃지해변",lat:36.4930,lon:126.3310}
    ];

    var mySpots = []; // 내 촬영지 저장 배열
    var sunriseLine;  // 일출 방향 선

    function moveToSpot(spot){
      map.setView([spot.lat, spot.lon], 14);
      L.marker([spot.lat, spot.lon]).addTo(map).bindPopup(spot.name).openPopup();
    }

    // 명소 목록
    var listVisible = false;
    document.getElementById('listBtn').onclick = () => {
      var spotList=document.getElementById('spotList');
      if(listVisible){ spotList.innerHTML=""; listVisible=false; }
      else {
        spotList.innerHTML="";
        spots.forEach(spot=>{
          var li=document.createElement('li');
          li.textContent=spot.name;
          li.onclick=()=>{
            moveToSpot(spot);
            document.getElementById('slideMenu').classList.remove('open');
          };
          spotList.appendChild(li);
        });
        listVisible=true;
      }
    };

    // 내 촬영지 목록
    document.getElementById('mySpotsBtn').onclick = () => {
      var spotList=document.getElementById('spotList');
      spotList.innerHTML="";
      mySpots.forEach((spot, index)=>{
        var li=document.createElement('li');
        li.textContent=spot.name + " (삭제: 더블클릭)";
        li.onclick=()=>moveToSpot(spot);
        li.ondblclick=()=>{
          mySpots.splice(index,1);
          alert("촬영지가 삭제되었습니다.");
        };
        spotList.appendChild(li);
      });
    };

    // 지도 클릭 시 내 촬영지 등록
    map.on('click', function(e){
      var latlng = e.latlng;
      var name = prompt("촬영지 이름을 입력하세요:");
      if(name){
        var spot = {name:name, lat:latlng.lat, lon:latlng.lng};
        mySpots.push(spot);
        L.marker([spot.lat, spot.lon]).addTo(map).bindPopup("내 촬영지: "+spot.name);
        alert("촬영지가 등록되었습니다.");
      }
    });

   // 검색 기능
    document.getElementById('searchBox').addEventListener('keyup', e=>{
      if(e.key==="Enter"){
        var keyword=e.target.value.trim();
        var found=spots.find(s=>s.name.includes(keyword));
        if(found){moveToSpot(found);}else{alert("검색 결과가 없습니다.");}
      }
    });

   // 현재 위치 버튼 + 일출 방향 표시
    document.getElementById('locBtn').onclick = () => {
      if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(pos=>{
          var lat=pos.coords.latitude, lon=pos.coords.longitude;
          map.setView([lat, lon], 15);
          L.marker([lat, lon]).addTo(map).bindPopup("현재 위치").openPopup();

          // 기존 선 제거
          if(sunriseLine){ map.removeLayer(sunriseLine); }

          // 일출 방향: 동쪽으로 직선 표시
          var eastLat = lat;
          var eastLon = lon + 0.05; // 대략 동쪽으로 0.05도 이동
          sunriseLine = L.polyline([[lat, lon],[eastLat, eastLon]], {
            color:'red',
            weight:3,
            opacity:0.8
          }).addTo(map);
        }, ()=>alert("현재 위치를 가져올 수 없습니다."));
      } else {
        alert("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
      }
    };
  </script>
</body>
</html>
