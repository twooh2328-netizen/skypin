<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin Click Register FIX</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:sans-serif;
}

#map{
  height:100vh;
  width:100%;
}

/* PANEL */
.panel{
  position:fixed;
  top:0;
  right:0;
  width:70%;
  max-width:320px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  transform:translateX(100%);
  transition:0.3s;
  z-index:9999;
  overflow:auto;
}

.panel.show{
  transform:translateX(0);
}

.closeBtn{
  position:sticky;
  top:0;
  width:100%;
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
}

.content{
  padding:12px;
}

input,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

button{
  padding:8px;
  margin:5px 0;
  width:100%;
}

/* LIST */
.item{
  padding:8px;
  border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel" class="panel">
  <button class="closeBtn" id="closePanel">닫기</button>

  <div class="content">

    <h3>📍 촬영지 등록</h3>

    <div id="posInfo">지도에서 위치를 클릭하세요</div>

    <input id="name" placeholder="이름">
    <textarea id="memo" placeholder="메모"></textarea>

    <input type="file" id="img">

    <button onclick="saveShot()">저장</button>

    <hr>

    <div id="list"></div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =====================
   MAP
===================== */
const map = L.map("map").setView([37.5665,126.9780],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© OSM"
}).addTo(map);

/* =====================
   STATE
===================== */
let selected = null;
let shots = JSON.parse(localStorage.getItem("shots")||"[]");
let markers = [];

/* =====================
   CLICK → REGISTER OPEN
===================== */
map.on("click", function(e){

  selected = {
    lat: e.latlng.lat,
    lng: e.latlng.lng
  };

  document.getElementById("posInfo").innerHTML =
    `📍 선택됨: ${selected.lat.toFixed(5)}, ${selected.lng.toFixed(5)}`;

  document.getElementById("panel").classList.add("show");
});

/* =====================
   SAVE SHOT (핵심)
===================== */
function saveShot(){

  if(!selected){
    alert("지도에서 위치를 먼저 클릭하세요");
    return;
  }

  const name = document.getElementById("name").value;
  const memo = document.getElementById("memo").value;
  const file = document.getElementById("img").files[0];

  if(!name){
    alert("이름 입력");
    return;
  }

  const saveData = (img="")=>{

    shots.push({
      name,
      memo,
      lat:selected.lat,
      lng:selected.lng,
      img
    });

    localStorage.setItem("shots",JSON.stringify(shots));

    addMarker();

    renderList();

    alert("저장 완료!");
  };

  if(file){
    const reader = new FileReader();
    reader.onload = ()=> saveData(reader.result);
    reader.readAsDataURL(file);
  }else{
    saveData();
  }

  document.getElementById("name").value="";
  document.getElementById("memo").value="";
  document.getElementById("img").value="";
}

/* =====================
   MARKER
===================== */
function addMarker(){

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  shots.forEach(s=>{

    const m = L.marker([s.lat,s.lng])
      .addTo(map)
      .bindPopup(s.name);

    markers.push(m);
  });
}

/* =====================
   LIST
===================== */
function renderList(){

  const el = document.getElementById("list");

  el.innerHTML = "<h4>📌 저장 목록</h4>";

  shots.forEach((s,i)=>{

    el.innerHTML += `
      <div class="item">
        <b>${s.name}</b><br>
        <small>${s.memo||""}</small><br>

        ${s.img ? `<img src="${s.img}" style="width:100%;border-radius:6px">`:""}

        <button onclick="go(${s.lat},${s.lng})">이동</button>
        <button onclick="del(${i})">삭제</button>
      </div>
    `;
  });
}

/* =====================
   MOVE
===================== */
function go(lat,lng){
  map.setView([lat,lng],14);
}

/* =====================
   DELETE
===================== */
function del(i){
  shots.splice(i,1);
  localStorage.setItem("shots",JSON.stringify(shots));
  renderList();
  addMarker();
}

/* =====================
   CLOSE PANEL
===================== */
document.getElementById("closePanel").onclick=()=>{
  document.getElementById("panel").classList.remove("show");
};

/* INIT */
renderList();
addMarker();

</script>

</body>
</html>
