<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin v3 Stable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:sans-serif;}
#map{height:100vh;}

#menuBtn{
  position:fixed;bottom:80px;right:15px;
  width:55px;height:55px;border-radius:50%;
  background:#ff3b30;color:#fff;border:none;z-index:9999;
}

#menu{
  position:fixed;bottom:150px;right:15px;
  display:flex;flex-direction:column;gap:6px;
  transform:scale(0);transition:.2s;z-index:9999;
}
#menu.open{transform:scale(1);}
#menu button{padding:8px;border:none;background:#333;color:#fff;}

#panel{
  position:fixed;top:0;right:0;width:320px;height:100%;
  background:#fff;transform:translateX(100%);
  transition:.3s;z-index:9998;overflow:auto;
}
#panel.show{transform:translateX(0);}

.card{background:#f5f5f5;margin:8px;padding:10px;border-radius:10px;}
.card img{width:100%;border-radius:8px;margin-top:5px;}

input,textarea{width:100%;margin:5px 0;padding:8px;}
</style>
</head>

<body>

<div id="map"></div>

<button id="menuBtn">☰</button>

<div id="menu">
  <button onclick="ACTION.showPOI()">추천명소</button>
  <button onclick="ACTION.showShots()">내 촬영지</button>
  <button onclick="ACTION.gps()">내 위치</button>
  <button onclick="ACTION.sun()">🌅 일출</button>
</div>

<div id="panel">
  <button onclick="closePanel()">닫기</button>
  <input id="search" placeholder="검색..." oninput="ACTION.search(this.value)">
  
  <div id="form" style="display:none;">
    <input id="name" placeholder="이름">
    <textarea id="memo" placeholder="메모"></textarea>
    <input type="file" id="photo" accept="image/*">
    <button onclick="ACTION.saveShot()">저장</button>
  </div>

  <div id="list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* ================= DB ================= */
const DB = {
  defaultPOI: [
    {name:"남산타워",lat:37.5512,lng:126.9882,region:"서울"},
    {name:"한강공원",lat:37.52,lng:126.98,region:"서울"},
    {name:"해운대",lat:35.1587,lng:129.1604,region:"부산"},
    {name:"광안리",lat:35.1532,lng:129.1187,region:"부산"},
    {name:"설악산",lat:38.1194,lng:128.4655,region:"강원"},
    {name:"성산일출봉",lat:33.4588,lng:126.941,region:"제주"}
  ],
  shots: JSON.parse(localStorage.getItem("shots")||"[]")
};

function saveDB(){
  localStorage.setItem("shots",JSON.stringify(DB.shots));
}

/* ================= MAP ================= */
const map=L.map("map").setView([37.5665,126.978],10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let selected=null;
let markers=L.layerGroup().addTo(map);

/* ================= UI ================= */
menuBtn.onclick=()=>menu.classList.toggle("open");

map.on("click",e=>{
  selected=e.latlng;
  openPanel();
  form.style.display="block";
});

/* ================= ACTION ================= */
const ACTION={

showPOI(){
  openPanel();
  form.style.display="none";
  render(DB.defaultPOI);
  showAllMarkers(DB.defaultPOI);
},

showShots(){
  openPanel();
  form.style.display="none";
  render(DB.shots,true);
  showAllMarkers(DB.shots);
},

search(q){
  const list=[...DB.defaultPOI,...DB.shots];

  const result=list.filter(p =>
    (p.name && p.name.includes(q)) ||
    (p.region && p.region.includes(q))
  );

  render(result);
  showAllMarkers(result);
},

gps(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;

    map.setView([lat,lng],15);
    markers.clearLayers();

    L.circleMarker([lat,lng],{
      radius:10,color:"#007aff",fillOpacity:0.8
    }).addTo(markers).bindPopup("내 위치").openPopup();
  });
},

sun(){
  const c=map.getCenter();
  markers.clearLayers();

  L.polyline([
    [c.lat,c.lng],
    [c.lat+0.1,c.lng+0.1]
  ],{color:"orange"}).addTo(markers);
},

async saveShot(){

  if(!selected) return alert("지도 클릭");

  const nameVal=name.value.trim();
  if(!nameVal) return alert("이름 입력");

  const file=photo.files[0];
  let imgData="";

  if(file){
    imgData = await compressImage(file);
  }

  DB.shots.push({
    name:nameVal,
    memo:memo.value,
    lat:selected.lat,
    lng:selected.lng,
    photo:imgData
  });

  saveDB();
  this.showShots();
}

};

/* ================= RENDER ================= */
function render(list,isShot=false){

  listEl.innerHTML="";

  list.forEach((p,i)=>{

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`<b>${p.name}</b><br>${p.memo||""}`;

    if(p.photo){
      const img=document.createElement("img");
      img.src=p.photo;
      div.appendChild(img);
    }

    div.onclick=()=>{
      map.setView([p.lat,p.lng],15);
      highlightMarker(p);
    };

    if(isShot){
      const del=document.createElement("button");
      del.textContent="삭제";
      del.onclick=(e)=>{
        e.stopPropagation();
        DB.shots.splice(i,1);
        saveDB();
        ACTION.showShots();
      };
      div.appendChild(del);
    }

    listEl.appendChild(div);
  });
}

/* ================= MARKER ================= */
function showAllMarkers(list){
  markers.clearLayers();
  list.forEach(p=>{
    L.marker([p.lat,p.lng]).addTo(markers);
  });
}

function highlightMarker(p){
  markers.clearLayers();

  let html=`<b>${p.name}</b><br>${p.memo||""}`;
  if(p.photo) html+=`<br><img src="${p.photo}" width="120">`;

  L.marker([p.lat,p.lng])
    .addTo(markers)
    .bindPopup(html)
    .openPopup();
}

/* ================= UTIL ================= */
function openPanel(){ panel.classList.add("show"); }
function closePanel(){ panel.classList.remove("show"); }

/* 이미지 압축 */
function compressImage(file){
  return new Promise(res=>{
    const img=new Image();
    const reader=new FileReader();

    reader.onload=e=>img.src=e.target.result;

    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const ctx=canvas.getContext("2d");

      const max=800;
      let w=img.width;
      let h=img.height;

      if(w>max){ h*=max/w; w=max; }

      canvas.width=w;
      canvas.height=h;

      ctx.drawImage(img,0,0,w,h);
      res(canvas.toDataURL("image/jpeg",0.7));
    };

    reader.readAsDataURL(file);
  });
}

</script>
</body>
</html>
