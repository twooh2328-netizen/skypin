<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스카이핀 드론 지도앱</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 모바일 대응 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    /* 지도 영역 */
    #map { height: 100vh; width: 100%; z-index:1; }

    /* 메뉴 버튼 */
    .fab {
      position: fixed; bottom: 20px; right: 20px;
      background: #333; color: #fff;
      border-radius: 8px; width: 80px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      z-index: 1000;
    }

    /* 서브메뉴 */
    .submenu {
      position: fixed; bottom: 70px; right: 20px;
      display: none; flex-direction: column; gap: 10px;
      z-index: 1000;
    }
    .submenu button {
      width: 60px; height: 60px; border-radius: 50%;
      border: none; cursor: pointer; color: #fff;
      font-size: 14px; font-weight: bold;
    }
    .submenu button:hover { filter: brightness(85%); }

    .recommend { background: #28a745; }
    .category { background: #6f42c1; }
    .region { background: #17a2b8; }
    .shots { background: #ffc107; color:#000; }
    .sun { background: #fd7e14; }
    .location { background: #007bff; }

    /* 사이드 패널 */
    .side-panel {
      position: fixed; top: 0; right: -280px;
      width: 280px; height: 100%;
      background: #f8f9fa;
      box-shadow: -2px 0 6px rgba(0,0,0,0.3);
      transition: right 0.3s ease;
      overflow-y: auto; z-index: 999;
      padding: 20px;
    }
    .side-panel.show { right: 0; }

    /* 모바일 화면 대응 */
    @media (max-width: 768px) {
      .side-panel { right: -100%; width: 100%; max-width: none; }
      .side-panel.show { right: 0; }
      .fab { width: 70px; height: 35px; font-size: 14px; }
      .submenu button { width: 50px; height: 50px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="menuBtn" class="fab">메뉴</div>

  <div id="submenu" class="submenu">
    <button class="recommend" data-target="recommend">추천</button>
    <button class="category" data-target="category">카테고리</button>
    <button class="region" data-target="region">지역별</button>
    <button class="shots" data-target="myshots">촬영지</button>
    <button class="sun" data-target="sun">일출</button>
    <button class="location" data-target="location">위치</button>
  </div>

  <div id="sidePanel" class="side-panel">
    <button id="closePanelBtn">닫기 ✖</button>

    <!-- 추천 -->
    <div class="tab-content" id="recommend">
      <h3>추천 명소</h3>
      <div class="accordion-item">
        <button class="accordion-header">서울 인기</button>
        <div class="accordion-body">
          <div class="attraction-item">남산타워</div>
          <div class="attraction-item">한강공원</div>
        </div>
      </div>
    </div>

    <!-- 카테고리 -->
    <div class="tab-content" id="category">
      <h3>카테고리</h3>
      <div class="accordion-item">
        <button class="accordion-header">자연</button>
        <div class="accordion-body">
          <div class="attraction-item">설악산</div>
          <div class="attraction-item">지리산</div>
        </div>
      </div>
      <div class="accordion-item">
        <button class="accordion-header">역사</button>
        <div class="accordion-body">
          <div class="attraction-item">경복궁</div>
          <div class="attraction-item">불국사</div>
        </div>
      </div>
      <div class="accordion-item">
        <button class="accordion-header">바다</button>
        <div class="accordion-body">
          <div class="attraction-item">해운대</div>
          <div class="attraction-item">제주 해변</div>
        </div>
      </div>
      <div class="accordion-item">
        <button class="accordion-header">산</button>
        <div class="accordion-body">
          <div class="attraction-item">한라산</div>
          <div class="attraction-item">북한산</div>
        </div>
      </div>
    </div>

    <!-- 지역별 -->
    <div class="tab-content" id="region">
      <h3>지역별</h3>
      <div class="accordion-item">
        <button class="accordion-header">서울</button>
        <div class="accordion-body">
          <div class="attraction-item">청계천</div>
          <div class="attraction-item">광화문</div>
        </div>
      </div>
      <div class="accordion-item">
        <button class="accordion-header">부산</button>
        <div class="accordion-body">
          <div class="attraction-item">광안리</div>
          <div class="attraction-item">자갈치시장</div>
        </div>
      </div>
      <div class="accordion-item">
        <button class="accordion-header">인천</button>
        <div class="accordion-body">
          <div class="attraction-item">월미도</div>
          <div class="attraction-item">차이나타운</div>
        </div>
      </div>
    </div>

    <!-- 내 촬영지 -->
    <div class="tab-content" id="myshots">
      <h3>내 촬영지</h3>
      <input type="text" id="shotName" placeholder="촬영지 이름"><br>
      <input type="text" id="shotMemo" placeholder="메모"><br>
      <button id="addShotBtn">추가</button>
      <div id="myshots-list"></div>
    </div>

    <!-- 일출 -->
    <div class="tab-content" id="sun">
      <h3>일출 방향</h3>
      <p>현재 위치 기준으로 일출 방향을 표시합니다.</p>
      <div id="sun-direction"></div>
    </div>

    <!-- 현재 위치 -->
    <div class="tab-content" id="location">
      <h3>현재 위치</h3>
      <button id="locateBtn">내 위치 보기</button>
      <div id="location-info"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
// 지도 초기화
const map = L.map('map').setView([37.5665, 126.9780], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

// 반응형 대응
window.addEventListener('resize', () => { map.invalidateSize(); });

// 메뉴 버튼과 패널 토글
const menuBtn = document.getElementById('menuBtn');
const submenu = document.getElementById('submenu');
const sidePanel = document.getElementById('sidePanel');
const closePanelBtn = document.getElementById('closePanelBtn');

menuBtn.addEventListener('click', () => {
  submenu.style.display = submenu.style.display === 'flex' ? 'none' : 'flex';
  sidePanel.classList.add('show');
});
closePanelBtn.addEventListener('click', () => {
  sidePanel.classList.remove('show');
});

// 촬영지 추가 기능
const addShotBtn = document.getElementById('addShotBtn');
const shotName = document.getElementById('shotName');
const shotMemo = document.getElementById('shotMemo');
const myshotsList = document.getElementById('myshots-list');

addShotBtn.addEventListener('click', () => {
  const name = shotName.value.trim();
  const memo = shotMemo.value.trim();
  if(name) {
    const item = document.createElement('div');
    item.textContent = `${name} - ${memo}`;
    myshotsList.appendChild(item);
    shotName.value = '';
    shotMemo.value = '';
  }
});

// 현재 위치 버튼
const locateBtn = document.getElementById('locateBtn');
const locationInfo = document.getElementById('location-info');
locateBtn.addEventListener('click', () => {
  if(navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      locationInfo.textContent = `위도: ${lat}, 경도: ${lng}`;
      L.marker([lat, lng]).addTo(map).bindPopup("내 위치").openPopup();
      map.setView([lat, lng], 13);
    });
  } else {
    locationInfo.textContent = "브라우저에서 위치 정보를 지원하지 않습니다.";
  }
});

// 일출 방향 표시 (예시: 동쪽)
const sunDirection = document.getElementById('sun-direction');
sunDirection.textContent = "오늘 일출 방향은 동쪽입니다.";
</script>
</body>
</html>
