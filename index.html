<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SkyPin TEST</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;}

/* 기존 버튼 스타일 */
#menuBtn{
 position:fixed;
 bottom:80px;
 right:15px;
 width:60px;
 height:60px;
 border-radius:50%;
 background:#ff3b30;
 color:#fff;
 border:none;
 z-index:99999;
}

/* 🔥 여기 아래에 추가 */
#panel{
 position:fixed;
 top:0;
 right:0;
 width:300px;
 height:100%;
 background:#fff;
 transform:translateX(100%);
 transition:.3s;
 z-index:99998;
}

#panel.show{
 transform:translateX(0);
}

#panelHeader{
 padding:10px;
 background:#111;
 color:#fff;
 display:flex;
 justify-content:space-between;
}
#menuBtn{
 position:fixed;
 bottom:80px;
 right:15px;
 width:60px;
 height:60px;
 border-radius:50%;
 background:#ff3b30;
 color:#fff;
 border:none;
 z-index:99999;
}
</style>
</head>

<body>

<h2 style="position:fixed;top:0;left:0;z-index:99999;background:#fff;">
🔥 SkyPin 실행됨
</h2>

<div id="map"></div>
<button id="menuBtn">☰</button>

 <!-- 🔥 여기 추가 -->
<div id="panel">
  <div id="panelHeader">
    <span>SkyPin</span>
    <button id="closeBtn">닫기</button>
  </div>
<div id="panelContent">
  <h3>추천 명소</h3>
  <div id="list"></div>
 </div> 
</div>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

console.log("JS 실행됨");

const map = L.map("map").setView([37.56,126.97],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(map);

/* 🔥 여기부터 추가 */
const panel = document.getElementById("panel");
const closeBtn = document.getElementById("closeBtn");

closeBtn.onclick = function(){
  panel.classList.remove("show");
};

/* 추천명소 데이터 */
const POI = [
  {name:"남산타워", lat:37.5512, lng:126.9882},
  {name:"한강공원", lat:37.52, lng:126.98},
  {name:"해운대", lat:35.1587, lng:129.1604},
  {name:"설악산", lat:38.1194, lng:128.4655}
];

const listEl = document.getElementById("list");
let marker = null;

/* 리스트 렌더 */
function renderPOI(){
  listEl.innerHTML = "";

  POI.forEach(p=>{
    const div = document.createElement("div");
    div.style.padding = "8px";
    div.style.borderBottom = "1px solid #eee";
    div.style.cursor = "pointer";

    div.innerHTML = p.name;

    div.onclick = function(){
      map.setView([p.lat, p.lng], 15);

      if(marker){
        map.removeLayer(marker);
      }

      marker = L.marker([p.lat, p.lng])
        .addTo(map)
        .bindPopup(p.name)
        .openPopup();
    };

    listEl.appendChild(div);
  });
}

/* 패널 열 때 자동 렌더 */
document.getElementById("menuBtn").onclick = function(){
  panel.classList.add("show");
  renderPOI();
}; 
</script>

</body>
</html>
