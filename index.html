<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>SkyPin Drone Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html,body{height:100%;margin:0;font-family:Arial;}
    #map{width:100%;height:100%;}
    #topBar{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;background:white;padding:14px;border-radius:14px;box-shadow:0 0 10px rgba(0,0,0,0.25);width:400px;text-align:center;}
    #searchBox{width:95%;padding:14px;font-size:18px;border-radius:8px;border:1px solid #ccc;margin-bottom:10px;}
    #buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    #buttons button{padding:14px;border:none;border-radius:10px;background:#f2f2f2;font-size:16px;cursor:pointer;}
    #buttons button:hover{background:#e5e5e5;}
    #panel{position:absolute;left:0;top:0;width:260px;height:100%;background:white;z-index:1100;overflow:auto;box-shadow:2px 0 8px rgba(0,0,0,0.3);display:none;}
    #panel h3{margin:12px;}
    #spotList{list-style:none;padding:0;margin:0;}
    #spotList li{padding:14px;border-bottom:1px solid #ddd;cursor:pointer;}
  </style>
</head>
<body>

<div id="panel">
  <h3>촬영지 목록</h3>
  <ul id="spotList"></ul>
</div>

<div id="topBar">
  <input id="searchBox" placeholder="촬영지 검색 (Enter)">
  <div id="buttons">
    <button id="locBtn">📍 현재위치</button>
    <button id="nfBtn">🚫 비행금지</button>
    <button id="flyBtn">🚁 비행가능</button>
    <button id="sunBtn">🌅 일출방향</button>
    <button id="satBtn">🛰 지도전환</button>
    <button id="listBtn">📑 촬영지 목록</button> <!-- 새 버튼 -->
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/suncalc/suncalc.js"></script>

<script>
  // 기본 지도 중심 (서울숲)
  var defaultCenter = [37.5446, 127.0376];
  var map = L.map('map').setView(defaultCenter, 12);

  var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  var satLayer = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png');

  // 좌표 변수
  var nfZone = [37.5509, 126.9903]; // 남산
  var flyZone = [37.1710, 126.5720]; // 제부도

  // 촬영지 목록 (비행 가능 지역)
  var spots = [
    {name: "제부도", lat: 37.1710, lon: 126.5720},
    {name: "양양", lat: 38.0754, lon: 128.6270},
    {name: "서울숲", lat: 37.5446, lon: 127.0376},
    {name: "부산 광안대교", lat: 35.1531, lon: 129.1185}
  ];

  // 목록 표시
  var spotList = document.getElementById('spotList');
  spots.forEach(function(spot){
    var li = document.createElement('li');
    li.textContent = spot.name;
    li.addEventListener('click', function(){
      moveToSpot(spot);
    });
    spotList.appendChild(li);
  });

  // 검색 기능
  document.getElementById('searchBox').addEventListener('keyup', function(e){
    if(e.key === "Enter"){
      var keyword = e.target.value.trim();
      var found = spots.find(s => s.name.includes(keyword));
      if(found){
        moveToSpot(found);
      } else {
        alert("검색 결과가 없습니다.");
      }
    }
  });

  function moveToSpot(spot){
    map.setView([spot.lat, spot.lon], 14);
    L.marker([spot.lat, spot.lon]).addTo(map).bindPopup(spot.name).openPopup();
  }

  // 현재위치
  document.getElementById('locBtn').addEventListener('click', function() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        map.setView([lat, lon], 15);
        L.marker([lat, lon]).addTo(map).bindPopup("현재 위치").openPopup();
      });
    }
  });

  // 비행금지 버튼
  document.getElementById('nfBtn').addEventListener('click', function() {
    map.setView(nfZone, 14);
    L.circle(nfZone, {color:'red', fillColor:'#f03', fillOpacity:0.3, radius:800}).addTo(map);
    L.marker(nfZone).addTo(map).bindPopup("남산 비행금지 구역").openPopup();
  });

  // 비행가능 버튼
  document.getElementById('flyBtn').addEventListener('click', function() {
    map.setView(flyZone, 14);
    L.circle(flyZone, {color:'green', fillColor:'#0f3', fillOpacity:0.3, radius:800}).addTo(map);
    L.marker(flyZone).addTo(map).bindPopup("제부도 비행가능 구역").openPopup();
  });

  // 일출 방향
  document.getElementById('sunBtn').addEventListener('click', function() {
    var center = map.getCenter();
    var times = SunCalc.getTimes(new Date(), center.lat, center.lng);
    var sunrisePos = SunCalc.getPosition(times.sunrise, center.lat, center.lng);
    var angle = sunrisePos.azimuth;

    var length = 0.05;
    var dx = length * Math.cos(angle);
    var dy = length * Math.sin(angle);

    var endLat = center.lat + dy;
    var endLon = center.lng + dx;

    L.polyline([[center.lat, center.lng], [endLat, endLon]], {color: 'orange'}).addTo(map)
      .bindPopup("일출 방향").openPopup();
  });

  // 지도 전환
  document.getElementById('satBtn').addEventListener('click', function() {
    if (map.hasLayer(osmLayer)) {
      map.removeLayer(osmLayer);
      satLayer.addTo(map);
    } else {
      map.removeLayer(satLayer);
      osmLayer.addTo(map);
    }
  });

  // 촬영지 목록 버튼 토글
  document.getElementById('listBtn').addEventListener('click', function() {
    var panel = document.getElementById('panel');
    if (panel.style.display === "none" || panel.style.display === "") {
      panel.style.display = "block";
    } else {
      panel.style.display = "none";
    }
  });
</script>

</body>
</html>
