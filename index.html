<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>SkyPin 7.0</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div id="panel">

<h3>🚁 SkyPin 7.0</h3>

<input id="searchBox"
placeholder="촬영지 검색">

<select id="categoryFilter">

<option value="all">전체</option>
<option value="sunrise">🌅 일출</option>
<option value="sunset">🌇 노을</option>
<option value="beach">🏖 해변</option>
<option value="mountain">⛰ 산</option>
<option value="night">🌃 야경</option>

</select>

<button id="locBtn">📍 내 위치</button>

<button id="satBtn">🛰 위성지도</button>

<button id="nfBtn">🚫 비행금지</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="spots.js"></script>
<script src="nofly.js"></script>
<script src="script.js"></script>

</body>

</html>
