<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SkyPin Stable Core</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:sans-serif;}
#map{height:100vh;width:100%;}

/* PANEL */
#panel{
  position:fixed;
  top:0;
  right:0;
  width:300px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  transform:translateX(100%);
  transition:0.3s;
  z-index:9999;
  overflow:auto;
}

#panel.show{transform:translateX(0);}

#close{
  position:sticky;
  top:0;
  width:100%;
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
}

.box{padding:10px;}

input,textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
}

button{
  width:100%;
  margin:5px 0;
  padding:8px;
}

.item{
  border-bottom:1px solid #ddd;
  padding:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <button id="close">닫기</button>

  <div class="box">

    <h3>📍 촬영지 등록</h3>

    <div id="info">지도 클릭하세요</div>

    <input id="name" placeholder="이름">
    <textarea id="memo" placeholder="메모"></textarea>
    <input type="file" id="img">

    <button onclick="save()">저장</button>

    <hr>

    <div id="list"></div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =====================
   MAP
===================== */
const map = L.map("map").setView([37.5665,126.9780],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© OSM"
}).addTo(map);

/* =====================
   STATE (핵심)
===================== */
let selectedPoint = null;
let shots = JSON.parse(localStorage.getItem("shots")||"[]");
let markers = [];

/* =====================
   CLICK → PANEL OPEN
===================== */
map.on("click", e=>{

  selectedPoint = {
    lat: e.latlng.lat,
    lng: e.latlng.lng
  };

  document.getElementById("info").innerText =
    `📍 선택됨: ${selectedPoint.lat.toFixed(5)}, ${selectedPoint.lng.toFixed(5)}`;

  document.getElementById("panel").classList.add("show");
});

/* =====================
   SAVE (핵심 안정)
===================== */
function save(){

  if(!selectedPoint){
    alert("지도에서 위치를 클릭하세요");
    return;
  }

  const name = document.getElementById("name").value;
  const memo = document.getElementById("memo").value;
  const file = document.getElementById("img").files[0];

  if(!name){
    alert("이름 입력");
    return;
  }

  const store = (img="")=>{

    shots.push({
      name,
      memo,
      lat:selectedPoint.lat,
      lng:selectedPoint.lng,
      img
    });

    localStorage.setItem("shots",JSON.stringify(shots));

    render();
    drawMarkers();

    alert("저장 완료");
  };

  if(file){
    const r = new FileReader();
    r.onload = ()=>store(r.result);
    r.readAsDataURL(file);
  }else{
    store();
  }

  document.getElementById("name").value="";
  document.getElementById("memo").value="";
  document.getElementById("img").value="";
}

/* =====================
   MARKERS
===================== */
function drawMarkers(){

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  shots.forEach(s=>{

    const m = L.marker([s.lat,s.lng])
      .addTo(map)
      .bindPopup(s.name);

    markers.push(m);
  });
}

/* =====================
   LIST
===================== */
function render(){

  const el = document.getElementById("list");

  el.innerHTML = "<h4>📌 목록</h4>";

  shots.forEach((s,i)=>{

    el.innerHTML += `
      <div class="item">
        <b>${s.name}</b><br>
        <small>${s.memo||""}</small><br>

        ${s.img ? `<img src="${s.img}" style="width:100%;border-radius:6px">`:""}

        <button onclick="go(${s.lat},${s.lng})">이동</button>
        <button onclick="del(${i})">삭제</button>
      </div>
    `;
  });
}

/* =====================
   MOVE
===================== */
function go(lat,lng){
  map.setView([lat,lng],14);
}

/* =====================
   DELETE
===================== */
function del(i){
  shots.splice(i,1);
  localStorage.setItem("shots",JSON.stringify(shots));
  render();
  drawMarkers();
}

/* =====================
   CLOSE
===================== */
document.getElementById("close").onclick=()=>{
  document.getElementById("panel").classList.remove("show");
};

/* INIT */
render();
drawMarkers();

</script>

</body>
</html>
