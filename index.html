<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SkyPin TEST</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;}

/* 기존 버튼 스타일 */
#menuBtn{
 position:fixed;
 bottom:80px;
 right:15px;
 width:60px;
 height:60px;
 border-radius:50%;
 background:#ff3b30;
 color:#fff;
 border:none;
 z-index:99999;
}

/* 🔥 여기 아래에 추가 */
#panel{
 position:fixed;
 top:0;
 right:0;
 width:300px;
 height:100%;
 background:#fff;
 transform:translateX(100%);
 transition:.3s;
 z-index:99998;
}

#panel.show{
 transform:translateX(0);
}

#panelHeader{
 padding:10px;
 background:#111;
 color:#fff;
 display:flex;
 justify-content:space-between;
}
#menuBtn{
 position:fixed;
 bottom:80px;
 right:15px;
 width:60px;
 height:60px;
 border-radius:50%;
 background:#ff3b30;
 color:#fff;
 border:none;
 z-index:99999;
}
</style>
</head>

<body>

<h2 style="position:fixed;top:0;left:0;z-index:99999;background:#fff;">
🔥 SkyPin 실행됨
</h2>

<div id="map"></div>
<button id="menuBtn">☰</button>

 <!-- 🔥 여기 추가 -->
<div id="panel">
  <div id="panelHeader">
    <span>SkyPin</span>
    <button id="closeBtn">닫기</button>
  </div>

 <div id="panelContent">
 
 <h3>내 촬영지 추가</h3>
 <input id="shotName" placeholder="촬영지 이름">
<input type="file" id="photo">
<button id="saveShot">저장</button>
  <hr>

  <h3>추천 명소</h3>
  <div id="list"></div>
 </div> 
</div>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
console.log("renderShots 실행됨");
console.log("JS 실행됨");

const map = L.map("map").setView([37.56,126.97],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(map);

 /* 🔥 여기 추가 */
map.on("click", function(e){
  selected = e.latlng;
  console.log("선택 위치:", selected);
});

 /* 🔥 여기부터 추가 */
const panel = document.getElementById("panel");
const closeBtn = document.getElementById("closeBtn");

closeBtn.onclick = function(){
  panel.classList.remove("show");
};

/* 추천명소 데이터 */
const POI = [
  {name:"남산타워", lat:37.5512, lng:126.9882},
  {name:"한강공원", lat:37.52, lng:126.98},
  {name:"해운대", lat:35.1587, lng:129.1604},
  {name:"설악산", lat:38.1194, lng:128.4655}
];

const listEl = document.getElementById("list");
let marker = null;

 /* 🔥 여기 추가 */
let selected = null;
let shots = JSON.parse(localStorage.getItem("shots") || "[]");

 /* 리스트 렌더 */
function renderPOI(){
 
  POI.forEach(p=>{
    const div = document.createElement("div");
    div.style.padding = "8px";
    div.style.borderBottom = "1px solid #eee";
    div.style.cursor = "pointer";

    div.innerHTML = p.name;

    div.onclick = function(){
      map.setView([p.lat, p.lng], 15);

      if(marker){
        map.removeLayer(marker);
      }
function renderShots(){

  listEl.innerHTML = "";

  shots.forEach(s=>{
    const div = document.createElement("div");

    div.style.padding = "8px";
    div.style.borderBottom = "1px solid #ddd";

    // 텍스트
    div.innerHTML = "📸 " + s.name;

   // 🔥🔥 핵심 (이미지 표시)
if(s.photo && s.photo.startsWith("data:image")){
  const img = document.createElement("img");
  img.src = s.photo;

  img.style.width = "100%";
  img.style.maxHeight = "100px";   // 🔥 추가 (핵심)
  img.style.objectFit = "cover";   // 🔥 추가

  img.style.marginTop = "6px";
  img.style.borderRadius = "8px";
  img.style.display = "block";

  div.appendChild(img);
} 
    // 지도 이동
    div.onclick = function(){
      map.setView([s.lat, s.lng], 15);

      if(marker){
        map.removeLayer(marker);
      }

      marker = L.marker([s.lat, s.lng])
        .addTo(map)
        .bindPopup(s.name)
        .openPopup();
    };

    listEl.appendChild(div);
  });
}
    
document.getElementById("saveShot").onclick = async function(){

  // 1️⃣ 지도 클릭 안 했으면 막기
  if(!selected){
    alert("지도 클릭 후 저장하세요");
    return;
  }

  // 2️⃣ 입력값 가져오기
  const name = document.getElementById("shotName").value;
  const file = document.getElementById("photo").files[0];

  let imgData = "";

  // 3️⃣ 사진 있으면 압축 처리
  if(file){
    imgData = await resizeImage(file); // 🔥 핵심
  }

  // 4️⃣ 데이터 저장
  shots.push({
    name: name,
    lat: selected.lat,
    lng: selected.lng,
    photo: imgData
  });

  // 5️⃣ localStorage 저장
  localStorage.setItem("shots", JSON.stringify(shots));

  // 6️⃣ UI 갱신
  alert("저장 완료");
  renderShots();
};
      marker = L.marker([p.lat, p.lng])
        .addTo(map)
        .bindPopup(p.name)
        .openPopup();
    };

    listEl.appendChild(div);
  });
}

document.getElementById("menuBtn").onclick = function(){
  panel.classList.add("show");
  renderPOI();
  renderShots();   // 🔥 추가
};
function resizeImage(file){
  return new Promise(resolve=>{
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = function(){
      const canvas = document.createElement("canvas");

      const max = 400; // 🔥 핵심
      let w = img.width;
      let h = img.height;

      if(w > max){
        h *= max / w;
        w = max;
      }

      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);

      resolve(canvas.toDataURL("image/jpeg", 0.7));
    };

    reader.readAsDataURL(file);
  });
}
</script>

</body>
</html>
