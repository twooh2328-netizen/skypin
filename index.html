<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>스카이핀 드론 지도앱 (정상화 버전)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body { height:100%; margin:0; }
#map { height:100vh; width:100%; }

#menuBtn {
  position:absolute; top:10px; left:10px;
  z-index:1000; background:white;
  padding:8px 12px; border:1px solid #ccc;
  cursor:pointer;
}

.fab {
  position:fixed; bottom:20px; right:20px;
  background:#333; color:#fff;
  padding:10px; border-radius:8px;
  cursor:pointer; z-index:1000;
}

.submenu {
  position:fixed; bottom:70px; right:20px;
  display:none; flex-direction:column; gap:10px;
  z-index:1000;
}
.submenu.show { display:flex; }

.submenu button {
  width:60px; height:60px;
  border-radius:50%; border:none;
  color:#fff; cursor:pointer;
}

.side-panel {
  position:fixed; top:0; right:-100%;
  width:260px; height:100%;
  background:#f8f9fa;
  transition:0.3s;
  z-index:999; padding:16px;
  overflow-y:auto;
}
.side-panel.show { right:0; }

.tab-content { display:none; }
</style>
</head>

<body>

<div id="map"></div>

<button id="menuBtn">메뉴</button>
<div class="fab">메뉴</div>

<div id="submenu" class="submenu">
  <button class="shots">촬영지</button>
  <button class="sun">일출</button>
  <button class="location">위치</button>
</div>

<div id="sidePanel" class="side-panel">
  <button id="closePanelBtn">닫기</button>

  <div id="myshots" class="tab-content">
    <h3>촬영지</h3>
    <input id="shotName" placeholder="이름"><br>
    <input id="shotMemo" placeholder="메모"><br>
    <button id="addShotBtn">등록</button>
    <div id="myshots-list"></div>
  </div>

  <div id="sun" class="tab-content">
    <h3>일출 방향</h3>
    <div id="sun-info">위치 필요</div>
  </div>

  <div id="location" class="tab-content">
    <h3>현재 위치</h3>
    <button id="locateBtn">내 위치</button>
    <div id="location-info"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

<script>

// 🔥 전역
let map;
let myShots = [];
let markers = {};
let userPos = null;
let userMarker = null;
let sunMarker = null;

// 🔥 초기화
document.addEventListener('DOMContentLoaded', () => {

  map = L.map('map').setView([37.5665,126.9780],10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
  }).addTo(map);

  loadShots();

  const submenu = document.getElementById('submenu');

  document.getElementById('menuBtn').onclick =
  document.querySelector('.fab').onclick =
    () => submenu.classList.toggle('show');

  document.getElementById('closePanelBtn').onclick = () => {
    document.getElementById('sidePanel').classList.remove('show');
  };

  document.querySelector('.shots').onclick = () => {
    openTab('myshots');
    renderShots();
  };

  document.querySelector('.location').onclick = () => {
    openTab('location');
    locate();
  };

  document.querySelector('.sun').onclick = () => {
    openTab('sun');
    showSun();
  };

  document.getElementById('locateBtn').onclick = locate;

  document.getElementById('addShotBtn').onclick = () => {
    const name = shotName.value.trim();
    if(!name) return alert("이름 입력");

    const center = map.getCenter();
    const id = Date.now();

    myShots.push({id,name,lat:center.lat,lng:center.lng});
    saveShots();
    renderShots();
  };

});

// 🔥 공통
function openTab(id){
  document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  document.getElementById(id).style.display='block';
  document.getElementById('sidePanel').classList.add('show');
}

// 🔥 위치
function locate(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    userPos = {lat,lng};

    if(userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([lat,lng]).addTo(map);

    map.setView([lat,lng],13);
    document.getElementById("location-info").innerText =
      lat.toFixed(4)+","+lng.toFixed(4);
  });
}

// 🔥 일출
function showSun(){
  if(!userPos){
    locate();
    return;
  }

  const {lat,lng} = userPos;
  const times = SunCalc.getTimes(new Date(),lat,lng);
  const pos = SunCalc.getPosition(times.sunrise,lat,lng);

  let deg = pos.azimuth * 180/Math.PI + 180;
  deg = (deg+360)%360;

  document.getElementById('sun-info').innerText =
    "일출 방위: "+deg.toFixed(1)+"°";

  if(sunMarker) map.removeLayer(sunMarker);
  sunMarker = L.marker([lat,lng]).addTo(map)
    .bindPopup("일출 "+deg.toFixed(1)+"°").openPopup();
}

// 🔥 촬영지
function renderShots(){
  const list = document.getElementById('myshots-list');
  list.innerHTML = '';

  myShots.forEach(s=>{
    const div = document.createElement('div');
    div.innerHTML = s.name;

    div.onclick = ()=>{
      map.setView([s.lat,s.lng],13);
    };

    list.appendChild(div);

    if(!markers[s.id]){
      markers[s.id] = L.marker([s.lat,s.lng]).addTo(map);
    }
  });
}

// 🔥 저장
function saveShots(){
  localStorage.setItem("shots",JSON.stringify(myShots));
}

function loadShots(){
  const data = localStorage.getItem("shots");
  if(data) myShots = JSON.parse(data);
}

</script>

</body>
</html>
