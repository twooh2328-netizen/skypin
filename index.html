<script>
window.addEventListener("DOMContentLoaded", function(){

/* =====================
MAP 먼저 생성 (무조건 최상단)
===================== */
const map = L.map("map").setView([37.5,127],11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19
}).addTo(map);

const layer = L.layerGroup().addTo(map);

/* =====================
STATE
===================== */
let mySpots = JSON.parse(localStorage.getItem("mySpots") || "[]");
let selectedLat = null;
let selectedLng = null;
let sunriseLine = null;

/* =====================
MENU (여기서만 연결)
===================== */
const menu = document.getElementById("slideMenu");
const btn = document.getElementById("toggleMenu");
const close = document.getElementById("closeMenu");

/* 🔥 핵심 방어코드 */
if(btn) btn.onclick = () => menu.classList.add("open");
if(close) close.onclick = () => menu.classList.remove("open");

/* =====================
지도 클릭
===================== */
map.on("click", e=>{
selectedLat = e.latlng.lat;
selectedLng = e.latlng.lng;
document.getElementById("photoInput").click();
});

/* =====================
사진 업로드
===================== */
document.getElementById("photoInput").addEventListener("change",e=>{
const file = e.target.files[0];
if(!file || selectedLat === null) return;

const reader = new FileReader();

reader.onload = () => {
mySpots.push({
lat:selectedLat,
lng:selectedLng,
img:reader.result,
name:"촬영지"
});

localStorage.setItem("mySpots",JSON.stringify(mySpots));
render();
};

reader.readAsDataURL(file);
});

/* =====================
현재위치 (정상)
===================== */
document.getElementById("locBtn").onclick=()=>{
navigator.geolocation.getCurrentPosition(p=>{
map.setView([p.coords.latitude,p.coords.longitude],15);
L.marker([p.coords.latitude,p.coords.longitude]).addTo(map);
});
};

/* =====================
RENDER (안전)
===================== */
function render(){

map.eachLayer(l=>{
if(l instanceof L.Marker){
map.removeLayer(l);
}
});

const list = document.getElementById("spotList");
if(list) list.innerHTML="";

mySpots.forEach((s,i)=>{
L.marker([s.lat,s.lng]).addTo(map)
.bindPopup("<img src='"+s.img+"' width='150'>");

const li = document.createElement("li");
li.textContent = s.name;
li.onclick = () => map.setView([s.lat,s.lng],15);
list.appendChild(li);
});

}

render();

});
</script>
