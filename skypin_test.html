<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>SkyPin Drone Map Safe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
html,body{margin:0;height:100%;}
#map{height:100vh;}
#buttons{position:fixed;top:20px;left:20px;z-index:9999;}
#buttons button{margin:5px;padding:8px;}
</style>
</head>
<body>

<div id="map"></div>
<div id="buttons">
  <button id="locBtn">📍 현재위치</button>
  <button id="listBtn">📑 명소</button>
  <button id="myBtn">⭐ 내 촬영지</button>
  <button id="sunBtn">🌅 일출</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map("map").setView([37.5,127],11);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);

const spots = [
  {name:"서울숲",lat:37.5446,lng:127.0376},
  {name:"광안대교",lat:35.1531,lng:129.1185}
];

let mySpots = [];
let selected=null;
let sunriseLine=null;

// 현재 위치 버튼
document.getElementById("locBtn").onclick=()=>{
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;
    console.log("현재 위치:", lat, lng);
    if(typeof lat==="number" && typeof lng==="number"){
      map.setView([lat,lng],15);
      L.marker([lat,lng]).addTo(map).bindPopup("현재 위치").openPopup();
    } else {
      alert("위치 좌표가 올바르지 않습니다.");
    }
  }, err=>{
    console.error("위치 에러:", err);
  });
};

// 명소 버튼
document.getElementById("listBtn").onclick=()=>{
  spots.forEach(s=>{
    console.log("명소 좌표:", s.name, s.lat, s.lng);
    if(typeof s.lat==="number" && typeof s.lng==="number"){
      L.marker([s.lat,s.lng]).addTo(map).bindPopup(s.name);
    } else {
      console.warn("잘못된 명소 좌표:", s);
    }
  });
};

// 내 촬영지 버튼
document.getElementById("myBtn").onclick=()=>{
  mySpots.forEach(s=>{
    console.log("내 촬영지 좌표:", s.name, s.lat, s.lng);
    if(typeof s.lat==="number" && typeof s.lng==="number"){
      L.marker([s.lat,s.lng]).addTo(map).bindPopup(s.name);
    } else {
      console.warn("잘못된 촬영지 좌표:", s);
    }
  });
};

// 일출 버튼
document.getElementById("sunBtn").onclick=()=>{
  if(selected){
    console.log("일출 기준 좌표:", selected.lat, selected.lng);
    if(typeof selected.lat==="number" && typeof selected.lng==="number"){
      if(sunriseLine) map.removeLayer(sunriseLine);
      sunriseLine=L.polyline([[selected.lat,selected.lng],[selected.lat,selected.lng+0.05]],{color:"orange"}).addTo(map);
    } else {
      alert("선택된 좌표가 올바르지 않습니다.");
    }
  } else {
    alert("먼저 지도에서 위치를 클릭하세요!");
  }
};

// 지도 클릭 → 선택 좌표 저장
map.on("click",e=>{
  selected=e.latlng;
  console.log("지도 클릭 좌표:", selected.lat, selected.lng);
});
</script>
</body>
</html>
