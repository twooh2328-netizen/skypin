<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>SkyPin FINAL MATCH</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}

/* MAP */
#map{
height:100vh;
width:100%;
}

/* MENU BUTTON */
#menuBtn{
position:fixed;
bottom:20px;
right:20px;
z-index:99999;
padding:12px;
border:none;
border-radius:8px;
background:#eee;
cursor:pointer;
}

/* MENU PANEL */
#menu{
position:fixed;
top:0;
left:-280px;
width:280px;
height:100%;
background:#fff;
z-index:99999;
transition:0.3s;
padding:10px;
box-shadow:2px 0 10px rgba(0,0,0,0.2);
}

#menu.open{left:0;}

button{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
background:#eee;
border-radius:6px;
cursor:pointer;
}

#list{
margin-top:10px;
height:70%;
overflow:auto;
border-top:1px solid #ddd;
padding-top:10px;
}

.item{
padding:8px;
border-bottom:1px solid #ddd;
cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<button id="menuBtn">☰ 메뉴</button>

<div id="menu">

<button id="btnLoc">📍 현재위치</button>
<button id="btnList">📑 명소</button>
<button id="btnMy">⭐ 내 촬영지</button>
<button id="btnSun">🌅 일출</button>

<div id="list"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

/* ================= MAP ================= */
const map = L.map("map").setView([37.5,127],11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(map);

/* ================= DATA ================= */
const spots = [
{name:"제부도",lat:37.2856,lng:126.6226},
{name:"낙산사",lat:38.1240,lng:128.6270},
{name:"서울숲",lat:37.5446,lng:127.0376},
{name:"광안대교",lat:35.1531,lng:129.1185},
{name:"성산일출봉",lat:33.4589,lng:126.9425}
];

/* ================= STATE ================= */
let marker = null;
let sunriseLine = null;

/* ================= MENU ================= */
const menu = document.getElementById("menu");

document.getElementById("menuBtn").onclick = () => {
menu.classList.toggle("open");
};

/* ================= MOVE FUNCTION ================= */
function go(lat,lng,title){

map.flyTo([lat,lng],15);

if(marker){
map.removeLayer(marker);
}

marker = L.marker([lat,lng])
.addTo(map)
.bindPopup(title)
.openPopup();

}

/* ================= LIST BUTTON ================= */
document.getElementById("btnList").onclick = () => {

const list = document.getElementById("list");
list.innerHTML = "";

spots.forEach(s=>{

const div = document.createElement("div");
div.className="item";
div.textContent = s.name;

div.onclick = () => go(s.lat,s.lng,s.name);

list.appendChild(div);

});

};

/* ================= CURRENT LOCATION ================= */
document.getElementById("btnLoc").onclick = () => {

navigator.geolocation.getCurrentPosition(pos=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

go(lat,lng,"현재 위치");

if(sunriseLine){
map.removeLayer(sunriseLine);
}

sunriseLine = L.polyline(
[[lat,lng],[lat,lng+0.05]],
{color:"orange",weight:3}
).addTo(map);

});

};

/* ================= MY SPOTS (placeholder) ================= */
document.getElementById("btnMy").onclick = () => {
alert("내 촬영지 기능은 다음 확장 단계입니다 (현재 구조 정상 확인 완료)");
};

/* ================= SUN ================= */
document.getElementById("btnSun").onclick = () => {
alert("현재위치를 눌러야 일출선이 표시됩니다");
};

</script>

</body>
</html>
