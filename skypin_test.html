<script>
document.addEventListener("DOMContentLoaded", function () {

/* ================= MAP ================= */
const map = L.map("map").setView([37.5,127],11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(map);

const layer = L.layerGroup().addTo(map);

/* ================= DATA ================= */
const spots = [
{name:"제부도",lat:37.2856,lng:126.6226},
{name:"낙산사",lat:38.1240,lng:128.6270},
{name:"서울숲",lat:37.5446,lng:127.0376},
{name:"광안대교",lat:35.1531,lng:129.1185},
{name:"성산일출봉",lat:33.4589,lng:126.9425}
];

let focusMarker = null;
let sunriseLine = null;

/* ================= SAFE GET ================= */
const $ = (id) => document.getElementById(id);

/* ================= MENU ================= */
$("toggleMenu").onclick = () => {
$("slideMenu").classList.toggle("open");
};

/* ================= LIST ================= */
$("listBtn").onclick = () => {

const list = $("spotList");
list.innerHTML = "";

spots.forEach(s => {
const li = document.createElement("li");
li.textContent = s.name;

li.onclick = () => {
map.flyTo([s.lat, s.lng], 15);

if (focusMarker) map.removeLayer(focusMarker);

focusMarker = L.marker([s.lat, s.lng])
.addTo(map)
.bindPopup(s.name)
.openPopup();
};

list.appendChild(li);
});

};

/* ================= LOCATION ================= */
$("locBtn").onclick = () => {

navigator.geolocation.getCurrentPosition(pos => {

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

map.flyTo([lat, lng], 15);

if (focusMarker) map.removeLayer(focusMarker);

focusMarker = L.marker([lat, lng])
.addTo(map)
.bindPopup("현재 위치")
.openPopup();

});

};

/* ================= SUN ================= */
$("sunBtn").onclick = () => {

navigator.geolocation.getCurrentPosition(pos => {

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

if (sunriseLine) map.removeLayer(sunriseLine);

sunriseLine = L.polyline(
[[lat, lng],[lat, lng + 0.05]],
{color:"orange",weight:3}
).addTo(map);

});

};

});
</script>
